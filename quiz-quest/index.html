<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz quest</title>
  <style>
    :root {
      --bg:#0b0c10;
      --card:#1e1f25;
      --txt:#eaeaea;
      --bd:#2f313a;
      --accent:#4ecca3;
      --muted:#9aa0ad;
      --danger:#ff8b8b;
      --ok:#80ed99;
    }

    * { box-sizing: border-box; }

    body {
      margin:0;
      font:16px/1.4 system-ui, Segoe UI, Roboto, Arial;
      background:var(--bg);
      color:var(--txt);
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:20px;
      box-sizing:border-box;
    }

    .card {
      width:min(760px,100%);
      background:var(--card);
      border:1px solid var(--bd);
      border-radius:14px;
      padding:20px;
    }

    h1, h2 { margin:0 0 10px; }

    .muted {
      margin:0 0 14px;
      color:var(--muted);
    }

    .status {
      min-height: 1.5rem;
      margin: 0 0 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }
    .status.almost { color: #ffd166; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      justify-items: stretch;
      align-items: stretch;
      gap: 12px;
      margin: 0 0 16px;
    }

    .cat {
      border:1px solid var(--bd);
      border-radius:10px;
      padding:10px;
      background:#181920;
      width: 100%;
      height: 92px;
      transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .cat.is-selected {
      border-color: #3ebd95;
      background: linear-gradient(180deg, #172922 0%, #141f1b 100%);
      box-shadow: inset 0 0 0 1px rgba(78, 204, 163, 0.35);
    }

    .cat label {
      display:flex;
      flex-direction: column;
      justify-content: center;
      align-items:center;
      text-align: center;
      gap:6px;
      cursor:pointer;
      position: relative;
      height: 100%;
    }

    .cat input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .cat-copy {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
    }

    .cat-name {
      display: block;
      font-weight:700;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .cat-count {
      display: block;
      color:var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .controls,
    .actions,
    .btn-row {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      margin-top:12px;
    }

    .controls label {
      display:flex;
      gap:8px;
      align-items:center;
    }

    select,
    input[type="number"],
    input[type="text"],
    button,
    .link-btn {
      border:1px solid var(--bd);
      border-radius:8px;
      padding:10px 14px;
      font:inherit;
      background:transparent;
      color:var(--txt);
    }

    input[type="number"] {
      width:80px;
      padding:6px;
    }

    input[type="text"] {
      width:100%;
      background:var(--bg);
      font-size:16px;
      padding:12px;
    }

    .mc-options {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .mc-option {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 10px;
      background: var(--bg);
      cursor: pointer;
    }

    button,
    .link-btn {
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
    }

    .btn-primary {
      background:var(--accent);
      color:#111;
      border-color:var(--accent);
    }

    button:disabled {
      opacity:0.5;
      cursor:not-allowed;
    }

    .hidden { display: none !important; }

    .question-card {
      border:1px solid var(--bd);
      border-radius:8px;
      padding:12px;
      background:#181920;
      margin-top: 14px;
    }

    .input-mode {
      display: inline-flex;
      border: 1px solid var(--bd);
      border-radius: 999px;
      overflow: hidden;
      margin: 4px 0 10px;
    }

    .mode-btn {
      border: 0;
      border-radius: 0;
      padding: 8px 12px;
      background: transparent;
      color: var(--txt);
    }

    .mode-btn.is-active {
      background: var(--accent);
      color: #111;
    }

    .voice-status {
      min-height: 1.25rem;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .voice-status.error {
      color: var(--danger);
    }

    .voice-status.ok {
      color: var(--ok);
    }

    .input-disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Quiz quest</h1>
    <section id="setupView">
      <p id="introText" class="muted">Choose one or more categories and answer until the pool is complete.</p>

      <p id="modeText" class="muted"></p>
      <p id="poolStatus" class="status"></p>
      <p id="setupStatus" class="status" role="status" aria-live="polite"></p>

      <section id="categoryGrid" class="grid" aria-label="Quiz quest categories"></section>
      <div class="actions">
        <button id="selectAllBtn" type="button">Select all</button>
        <button id="deselectAllBtn" type="button">Deselect all</button>
      </div>

      <div class="controls">
        <label for="questionCount" id="questionCountLabel">Question count
          <input id="questionCount" type="number" min="1" value="1" disabled />
        </label>
        <span id="countMeta" class="muted"></span>
      </div>

      <div class="actions">
        <button id="startQuestBtn" class="btn-primary" type="button">Start quest</button>
        <a href="/" class="link-btn" id="backLink">Back to sarcasm.games</a>
      </div>

      <div class="controls">
        <label for="resetCategorySelect" class="muted" id="resetLabel">Reset category</label>
        <select id="resetCategorySelect"></select>
        <button id="resetCategoryBtn" type="button">Reset category</button>
      </div>
    </section>

    <section id="questionSection" class="question-card hidden">
      <p id="progressText" class="muted"></p>
      <p id="questionCategory" class="muted"></p>
      <h2 id="questionPrompt">Question</h2>
      <div class="input-mode" role="group" aria-label="Input mode toggle">
        <button id="textModeBtn" type="button" class="mode-btn is-active">Text</button>
        <button id="voiceModeBtn" type="button" class="mode-btn">Voice</button>
      </div>
      <p id="voiceStatus" class="voice-status" aria-live="polite"></p>
      <form id="answerForm">
        <input id="answerInput" type="text" placeholder="Write your answer" autocomplete="off" />
        <div id="mcOptions" class="mc-options hidden" role="radiogroup" aria-label="Multiple choice options"></div>
        <p id="voiceHeard" class="muted hidden"></p>
        <div class="btn-row">
          <button id="submitBtn" type="submit" class="btn-primary">Submit</button>
          <button id="showAnswerBtn" type="button" class="hidden">Show answer</button>
          <button id="nextBtn" type="button" class="hidden">Next question</button>
        </div>
      </form>
      <p id="questionStatus" class="status"></p>
      <p id="answerReveal" class="muted hidden"></p>
    </section>
  </main>

  <script type="module">
    import { getQuizLanguage } from '/lib/client/quiz-language.js';

    const activeLang = getQuizLanguage() === 'no' ? 'no' : 'en';
    const GUEST_PROGRESS_KEY = 'quizQuestGuestProgress';
    const GUEST_PROGRESS_TOKEN_KEY = 'quizQuestGuestProgressToken';

    const copy = {
      en: {
        intro: 'Choose one or more categories and answer until the pool is complete.',
        modeGuest: 'Mode: Guest (progress is saved in this browser)',
        modeUser: 'Mode: Logged in (progress is saved on your account)',
        selectedPool: 'Selected pool: {remaining} remaining of {total} total.',
        selectHint: 'Select at least one category to continue.',
        questionCount: 'Question count',
        selectAll: 'Select all',
        deselectAll: 'Deselect all',
        selectedPoolCount: 'Selected pool supports between 1 and {count} questions.',
        startQuest: 'Start quest',
        next: 'Next question',
        submit: 'Submit',
        showAnswer: 'Show answer',
        hideAnswer: 'Hide answer',
        back: 'Back to sarcasm.games',
        resetCategory: 'Reset category',
        resetCategoryLabel: 'Reset category',
        resetUserDone: 'Category progress reset.',
        resetGuestDone: 'Guest progress reset for this category.',
        resetNeedsCategory: 'Choose a category to reset.',
        failedOverview: 'Could not load category overview.',
        failedQuestion: 'Could not load a question.',
        failedAnswer: 'Could not validate answer.',
        failedReset: 'Could not reset category.',
        emptySelection: 'Choose at least one category first.',
        emptyPool: 'No unsolved valid questions left in selected categories.',
        questionIn: 'Category: {category}',
        progress: 'Question {current} of {total}',
        roundDone: 'Round complete! Start a new quest when ready.',
        correct: '✅ Correct! Removed from your pool.',
        almost: '🟡 Close! Try once more before moving on.',
        wrong: '❌ Wrong. You can reveal the answer and move to another random question.',
        answerPrefix: 'Accepted answer: {answer}',
        yourAnswerMissing: 'Write an answer first.',
        optionMissing: 'Choose an option first.',
        placeholder: 'Write your answer',
        noCategories: 'No categories available.',
        inputModeText: 'Text',
        inputModeVoice: 'Voice',
        voiceListening: '🎙️ Listening…',
        voiceProcessing: '⏳ Processing speech…',
        voiceUnsupported: 'Voice mode is not supported in this browser.',
        voicePermissionDenied: 'Microphone access denied. Switch to text mode or allow microphone access.',
        voiceOptionNoMatch: 'Could not map speech to an option. Try saying letter, number or option text.',
        voiceHeardChoice: '🎙️ Heard: {choice}'
      },
      no: {
        intro: 'Velg én eller flere kategorier og svar til poolen er fullført.',
        modeGuest: 'Modus: Gjest (fremgang lagres i denne nettleseren)',
        modeUser: 'Modus: Innlogget (fremgang lagres på kontoen din)',
        selectedPool: 'Valgt pool: {remaining} gjenstår av {total} totalt.',
        selectHint: 'Velg minst én kategori for å fortsette.',
        questionCount: 'Antall spørsmål',
        selectAll: 'Velg alle',
        deselectAll: 'Fjern alle',
        selectedPoolCount: 'Valgt pool støtter mellom 1 og {count} spørsmål.',
        startQuest: 'Start quest',
        next: 'Neste spørsmål',
        submit: 'Svar',
        showAnswer: 'Vis fasit',
        hideAnswer: 'Skjul fasit',
        back: 'Tilbake til sarcasm.games',
        resetCategory: 'Reset kategori',
        resetCategoryLabel: 'Reset kategori',
        resetUserDone: 'Kategorifremgang er resatt.',
        resetGuestDone: 'Gjestefremgang for kategorien er resatt.',
        resetNeedsCategory: 'Velg en kategori å resette.',
        failedOverview: 'Kunne ikke laste kategorioversikt.',
        failedQuestion: 'Kunne ikke hente spørsmål.',
        failedAnswer: 'Kunne ikke sjekke svar.',
        failedReset: 'Kunne ikke resette kategori.',
        emptySelection: 'Velg minst én kategori først.',
        emptyPool: 'Ingen uløste gyldige spørsmål igjen i valgte kategorier.',
        questionIn: 'Kategori: {category}',
        progress: 'Spørsmål {current} av {total}',
        roundDone: 'Runden er fullført! Start en ny quest når du vil.',
        correct: '✅ Riktig! Fjernet fra poolen din.',
        almost: '🟡 Nesten! Du kan prøve én gang til før du går videre.',
        wrong: '❌ Feil. Du kan vise fasit og gå videre til et nytt tilfeldig spørsmål.',
        answerPrefix: 'Godkjent svar: {answer}',
        yourAnswerMissing: 'Skriv et svar først.',
        optionMissing: 'Velg et alternativ først.',
        placeholder: 'Skriv svaret ditt',
        noCategories: 'Ingen kategorier tilgjengelig.',
        inputModeText: 'Tekst',
        inputModeVoice: 'Stemmen',
        voiceListening: '🎙️ Lytter…',
        voiceProcessing: '⏳ Behandler tale…',
        voiceUnsupported: 'Stemmemodus støttes ikke i denne nettleseren.',
        voicePermissionDenied: 'Mikrofontilgang ble avslått. Bytt til tekstmodus eller tillat mikrofon.',
        voiceOptionNoMatch: 'Klarte ikke å mappe talen til et alternativ. Prøv bokstav, tall eller alternativtekst.',
        voiceHeardChoice: '🎙️ Hørte: {choice}'
      }
    };

    const state = {
      session: null,
      categories: [],
      currentQuestion: null,
      isLoadingQuestion: false,
      isSubmitting: false,
      guestProgress: readGuestProgress(),
      guestProgressToken: readGuestProgressToken(),
      pendingSolvedQuestionIds: [],
      roundTarget: 0,
      roundAnswered: 0,
      isQuestActive: false,
      awaitingRetry: false,
      pendingRevealAnswerEncoded: '',
      inputMode: 'text',
      voice: {
        supported: false,
        recognition: null,
        isListening: false,
        isProcessing: false,
        shouldListen: false,
        restartTimer: null,
        restartAttempts: 0,
        permissionDenied: false,
        lastQuestionKey: '',
        lastSubmittedTranscript: ''
      }
    };

    const setupView = document.getElementById('setupView');
    const introText = document.getElementById('introText');
    const modeText = document.getElementById('modeText');
    const poolStatus = document.getElementById('poolStatus');
    const setupStatus = document.getElementById('setupStatus');
    const categoryGrid = document.getElementById('categoryGrid');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const deselectAllBtn = document.getElementById('deselectAllBtn');
    const questionCountLabel = document.getElementById('questionCountLabel');
    const questionCountInput = document.getElementById('questionCount');
    const countMeta = document.getElementById('countMeta');
    const startQuestBtn = document.getElementById('startQuestBtn');
    const resetLabel = document.getElementById('resetLabel');
    const resetCategorySelect = document.getElementById('resetCategorySelect');
    const resetCategoryBtn = document.getElementById('resetCategoryBtn');
    const backLink = document.getElementById('backLink');
    const questionSection = document.getElementById('questionSection');
    const progressText = document.getElementById('progressText');
    const questionCategory = document.getElementById('questionCategory');
    const questionPrompt = document.getElementById('questionPrompt');
    const textModeBtn = document.getElementById('textModeBtn');
    const voiceModeBtn = document.getElementById('voiceModeBtn');
    const voiceStatus = document.getElementById('voiceStatus');
    const answerForm = document.getElementById('answerForm');
    const answerInput = document.getElementById('answerInput');
    const mcOptions = document.getElementById('mcOptions');
    const voiceHeard = document.getElementById('voiceHeard');
    const submitBtn = document.getElementById('submitBtn');
    const showAnswerBtn = document.getElementById('showAnswerBtn');
    const nextBtn = document.getElementById('nextBtn');
    const questionStatus = document.getElementById('questionStatus');
    const answerReveal = document.getElementById('answerReveal');

    function ui() {
      return copy[activeLang] || copy.en;
    }

    function encodeAnswerForReveal(answer) {
      return btoa(unescape(encodeURIComponent(answer || '')));
    }

    function decodeAnswerForReveal(encodedAnswer) {
      if (!encodedAnswer) return '—';
      try {
        return decodeURIComponent(escape(atob(encodedAnswer)));
      } catch (error) {
        return '—';
      }
    }

    function isNextQuestionVisible() {
      return !nextBtn.classList.contains('hidden');
    }

    function normalizeVoiceText(value) {
      return String(value || '')
        .toLowerCase()
        .trim()
        .replace(/[.,/#!$%^&*;:{}=\-_`~()?"'[\]\\]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getCurrentQuestionKey() {
      return state.currentQuestion ? `${state.currentQuestion.id}:${state.roundAnswered}` : '';
    }

    function isVoiceNextCommand(transcript) {
      const normalized = normalizeVoiceText(transcript);
      if (!normalized) return false;
      return new Set([
        'next',
        'next question',
        'continue',
        'go next',
        'neste',
        'neste spørsmål',
        'fortsett'
      ]).has(normalized);
    }

    function getQuestionType(question) {
      return question?.question_type === 'multiple_choice' ? 'multiple_choice' : 'text';
    }

    function getSelectedOptionId() {
      const selected = mcOptions.querySelector('input[name="mcOption"]:checked');
      return selected ? Number(selected.value) : null;
    }

    function decodeRevealToken(encodedAnswer) {
      if (!encodedAnswer) return '';
      try {
        return decodeURIComponent(escape(atob(encodedAnswer)));
      } catch (error) {
        return '';
      }
    }

    function getRevealAnswerText(question, encodedAnswer) {
      const decoded = decodeRevealToken(encodedAnswer);
      if (!decoded) return '—';

      if (getQuestionType(question) === 'multiple_choice') {
        const selectedId = Number(decoded);
        const options = Array.isArray(question?.options) ? question.options : [];
        const match = options.find((option) => Number(option.option_id) === selectedId);
        return match?.option_en || '—';
      }

      return decoded;
    }

    function renderMultipleChoiceOptions(question) {
      mcOptions.innerHTML = '';
      const options = Array.isArray(question?.options) ? question.options : [];

      for (const option of options) {
        const label = document.createElement('label');
        label.className = 'mc-option';

        const input = document.createElement('input');
        input.type = 'radio';
        input.name = 'mcOption';
        input.value = String(option.option_id);

        const text = document.createElement('span');
        text.textContent = option.option_en || '';

        label.append(input, text);
        mcOptions.appendChild(label);
      }
    }

    function readGuestProgress() {
      try {
        const raw = localStorage.getItem(GUEST_PROGRESS_KEY);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return {};

        const normalized = {};
        for (const [category, ids] of Object.entries(parsed)) {
          if (!Array.isArray(ids)) continue;
          const uniqueIds = [...new Set(ids
            .map((id) => Number(id))
            .filter((id) => Number.isInteger(id) && id > 0))];
          if (uniqueIds.length) {
            normalized[category] = uniqueIds;
          }
        }

        return normalized;
      } catch (error) {
        return {};
      }
    }

    function writeGuestProgress() {
      localStorage.setItem(GUEST_PROGRESS_KEY, JSON.stringify(state.guestProgress));
    }

    function readGuestProgressToken() {
      try {
        const token = localStorage.getItem(GUEST_PROGRESS_TOKEN_KEY);
        return typeof token === 'string' && token.trim() ? token.trim() : null;
      } catch (error) {
        return null;
      }
    }

    function writeGuestProgressToken(token) {
      const normalized = typeof token === 'string' && token.trim() ? token.trim() : null;
      state.guestProgressToken = normalized;

      if (normalized) {
        localStorage.setItem(GUEST_PROGRESS_TOKEN_KEY, normalized);
      } else {
        localStorage.removeItem(GUEST_PROGRESS_TOKEN_KEY);
      }
    }

    function getGuestSolvedQuestionIds() {
      return Object.values(state.guestProgress).flat();
    }

    async function fetchSession() {
      try {
        const response = await fetch('/api/auth/session');
        if (!response.ok) return null;
        const payload = await response.json();
        return payload.user || null;
      } catch (error) {
        return null;
      }
    }

    async function questApi(action, payload = {}) {
      const requestPayload = {
        action,
        lang: activeLang,
        ...payload
      };
      let deltas = [];

      if (!state.session) {
        if (state.guestProgressToken) {
          requestPayload.guestProgressToken = state.guestProgressToken;
        }

        if (state.pendingSolvedQuestionIds.length) {
          deltas = [...new Set(state.pendingSolvedQuestionIds)];
          requestPayload.solvedQuestionIdDeltas = deltas;
          state.pendingSolvedQuestionIds = [];
        }

        if (!requestPayload.solvedQuestionIdDeltas) {
          requestPayload.solvedQuestionIds = getGuestSolvedQuestionIds();
        }
      }

      const response = await fetch('/api/quiz/quest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requestPayload)
      });

      if (!response.ok) {
        if (!state.session && deltas.length) {
          state.pendingSolvedQuestionIds = [...deltas, ...state.pendingSolvedQuestionIds];
        }
        throw new Error('request_failed');
      }

      const responsePayload = await response.json();

      if (!state.session && responsePayload && typeof responsePayload.guestProgressToken === 'string') {
        writeGuestProgressToken(responsePayload.guestProgressToken);
      }

      return responsePayload;
    }

    function selectedCategories() {
      return state.categories.filter((category) => category.selected).map((category) => category.name);
    }

    function getSelectedRemainingCount() {
      return state.categories
        .filter((category) => category.selected)
        .reduce((sum, category) => sum + category.remaining, 0);
    }

    function renderPoolStatus() {
      const selected = state.categories.filter((category) => category.selected);
      if (!selected.length) {
        poolStatus.textContent = ui().selectHint;
        return;
      }

      const total = selected.reduce((sum, category) => sum + category.total, 0);
      const remaining = selected.reduce((sum, category) => sum + category.remaining, 0);
      poolStatus.textContent = ui().selectedPool
        .replace('{remaining}', String(remaining))
        .replace('{total}', String(total));
    }

    function renderQuestionCountState() {
      const remaining = getSelectedRemainingCount();
      const hasPool = remaining > 0;

      questionCountInput.disabled = !hasPool;
      startQuestBtn.disabled = !hasPool;

      if (!hasPool) {
        questionCountInput.value = '1';
        questionCountInput.max = '1';
        countMeta.textContent = ui().selectHint;
        return;
      }

      questionCountInput.max = String(remaining);
      const current = Number(questionCountInput.value) || 1;
      const clamped = Math.max(1, Math.min(current, remaining));
      questionCountInput.value = String(clamped);
      countMeta.textContent = ui().selectedPoolCount.replace('{count}', String(remaining));
    }

    function clearQuestionState() {
      state.currentQuestion = null;
      questionSection.classList.add('hidden');
      questionStatus.textContent = '';
      questionStatus.className = 'status';
      answerReveal.classList.add('hidden');
      answerReveal.textContent = '';
      voiceHeard.classList.add('hidden');
      voiceHeard.textContent = '';
      showAnswerBtn.classList.add('hidden');
      showAnswerBtn.textContent = ui().showAnswer;
      nextBtn.classList.add('hidden');
      submitBtn.disabled = false;
      answerInput.disabled = false;
      answerInput.classList.remove('hidden');
      mcOptions.classList.add('hidden');
      mcOptions.innerHTML = '';
      state.awaitingRetry = false;
      state.pendingRevealAnswerEncoded = '';
      state.voice.isProcessing = false;
      state.voice.lastQuestionKey = '';
      state.voice.lastSubmittedTranscript = '';
      syncInputModeUi();
    }

    function renderVoiceStatus() {
      voiceStatus.className = 'voice-status';
      if (state.inputMode !== 'voice') {
        voiceStatus.textContent = '';
        return;
      }

      if (!state.voice.supported) {
        voiceStatus.classList.add('error');
        voiceStatus.textContent = ui().voiceUnsupported;
        return;
      }

      if (state.voice.permissionDenied) {
        voiceStatus.classList.add('error');
        voiceStatus.textContent = ui().voicePermissionDenied;
        return;
      }

      if (state.voice.isProcessing || state.isSubmitting) {
        voiceStatus.textContent = ui().voiceProcessing;
        return;
      }

      if (state.voice.isListening) {
        voiceStatus.classList.add('ok');
        voiceStatus.textContent = ui().voiceListening;
        return;
      }

      voiceStatus.textContent = '';
    }

    function syncInputModeUi() {
      const isVoice = state.inputMode === 'voice';
      textModeBtn.classList.toggle('is-active', !isVoice);
      voiceModeBtn.classList.toggle('is-active', isVoice);

      if (!state.currentQuestion) {
        answerInput.disabled = true;
        answerInput.classList.remove('input-disabled');
        renderVoiceStatus();
        return;
      }

      if (getQuestionType(state.currentQuestion) === 'text') {
        answerInput.disabled = isVoice || state.isSubmitting || isNextQuestionVisible();
        answerInput.classList.toggle('input-disabled', isVoice);
      }

      for (const optionInput of mcOptions.querySelectorAll('input[name="mcOption"]')) {
        if (isVoice && !state.isSubmitting && !isNextQuestionVisible()) {
          optionInput.disabled = true;
        }
      }

      renderVoiceStatus();
    }

    function stopVoiceListening() {
      state.voice.shouldListen = false;
      if (state.voice.restartTimer) {
        clearTimeout(state.voice.restartTimer);
        state.voice.restartTimer = null;
      }
      if (state.voice.recognition && state.voice.isListening) {
        state.voice.recognition.stop();
      }
      state.voice.isListening = false;
      renderVoiceStatus();
    }

    function scheduleVoiceRestart(delayMs = 300) {
      if (!state.voice.supported || !state.voice.recognition) return;
      if (!state.voice.shouldListen || state.inputMode !== 'voice') return;
      if (!state.isQuestActive || !state.currentQuestion || state.isSubmitting) return;
      if (state.voice.permissionDenied) return;
      if (state.voice.restartTimer) return;
      if (state.voice.restartAttempts >= 8) return;

      state.voice.restartTimer = setTimeout(() => {
        state.voice.restartTimer = null;
        startVoiceListening();
      }, delayMs);
    }

    function startVoiceListening() {
      if (!state.voice.supported || !state.voice.recognition) return;
      if (!state.voice.shouldListen || state.inputMode !== 'voice') return;
      if (!state.isQuestActive || !state.currentQuestion || state.isSubmitting) return;
      if (state.voice.isListening) return;
      if (state.voice.permissionDenied) return;

      try {
        state.voice.recognition.start();
      } catch (error) {
        // Browser can throw if start is called too soon; retry with backoff.
        state.voice.restartAttempts += 1;
        scheduleVoiceRestart(600 + (state.voice.restartAttempts * 200));
      }
    }

    function setInputMode(mode) {
      const nextMode = mode === 'voice' ? 'voice' : 'text';
      if (nextMode === 'voice' && !state.voice.supported) {
        state.inputMode = 'text';
        renderVoiceStatus();
        return;
      }

      state.inputMode = nextMode;
      state.voice.isProcessing = false;
      if (state.inputMode === 'voice') {
        state.voice.shouldListen = true;
        state.voice.restartAttempts = 0;
        startVoiceListening();
      } else {
        stopVoiceListening();
      }

      syncInputModeUi();
    }

    function resolveSpokenMultipleChoice(transcript, question) {
      const normalized = normalizeVoiceText(transcript);
      if (!normalized) return null;
      const options = Array.isArray(question?.options) ? question.options : [];
      if (!options.length) return null;

      const letterMap = new Map([
        ['a', 0], ['ay', 0],
        ['b', 1], ['bee', 1],
        ['c', 2], ['see', 2],
        ['d', 3], ['dee', 3]
      ]);
      const numberMap = new Map([
        ['1', 0], ['one', 0], ['en', 0],
        ['2', 1], ['two', 1], ['to', 1], ['too', 1], ['too', 1],
        ['3', 2], ['three', 2], ['tre', 2],
        ['4', 3], ['four', 3], ['fire', 3]
      ]);

      const compactTokens = normalized.split(' ').filter(Boolean);
      for (const token of compactTokens) {
        if (letterMap.has(token)) {
          const idx = letterMap.get(token);
          if (idx < options.length) return String(options[idx].option_id);
        }
      }

      for (const token of compactTokens) {
        if (numberMap.has(token)) {
          const idx = numberMap.get(token);
          if (idx < options.length) return String(options[idx].option_id);
        }
      }

      const normalizedOptions = options.map((option) => ({
        optionId: String(option.option_id),
        text: normalizeVoiceText(option.option_en || '')
      }));

      const exactMatch = normalizedOptions.find((option) => option.text && option.text === normalized);
      if (exactMatch) return exactMatch.optionId;

      const containsMatches = normalizedOptions.filter((option) =>
        option.text && (option.text.includes(normalized) || normalized.includes(option.text))
      );
      return containsMatches.length === 1 ? containsMatches[0].optionId : null;
    }

    async function handleVoiceTranscript(rawTranscript) {
      const transcript = normalizeVoiceText(rawTranscript);
      if (!transcript) return;
      if (state.inputMode !== 'voice' || !state.currentQuestion || state.isSubmitting) return;

      if (isNextQuestionVisible()) {
        if (isVoiceNextCommand(transcript)) {
          state.voice.lastSubmittedTranscript = transcript;
          await proceedAfterAnswer();
        }
        return;
      }

      const questionKey = getCurrentQuestionKey();
      if (state.voice.lastQuestionKey !== questionKey) {
        state.voice.lastQuestionKey = questionKey;
        state.voice.lastSubmittedTranscript = '';
      }
      if (state.voice.lastSubmittedTranscript === transcript) return;

      const questionType = getQuestionType(state.currentQuestion);
      let answer = transcript;

      if (questionType === 'multiple_choice') {
        answer = resolveSpokenMultipleChoice(transcript, state.currentQuestion);
        if (!answer) {
          questionStatus.className = 'status error';
          questionStatus.textContent = ui().voiceOptionNoMatch;
          return;
        }
        const selectedInput = mcOptions.querySelector(`input[name="mcOption"][value="${CSS.escape(answer)}"]`);
        if (selectedInput) selectedInput.checked = true;
        const spokenOptionText = state.currentQuestion.options
          ?.find((option) => String(option.option_id) === String(answer))
          ?.option_en || '';
        voiceHeard.textContent = ui().voiceHeardChoice.replace('{choice}', spokenOptionText || transcript);
        voiceHeard.classList.remove('hidden');
      } else {
        answerInput.value = rawTranscript.trim();
        voiceHeard.classList.add('hidden');
        voiceHeard.textContent = '';
      }

      state.voice.lastSubmittedTranscript = transcript;
      state.voice.isProcessing = true;
      renderVoiceStatus();
      await submitCurrentAnswer(answer);
      state.voice.isProcessing = false;
      renderVoiceStatus();
    }

    function setupVoiceRecognition() {
      const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognitionCtor) {
        state.voice.supported = false;
        renderVoiceStatus();
        return;
      }

      state.voice.supported = true;
      const recognition = new SpeechRecognitionCtor();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.lang = activeLang === 'no' ? 'nb-NO' : 'en-US';

      recognition.onstart = () => {
        state.voice.isListening = true;
        state.voice.restartAttempts = 0;
        renderVoiceStatus();
      };

      recognition.onresult = async (event) => {
        const results = Array.from(event.results || []);
        const finalResult = [...results].reverse().find((result) => result.isFinal);
        const transcript = finalResult?.[0]?.transcript || '';
        if (!transcript) return;
        await handleVoiceTranscript(transcript);
      };

      recognition.onerror = (event) => {
        state.voice.isListening = false;
        if (event?.error === 'not-allowed' || event?.error === 'service-not-allowed') {
          state.voice.permissionDenied = true;
          setInputMode('text');
          renderVoiceStatus();
          return;
        }
        state.voice.restartAttempts += 1;
        renderVoiceStatus();
      };

      recognition.onend = () => {
        state.voice.isListening = false;
        renderVoiceStatus();
        scheduleVoiceRestart(400);
      };

      state.voice.recognition = recognition;
      renderVoiceStatus();
    }

    function setAllCategorySelection(selected) {
      if (!state.categories.length) return;
      for (const category of state.categories) {
        category.selected = selected;
      }
      clearQuestionState();
      renderCategories();
    }

    function setQuestActive(active) {
      state.isQuestActive = active;
      setupView.classList.toggle('hidden', active);
    }

    function renderResetCategories() {
      const previous = resetCategorySelect.value;
      resetCategorySelect.innerHTML = '';

      for (const category of state.categories) {
        const option = document.createElement('option');
        option.value = category.name;
        option.textContent = category.name;
        resetCategorySelect.appendChild(option);
      }

      if (!state.categories.length) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = ui().noCategories;
        resetCategorySelect.appendChild(option);
      }

      const exists = state.categories.some((category) => category.name === previous);
      resetCategorySelect.value = exists ? previous : (state.categories[0]?.name || '');
      resetCategorySelect.disabled = !state.categories.length;
      resetCategoryBtn.disabled = !state.categories.length;
    }

    function renderCategories() {
      categoryGrid.innerHTML = '';

      if (!state.categories.length) {
        const empty = document.createElement('p');
        empty.className = 'muted';
        empty.textContent = ui().noCategories;
        categoryGrid.appendChild(empty);
        selectAllBtn.disabled = true;
        deselectAllBtn.disabled = true;
        startQuestBtn.disabled = true;
        renderPoolStatus();
        renderQuestionCountState();
        renderResetCategories();
        return;
      }

      selectAllBtn.disabled = false;
      deselectAllBtn.disabled = false;

      state.categories.forEach((category, index) => {
        const wrapper = document.createElement('article');
        wrapper.className = 'cat';
        wrapper.classList.toggle('is-selected', category.selected);

        const label = document.createElement('label');
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = category.selected;

        const textWrapper = document.createElement('span');
        textWrapper.className = 'cat-copy';
        const nameEl = document.createElement('span');
        nameEl.className = 'cat-name';
        nameEl.textContent = category.name;

        const countEl = document.createElement('span');
        countEl.className = 'cat-count';
        countEl.textContent = `${category.remaining}/${category.total}`;

        checkbox.addEventListener('change', () => {
          state.categories[index].selected = checkbox.checked;
          wrapper.classList.toggle('is-selected', checkbox.checked);
          clearQuestionState();
          renderPoolStatus();
          renderQuestionCountState();
        });

        textWrapper.append(nameEl, countEl);
        label.append(checkbox, textWrapper);
        wrapper.appendChild(label);
        categoryGrid.appendChild(wrapper);
      });

      renderPoolStatus();
      renderQuestionCountState();
      renderResetCategories();
    }

    function markGuestSolved(question) {
      if (!state.guestProgress[question.category]) {
        state.guestProgress[question.category] = [];
      }

      if (!state.guestProgress[question.category].includes(question.id)) {
        state.guestProgress[question.category].push(question.id);
        state.pendingSolvedQuestionIds.push(question.id);
        writeGuestProgress();
      }
    }

    async function refreshOverview() {
      try {
        const selectedBefore = new Set(selectedCategories());
        const payload = await questApi('overview');
        const categories = Array.isArray(payload.categories) ? payload.categories : [];

        state.categories = categories.map((entry) => ({
          ...entry,
          selected: selectedBefore.size ? selectedBefore.has(entry.name) : false
        }));

        renderCategories();
        setupStatus.className = 'status';
        setupStatus.textContent = '';
      } catch (error) {
        setupStatus.className = 'status error';
        setupStatus.textContent = ui().failedOverview;
      }
    }

    async function loadNextQuestion() {
      const categories = selectedCategories();
      if (!categories.length) {
        setupStatus.className = 'status error';
        setupStatus.textContent = ui().emptySelection;
        return false;
      }

      if (state.isLoadingQuestion) return false;
      state.isLoadingQuestion = true;
      startQuestBtn.disabled = true;

      try {
        const payload = await questApi('next', { categories });
        const question = payload.question || null;

        if (!question) {
          clearQuestionState();
          setupStatus.className = 'status';
          setupStatus.textContent = ui().emptyPool;
          await refreshOverview();
          return false;
        }

        state.currentQuestion = question;
        setupStatus.className = 'status';
        setupStatus.textContent = '';
        questionSection.classList.remove('hidden');
        progressText.textContent = ui().progress
          .replace('{current}', String(state.roundAnswered + 1))
          .replace('{total}', String(state.roundTarget));
        questionCategory.textContent = ui().questionIn.replace('{category}', question.category);
        questionPrompt.textContent = question.prompt;
        answerInput.value = '';
        answerInput.placeholder = ui().placeholder;
        if (getQuestionType(question) === 'multiple_choice') {
          answerInput.classList.add('hidden');
          answerInput.disabled = true;
          mcOptions.classList.remove('hidden');
          renderMultipleChoiceOptions(question);
        } else {
          answerInput.classList.remove('hidden');
          answerInput.disabled = false;
          mcOptions.classList.add('hidden');
          mcOptions.innerHTML = '';
          answerInput.focus();
        }
        questionStatus.textContent = '';
        questionStatus.className = 'status';
        answerReveal.classList.add('hidden');
        answerReveal.textContent = '';
        voiceHeard.classList.add('hidden');
        voiceHeard.textContent = '';
        showAnswerBtn.classList.add('hidden');
        showAnswerBtn.textContent = ui().showAnswer;
        answerInput.disabled = false;
        submitBtn.disabled = false;
        state.awaitingRetry = false;
        state.pendingRevealAnswerEncoded = '';
        state.voice.isProcessing = false;
        state.voice.lastQuestionKey = getCurrentQuestionKey();
        state.voice.lastSubmittedTranscript = '';
        state.voice.shouldListen = state.inputMode === 'voice';
        syncInputModeUi();
        if (state.inputMode === 'voice') {
          startVoiceListening();
        }
        nextBtn.classList.add('hidden');
        return true;
      } catch (error) {
        setupStatus.className = 'status error';
        setupStatus.textContent = ui().failedQuestion;
        return false;
      } finally {
        state.isLoadingQuestion = false;
        renderQuestionCountState();
      }
    }

    async function startQuest() {
      const categories = selectedCategories();
      if (!categories.length) {
        setupStatus.className = 'status error';
        setupStatus.textContent = ui().emptySelection;
        return;
      }

      const available = getSelectedRemainingCount();
      if (available < 1) {
        setupStatus.className = 'status';
        setupStatus.textContent = ui().emptyPool;
        return;
      }

      const requested = Number(questionCountInput.value);
      state.roundTarget = Math.max(1, Math.min(Number.isInteger(requested) ? requested : 1, available));
      state.roundAnswered = 0;
      questionCountInput.value = String(state.roundTarget);
      setQuestActive(true);

      const hasQuestion = await loadNextQuestion();
      if (!hasQuestion) {
        setQuestActive(false);
      }
    }

    async function proceedAfterAnswer() {
      if (state.roundAnswered >= state.roundTarget) {
        clearQuestionState();
        setQuestActive(false);
        setupStatus.className = 'status ok';
        setupStatus.textContent = ui().roundDone;
        await refreshOverview();
        return;
      }

      await loadNextQuestion();
    }

    async function submitCurrentAnswer(forcedAnswer = null) {
      if (!state.currentQuestion || state.isSubmitting) return;

      const questionType = getQuestionType(state.currentQuestion);
      let answer = '';

      if (typeof forcedAnswer === 'string' && forcedAnswer.trim()) {
        answer = forcedAnswer.trim();
      } else if (questionType === 'multiple_choice') {
        const selectedOptionId = getSelectedOptionId();
        if (!Number.isInteger(selectedOptionId)) {
          questionStatus.className = 'status error';
          questionStatus.textContent = ui().optionMissing;
          return;
        }

        answer = String(selectedOptionId);
      } else {
        answer = answerInput.value.trim();
      }

      if (!answer) {
        questionStatus.className = 'status error';
        questionStatus.textContent = ui().yourAnswerMissing;
        return;
      }

      state.isSubmitting = true;
      submitBtn.disabled = true;
      stopVoiceListening();
      renderVoiceStatus();

      try {
        const response = await fetch('/api/quiz/answer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            questionId: state.currentQuestion.id,
            answer,
            lang: activeLang,
            mode: 'quest',
            retryAvailable: !state.awaitingRetry
          })
        });

        if (!response.ok) {
          throw new Error('answer_failed');
        }

        const payload = await response.json();

        if (payload.status === 'almost' && !state.awaitingRetry) {
          state.awaitingRetry = true;
          questionStatus.className = 'status almost';
          questionStatus.textContent = ui().almost;
          answerReveal.classList.add('hidden');
          answerReveal.textContent = '';
          state.pendingRevealAnswerEncoded = '';
          showAnswerBtn.classList.add('hidden');
          if (questionType === 'text') {
            answerInput.value = '';
            if (state.inputMode !== 'voice') {
              answerInput.focus();
            }
          }
          submitBtn.disabled = false;
          if (state.inputMode === 'voice') {
            state.voice.isProcessing = false;
            state.voice.lastSubmittedTranscript = '';
            state.voice.shouldListen = true;
            scheduleVoiceRestart(250);
          }
          return;
        }

        state.awaitingRetry = false;

        if (payload.status === 'correct') {
          if (!state.session) {
            markGuestSolved(state.currentQuestion);
          }

          questionStatus.className = 'status ok';
          questionStatus.textContent = ui().correct;
          answerReveal.classList.add('hidden');
          answerReveal.textContent = '';
          state.pendingRevealAnswerEncoded = '';
          showAnswerBtn.classList.add('hidden');
          showAnswerBtn.textContent = ui().showAnswer;
        } else {
          questionStatus.className = 'status error';
          questionStatus.textContent = ui().wrong;
          answerReveal.classList.add('hidden');
          answerReveal.textContent = '';
          if (questionType === 'multiple_choice') {
            state.pendingRevealAnswerEncoded = state.currentQuestion.answers?.[0] || '';
          } else {
            state.pendingRevealAnswerEncoded = encodeAnswerForReveal(payload.acceptedAnswer || '—');
          }
          showAnswerBtn.classList.remove('hidden');
          showAnswerBtn.textContent = ui().showAnswer;
        }

        state.roundAnswered += 1;
        nextBtn.classList.remove('hidden');
        answerInput.disabled = true;
        const selectedInput = mcOptions.querySelector('input[name="mcOption"]:checked');
        if (selectedInput) selectedInput.disabled = true;
        for (const input of mcOptions.querySelectorAll('input[name="mcOption"]')) {
          input.disabled = true;
        }
        submitBtn.disabled = true;
      } catch (error) {
        questionStatus.className = 'status error';
        questionStatus.textContent = ui().failedAnswer;
        submitBtn.disabled = false;
      } finally {
        state.isSubmitting = false;
        if (state.inputMode === 'voice') {
          state.voice.shouldListen = true;
          scheduleVoiceRestart(250);
        }
        syncInputModeUi();
      }
    }

    async function submitAnswer(event) {
      event.preventDefault();
      await submitCurrentAnswer();
    }

    async function resetCategoryProgress() {
      const category = resetCategorySelect.value;
      if (!category) {
        setupStatus.className = 'status error';
        setupStatus.textContent = ui().resetNeedsCategory;
        return;
      }

      try {
        if (state.session) {
          await questApi('reset', { category });
          setupStatus.className = 'status ok';
          setupStatus.textContent = ui().resetUserDone;
        } else {
          delete state.guestProgress[category];
          state.pendingSolvedQuestionIds = [];
          writeGuestProgressToken(null);
          writeGuestProgress();
          setupStatus.className = 'status ok';
          setupStatus.textContent = ui().resetGuestDone;
        }

        clearQuestionState();
        await refreshOverview();
      } catch (error) {
        setupStatus.className = 'status error';
        setupStatus.textContent = ui().failedReset;
      }
    }

    function renderStaticText() {
      introText.textContent = ui().intro;
      modeText.textContent = state.session ? ui().modeUser : ui().modeGuest;
      questionCountLabel.childNodes[0].nodeValue = `${ui().questionCount} `;
      selectAllBtn.textContent = ui().selectAll;
      deselectAllBtn.textContent = ui().deselectAll;
      startQuestBtn.textContent = ui().startQuest;
      nextBtn.textContent = ui().next;
      submitBtn.textContent = ui().submit;
      showAnswerBtn.textContent = ui().showAnswer;
      backLink.textContent = ui().back;
      resetLabel.textContent = ui().resetCategoryLabel;
      resetCategoryBtn.textContent = ui().resetCategory;
      answerInput.placeholder = ui().placeholder;
      textModeBtn.textContent = ui().inputModeText;
      voiceModeBtn.textContent = ui().inputModeVoice;
    }

    questionCountInput.addEventListener('input', renderQuestionCountState);
    selectAllBtn.addEventListener('click', () => setAllCategorySelection(true));
    deselectAllBtn.addEventListener('click', () => setAllCategorySelection(false));
    nextBtn.addEventListener('click', proceedAfterAnswer);
    showAnswerBtn.addEventListener('click', () => {
      const isHidden = answerReveal.classList.toggle('hidden');
      if (!isHidden) {
        const decodedAnswer = getRevealAnswerText(state.currentQuestion, state.pendingRevealAnswerEncoded);
        answerReveal.textContent = ui().answerPrefix.replace('{answer}', decodedAnswer);
      } else {
        answerReveal.textContent = '';
      }
      showAnswerBtn.textContent = isHidden ? ui().showAnswer : ui().hideAnswer;
    });
    startQuestBtn.addEventListener('click', startQuest);
    answerForm.addEventListener('submit', submitAnswer);
    resetCategoryBtn.addEventListener('click', resetCategoryProgress);
    textModeBtn.addEventListener('click', () => setInputMode('text'));
    voiceModeBtn.addEventListener('click', () => setInputMode('voice'));

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        stopVoiceListening();
      } else if (state.inputMode === 'voice') {
        state.voice.shouldListen = true;
        scheduleVoiceRestart(400);
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter') return;
      if (!isNextQuestionVisible()) return;
      if (document.activeElement === showAnswerBtn) return;
      event.preventDefault();
      proceedAfterAnswer();
    });

    async function init() {
      state.session = await fetchSession();
      renderStaticText();
      setupVoiceRecognition();
      setInputMode('text');
      await refreshOverview();
    }

    init();
  </script>
