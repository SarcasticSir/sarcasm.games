<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog · Lobby</title>
  <style>
    :root { --bg:#0b0c10; --card:#1d1f27; --text:#eef1f7; --muted:#aeb6c8; --border:#303444; --accent:#50d3a2; --danger:#ff6b6b; }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 system-ui,Segoe UI,Roboto,Arial;padding:20px}
    .wrap{max-width:1200px;margin:0 auto;display:grid;gap:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
    h1,h2,h3{margin:0 0 8px}
    p{margin:0;color:var(--muted)}
    .grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));margin-top:12px}
    label{display:block;margin-bottom:6px;color:var(--muted);font-size:.93rem}
    input,button{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--border);background:#12141c;color:var(--text);font:inherit}
    button{cursor:pointer;border:0;background:var(--accent);font-weight:700;color:#082117}
    button.secondary{background:#3b4254;color:var(--text);border:1px solid var(--border)}
    button.ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
    .actions{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-top:12px}
    .status{min-height:20px;margin-top:8px;font-weight:600;color:var(--muted)}
    .status.error{color:var(--danger)}
    .seats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:10px}
    .seat{border:1px solid var(--border);border-radius:10px;padding:10px;background:#131722;display:grid;gap:8px}
    .pill{display:inline-block;border-radius:999px;padding:2px 8px;font-size:.82rem;font-weight:700}
    .open{background:#203a31;color:#9cf0d0;border:1px solid #2d6351}
    .taken{background:#3a2931;color:#ffb4c3;border:1px solid #6c3c4a}
    .ready{background:#1f3e31;color:#9cf0d0;border:1px solid #2d6351}
    .not-ready{background:#3d3223;color:#ffd28f;border:1px solid #7a5d31}
    .invite-list{display:grid;gap:8px;margin-top:10px}
    .invite-item{border:1px solid var(--border);padding:10px;border-radius:10px;background:#131722}

    .game-layout{display:grid;gap:12px;grid-template-columns:2fr 1fr}
    .board-shell{background:#0f1320;border:1px solid var(--border);border-radius:12px;padding:12px}
    .board{position:relative;aspect-ratio:1/1;width:100%;border-radius:12px;background:radial-gradient(circle at center,#16233a 0%,#101828 60%,#0b1220 100%)}
    .ring{position:absolute;inset:10%;border:1px dashed #38517a;border-radius:50%}
    .center-goal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:18%;height:18%;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#243959;color:#eaf1ff;font-weight:700;border:2px solid #46679b}

    .track-node{position:absolute;width:16px;height:16px;border-radius:50%;background:#223657;border:1px solid #5574a4;transform:translate(-50%,-50%)}
    .track-node.exit{background:#355c32;border-color:#7cda74;box-shadow:0 0 0 2px #7cda7440}
    .track-node.immune{box-shadow:0 0 0 2px #f8d26a}

    .lane-node{position:absolute;width:14px;height:14px;border-radius:50%;background:#324d75;border:1px solid #688abd;transform:translate(-50%,-50%)}

    .start-zone{position:absolute;width:84px;min-height:62px;padding:6px;border-radius:10px;background:#1b2f24;border:1px solid #3e6e54;display:grid;gap:4px;justify-items:center;transform:translate(-50%,-50%)}
    .zone-label{font-size:.68rem;color:#cfe8da;font-weight:700;text-align:center}
    .piece-row{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
    .piece{width:10px;height:10px;border-radius:50%;border:1px solid #ffffff99}
    .piece-token{position:absolute;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;border:1px solid #fff;color:#07101f;z-index:4;box-shadow:0 1px 4px #0008}
    .team-1{background:#d85f8f}.team-2{background:#5fc7d8}.team-3{background:#c6d85f}.team-4{background:#9d7dff}

    .side-panel{display:grid;gap:10px}
    .panel{border:1px solid var(--border);border-radius:10px;background:#131722;padding:10px}
    .cards{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .card-btn{padding:6px 9px;border-radius:8px;border:1px solid #3a4a68;background:#1b2740;font-size:.85rem;cursor:pointer}
    .card-btn.active{outline:2px solid #50d3a2}
    .helper{font-size:.9rem;color:var(--muted)}
    .hidden{display:none}
    code{word-break:break-all}

    @media (max-width: 900px){.game-layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <section id="lobbyIntro" class="card">
      <h1>Dog lobby</h1>
      <p>Join med romkode + velg ledig sete. Host kan starte når alle seter er fylt.</p>
    </section>

    <section id="roomControls" class="card">
      <h2>Rom</h2>
      <div class="grid">
        <div>
          <label for="roomId">Romkode</label>
          <input id="roomId" placeholder="DOG7K2" />
        </div>
        <div>
          <label for="playerId">Ditt navn / spiller-ID</label>
          <input id="playerId" placeholder="f.eks. Marius" />
        </div>
      </div>
      <div class="actions">
        <button id="loadRoomBtn" class="secondary" type="button">Hent romstatus</button>
        <button id="copyRoomCodeBtn" class="ghost" type="button">Kopier romkode</button>
        <button id="newRoomBtn" class="secondary" type="button">Lag nytt rom</button>
      </div>
      <p id="status" class="status">Klar.</p>
    </section>

    <section id="seatsSection" class="card">
      <h2>Seter</h2>
      <div id="roomMeta"></div>
      <div id="seats" class="seats"></div>
      <div id="hostStartActions" class="actions">
        <button id="startMatchBtn" type="button">Start spill (host)</button>
      </div>
    </section>

    <section id="gameRoom" class="card hidden">
      <h2>Spillerom og spillbrett</h2>
      <div class="game-layout">
        <div class="board-shell">
          <div id="board" class="board"></div>
        </div>
        <div class="side-panel">
          <div id="turnPanel" class="panel"></div>
          <div id="myHand" class="panel"></div>
          <div id="actionPanel" class="panel"></div>
        </div>
      </div>
    </section>

    <section id="invitesSection" class="card">
      <h2>Invite-lenker per sete</h2>
      <p>Host kan kopiere en lenke per ledig plass og sende direkte til venn.</p>
      <div id="invites" class="invite-list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const HOST_DEFAULT_ENDPOINTS = Object.freeze({
      'sarcasm.games': 'https://hmwzdnebhqavatuxmtki.supabase.co/functions/v1/dog-room',
      'www.sarcasm.games': 'https://hmwzdnebhqavatuxmtki.supabase.co/functions/v1/dog-room'
    });

    const REALTIME_HEALTHY_GRACE_MS = 10000;

    function resolveDogEndpoint() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = params.get('endpoint');
      const fromGlobal = window.DOG_ENDPOINT;
      const fromStorage = window.localStorage.getItem('dog.endpoint');
      const inferred = HOST_DEFAULT_ENDPOINTS[window.location.hostname] || '';
      const endpoint = fromQuery || fromGlobal || fromStorage || inferred;
      if (fromQuery || fromGlobal || fromStorage) {
        window.localStorage.setItem('dog.endpoint', endpoint);
      }
      return endpoint;
    }

    const DOG_ENDPOINT = resolveDogEndpoint();
    const SHOULD_EMBED_ENDPOINT_IN_INVITES = !HOST_DEFAULT_ENDPOINTS[window.location.hostname];
    const SUPABASE_URL = (() => {
      if (!DOG_ENDPOINT) return '';
      try {
        const endpointUrl = new URL(DOG_ENDPOINT);
        return `${endpointUrl.protocol}//${endpointUrl.hostname}`;
      } catch (_error) {
        return '';
      }
    })();
    const SUPABASE_ANON_KEY = (() => {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = params.get('supabaseAnonKey');
      const fromGlobal = window.DOG_SUPABASE_ANON_KEY;
      const fromStorage = window.localStorage.getItem('dog.supabaseAnonKey');
      const key = fromQuery || fromGlobal || fromStorage || '';
      if (key) window.localStorage.setItem('dog.supabaseAnonKey', key);
      return key;
    })();
    const TRACK_SPACES_BETWEEN_PLAYERS = 16;

    let snapshot = null;
    let privateView = null;
    let preferredSeat = null;
    let pollTimer = null;
    let selectedCardId = null;
    let selectedExchangeCardId = null;
    let legalMovesForCard = [];
    let selectedMoveIndex = -1;
    let isLoadingRoom = false;
    let refreshRequestedWhileLoading = false;
    let pendingLoadRoomOptions = null;
    let lastRealtimeMessageAt = 0;
    let realtimeClient = null;
    let realtimeRoomChannel = null;
    let subscribedRoomId = null;

    const roomIdEl = document.getElementById('roomId');
    const playerIdEl = document.getElementById('playerId');
    const statusEl = document.getElementById('status');
    const roomMetaEl = document.getElementById('roomMeta');
    const seatsEl = document.getElementById('seats');
    const invitesEl = document.getElementById('invites');
    const startMatchBtnEl = document.getElementById('startMatchBtn');
    const hostStartActionsEl = document.getElementById('hostStartActions');
    const gameRoomEl = document.getElementById('gameRoom');
    const lobbyIntroEl = document.getElementById('lobbyIntro');
    const roomControlsEl = document.getElementById('roomControls');
    const seatsSectionEl = document.getElementById('seatsSection');
    const invitesSectionEl = document.getElementById('invitesSection');
    const boardEl = document.getElementById('board');
    const turnPanelEl = document.getElementById('turnPanel');
    const myHandEl = document.getElementById('myHand');
    const actionPanelEl = document.getElementById('actionPanel');

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle('error', isError);
    }

    function getQueryDefaults() {
      const params = new URLSearchParams(window.location.search);
      const room = params.get('room');
      const player = params.get('player');
      const teamNo = params.get('teamNo');
      const slotInTeam = params.get('slotInTeam');
      if (room) roomIdEl.value = room;
      if (player) playerIdEl.value = player;
      if (teamNo && slotInTeam) preferredSeat = { teamNo: Number(teamNo), slotInTeam: Number(slotInTeam) };
    }

    async function request(command) {
      if (!DOG_ENDPOINT) throw new Error('Missing endpoint configuration for this environment');
      const res = await fetch(DOG_ENDPOINT, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(command)
      });
      const body = await res.json();
      if (!res.ok || !body.ok) throw new Error(body.error || 'Request failed');
      return body.result;
    }

    function buildIdempotencyKey(prefix) {
      return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    }

    function markRealtimeHealthy() {
      lastRealtimeMessageAt = Date.now();
    }

    function isRealtimeHealthy() {
      return Boolean(lastRealtimeMessageAt && (Date.now() - lastRealtimeMessageAt) <= REALTIME_HEALTHY_GRACE_MS);
    }

    function normalize(result) {
      if (result && result.public) {
        return {
          public: result.public,
          private: result.private ?? null,
          response: result.response ?? null
        };
      }
      return { public: result, private: null, response: null };
    }

    async function call(command) {
      const next = normalize(await request(command));
      const incomingVersion = Number(next.public?.version ?? -1);
      const currentVersion = Number(snapshot?.version ?? -1);

      if (incomingVersion >= currentVersion) {
        snapshot = next.public;
        privateView = next.private;
      }

      return {
        ...next,
        wasStale: incomingVersion < currentVersion
      };
    }

    function seatNo(teamNo, slotInTeam, teamCount) {
      return (slotInTeam - 1) * teamCount + teamNo;
    }

    function allSeats(config) {
      const seats = [];
      for (let slot = 1; slot <= config.playersPerTeam; slot += 1) {
        for (let team = 1; team <= config.teamCount; team += 1) {
          seats.push({ teamNo: team, slotInTeam: slot, seatNo: seatNo(team, slot, config.teamCount) });
        }
      }
      return seats.sort((a, b) => a.seatNo - b.seatNo);
    }

    function toPoint(angle, radius) {
      const x = 50 + Math.cos(angle) * radius;
      const y = 50 + Math.sin(angle) * radius;
      return { x, y };
    }

    function appendNode(className, point) {
      const node = document.createElement('div');
      node.className = className;
      node.style.left = `${point.x}%`;
      node.style.top = `${point.y}%`;
      boardEl.appendChild(node);
      return node;
    }

    function teamClass(teamNo) {
      return `team-${((teamNo - 1) % 4) + 1}`;
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      const ring = document.createElement('div');
      ring.className = 'ring';
      boardEl.appendChild(ring);

      const centerGoal = document.createElement('div');
      centerGoal.className = 'center-goal';
      centerGoal.textContent = 'MÅL';
      boardEl.appendChild(centerGoal);

      const players = [...(snapshot.players || [])].sort((a, b) => a.seatNo - b.seatNo);
      const playerCount = Math.max(snapshot.maxPlayers || players.length, 4);
      const trackNodeCount = playerCount * TRACK_SPACES_BETWEEN_PLAYERS;
      const gameState = snapshot.match?.gameState || null;
      const pieces = gameState?.pieces || [];
      const piecesByOwner = Object.fromEntries(players.map((player) => [player.playerId, []]));

      pieces.forEach((piece) => {
        if (piecesByOwner[piece.ownerId]) {
          piecesByOwner[piece.ownerId].push(piece);
        }
      });

      for (let i = 0; i < trackNodeCount; i += 1) {
        const angle = (-Math.PI / 2) + ((Math.PI * 2) * i / trackNodeCount);
        const point = toPoint(angle, 41);
        const node = appendNode('track-node', point);

        const isExit = (i % TRACK_SPACES_BETWEEN_PLAYERS) === 0;
        if (isExit) {
          node.classList.add('exit', 'immune');
        }
      }

      players.forEach((player, idx) => {
        const angle = (-Math.PI / 2) + ((Math.PI * 2) * idx / playerCount);

        for (let laneStep = 1; laneStep <= 4; laneStep += 1) {
          const lanePoint = toPoint(angle, 41 - (laneStep * 7));
          appendNode(`lane-node ${teamClass(player.teamNo)}`, lanePoint);
        }

        const startPoint = toPoint(angle, 55);
        const startZone = appendNode(`start-zone ${teamClass(player.teamNo)}`, startPoint);
        const ownerPieces = piecesByOwner[player.playerId] || [];
        const inStartCount = ownerPieces.filter((piece) => piece.isInStart).length;
        const inHomeCount = ownerPieces.filter((piece) => piece.isInHome).length;
        startZone.innerHTML = `
          <div class="zone-label">BO · ${player.playerId}</div>
          <div class="zone-label" style="font-size:.72rem;opacity:.85;">Start: ${inStartCount} · Home: ${inHomeCount}</div>
          <div class="piece-row"></div>
        `;

        const pieceRow = startZone.querySelector('.piece-row');
        for (let pieceIndex = 0; pieceIndex < inStartCount; pieceIndex += 1) {
          const piece = document.createElement('span');
          piece.className = `piece ${teamClass(player.teamNo)}`;
          pieceRow.appendChild(piece);
        }

        ownerPieces
          .filter((piece) => piece.isInHome)
          .forEach((piece) => {
            const laneStep = (piece.homeIndex ?? 0) + 1;
            const lanePoint = toPoint(angle, 41 - (laneStep * 7));
            const token = appendNode(`piece-token ${teamClass(player.teamNo)}`, lanePoint);
            token.textContent = player.playerId.slice(0, 1).toUpperCase();
          });
      });

      pieces
        .filter((piece) => piece.isOnBoard && Number.isInteger(piece.position))
        .forEach((piece) => {
          const owner = players.find((player) => player.playerId === piece.ownerId);
          if (!owner) {
            return;
          }

          const square = ((piece.position % trackNodeCount) + trackNodeCount) % trackNodeCount;
          const angle = (-Math.PI / 2) + ((Math.PI * 2) * square / trackNodeCount);
          const point = toPoint(angle, 41);
          const token = appendNode(`piece-token ${teamClass(owner.teamNo)}`, point);
          token.textContent = owner.playerId.slice(0, 1).toUpperCase();
          if (piece.isImmune) {
            token.style.outline = '2px solid #ffe066';
          }
        });
    }

    function selectedCard() {
      const cards = privateView?.hand || [];
      return cards.find((card) => card.id === selectedCardId) || null;
    }

    function getCurrentPlayerId() {
      return playerIdEl.value.trim();
    }

    function isLocalPlayersTurn() {
      return Boolean(snapshot?.match?.phase === 'play' && snapshot?.match?.turnPlayerId === getCurrentPlayerId());
    }

    function resetMoveSelection() {
      legalMovesForCard = [];
      selectedMoveIndex = -1;
    }

    function resetAllSelections() {
      selectedCardId = null;
      selectedExchangeCardId = null;
      resetMoveSelection();
    }

    function buildActionText(rank) {
      if (!rank) return 'Velg et kort for å se mulige handlinger.';
      if (rank === '7') return '7 split: velg rute over flere brikker, og bekreft hele sekvensen.';
      if (rank === 'J') return 'Knekt: velg en av dine brikker og en lovlig brikke å bytte med.';
      if (rank === 'Joker') return 'Joker: velg hvilket kort Joker skal representere før bekreft.';
      if (rank === 'A' || rank === 'K') return `${rank}: velg mellom start-utgang eller vanlig forflytning.`;
      if (rank === '4') return '4: velg mellom 4 frem eller 4 bakover.';
      return `${rank}: velg brikke og bekreft trekk.`;
    }

    function renderPanels() {
      const match = snapshot.match || {};
      const currentPlayerId = getCurrentPlayerId();
      const localTurn = isLocalPlayersTurn();
      const pendingPreview = privateView?.pendingPreview || null;
      turnPanelEl.innerHTML = `
        <h3>Tur</h3>
        <p>Aktiv spiller: <strong>${match.turnPlayerId ?? '-'}</strong></p>
        <p>Fase: <strong>${match.phase ?? '-'}</strong></p>
        <p>${localTurn ? 'Det er din tur.' : 'Venter på annen spiller.'}</p>
      `;

      const cards = privateView?.hand || [];
      const cardHtml = cards.length
        ? cards.map((card) => `<button class="card-btn ${card.id === selectedCardId ? 'active' : ''}" data-card-id="${card.id}">${card.rank}${card.suit ? ` ${card.suit}` : ''}</button>`).join('')
        : '<p class="helper">Ingen hånddata ennå. Sett spiller-ID før du henter rom.</p>';
      myHandEl.innerHTML = `<h3>Min hånd</h3><div class="cards">${cardHtml}</div>`;

      myHandEl.querySelectorAll('[data-card-id]').forEach((button) => {
        button.addEventListener('click', () => {
          selectedCardId = button.getAttribute('data-card-id');
          selectedExchangeCardId = button.getAttribute('data-card-id');
          resetMoveSelection();
          renderPanels();
        });
      });

      if (match.phase === 'exchange') {
        const exchangeSubmitted = Boolean(privateView?.pendingExchangeSubmitted);
        const selectedExchangeCard = cards.find((entry) => entry.id === selectedExchangeCardId) || null;

        actionPanelEl.innerHTML = `
          <h3>Handling</h3>
          <p class="helper">Exchange-fase: velg ett kort og send til lagkamerat.</p>
          <p class="helper">${exchangeSubmitted ? 'Kort er sendt. Venter på andre spillere.' : 'Du må sende ett kort for å komme videre.'}</p>
          <p class="helper">Valgt kort: <strong>${selectedExchangeCard ? `${selectedExchangeCard.rank}${selectedExchangeCard.suit ? ` ${selectedExchangeCard.suit}` : ''}` : '-'}</strong></p>
          <div class="actions" style="margin-top:10px;grid-template-columns:1fr 1fr;">
            <button type="button" id="submitExchangeBtn" ${selectedExchangeCard && !exchangeSubmitted ? '' : 'disabled'}>Send exchange card</button>
            <button type="button" class="ghost" id="clearExchangeChoiceBtn" ${selectedExchangeCard && !exchangeSubmitted ? '' : 'disabled'}>Clear selection</button>
          </div>
        `;

        const submitExchangeBtn = document.getElementById('submitExchangeBtn');
        if (submitExchangeBtn) {
          submitExchangeBtn.addEventListener('click', async () => {
            if (!selectedExchangeCard || !currentPlayerId) return;
            try {
              await call({
                type: 'exchange_card',
                roomId: snapshot.roomId,
                playerId: currentPlayerId,
                cardId: selectedExchangeCard.id,
                expectedVersion: snapshot.version,
                idempotencyKey: buildIdempotencyKey('exchange-card')
              });
              setStatus('Exchange-kort sendt. Venter på resten av laget/spillerne.');
              await loadRoom();
            } catch (error) {
              setStatus(`Kunne ikke sende exchange-kort: ${String(error)}`, true);
            }
          });
        }

        const clearExchangeChoiceBtn = document.getElementById('clearExchangeChoiceBtn');
        if (clearExchangeChoiceBtn) {
          clearExchangeChoiceBtn.addEventListener('click', () => {
            selectedExchangeCardId = null;
            renderPanels();
          });
        }

        return;
      }

      const card = selectedCard();
      const rank = card?.rank || null;
      const hasSelectedMove = selectedMoveIndex >= 0 && selectedMoveIndex < legalMovesForCard.length;
      const legalMoveOptions = legalMovesForCard.length
        ? legalMovesForCard.map((move, index) => `<button type="button" class="card-btn ${index === selectedMoveIndex ? 'active' : ''}" data-move-index="${index}">${index + 1}. ${JSON.stringify(move)}</button>`).join('')
        : '<p class="helper">Ingen lovlige trekk lastet.</p>';

      actionPanelEl.innerHTML = `
        <h3>Handling</h3>
        <p class="helper">${buildActionText(rank)}</p>
        <p class="helper">${pendingPreview ? 'Preview er aktiv. Bekreft eller avbryt.' : 'Hent lovlige trekk før preview.'}</p>
        <div class="actions" style="margin-top:10px;grid-template-columns:1fr 1fr;">
          <button type="button" id="loadMovesBtn" ${rank && localTurn ? '' : 'disabled'}>Load legal moves</button>
          <button type="button" id="previewMoveBtn" class="secondary" ${rank && localTurn && hasSelectedMove && !pendingPreview ? '' : 'disabled'}>Start preview</button>
        </div>
        <div class="cards" style="margin-top:10px;">${legalMoveOptions}</div>
        <div class="actions" style="margin-top:10px;grid-template-columns:1fr 1fr;">
          <button type="button" id="confirmMoveBtn" ${pendingPreview && localTurn ? '' : 'disabled'}>Confirm</button>
          <button type="button" class="secondary" id="cancelPreviewBtn" ${pendingPreview && localTurn ? '' : 'disabled'}>Cancel preview</button>
        </div>
        <div class="actions" style="margin-top:10px;grid-template-columns:1fr 1fr;">
          <button type="button" class="ghost" id="passTurnBtn" ${localTurn && !pendingPreview ? '' : 'disabled'}>Pass (blocked)</button>
          <button type="button" class="ghost" id="clearChoiceBtn" ${rank ? '' : 'disabled'}>Clear selection</button>
        </div>
      `;

      actionPanelEl.querySelectorAll('[data-move-index]').forEach((button) => {
        button.addEventListener('click', () => {
          selectedMoveIndex = Number(button.getAttribute('data-move-index'));
          renderPanels();
        });
      });

      const loadMovesBtn = document.getElementById('loadMovesBtn');
      if (loadMovesBtn) {
        loadMovesBtn.addEventListener('click', async () => {
          if (!rank || !currentPlayerId) return;
          try {
            const result = await call({
              type: 'request_legal_moves',
              roomId: snapshot.roomId,
              playerId: currentPlayerId,
              card: rank,
              expectedVersion: snapshot.version,
              idempotencyKey: buildIdempotencyKey('legal-moves')
            });
            legalMovesForCard = result.response?.moves || [];
            selectedMoveIndex = legalMovesForCard.length ? 0 : -1;
            setStatus(legalMovesForCard.length ? `Fant ${legalMovesForCard.length} lovlige trekk.` : 'Ingen lovlige trekk for valgt kort.', !legalMovesForCard.length);
            renderPanels();
          } catch (error) {
            setStatus(`Kunne ikke hente lovlige trekk: ${String(error)}`, true);
          }
        });
      }

      const previewMoveBtn = document.getElementById('previewMoveBtn');
      if (previewMoveBtn) {
        previewMoveBtn.addEventListener('click', async () => {
          const move = legalMovesForCard[selectedMoveIndex];
          if (!rank || !move || !currentPlayerId) return;
          try {
            await call({
              type: 'start_move_preview',
              roomId: snapshot.roomId,
              playerId: currentPlayerId,
              card: rank,
              move,
              expectedVersion: snapshot.version,
              idempotencyKey: buildIdempotencyKey('start-preview')
            });
            setStatus('Preview startet. Bekreft eller avbryt.');
            await loadRoom();
          } catch (error) {
            setStatus(`Kunne ikke starte preview: ${String(error)}`, true);
          }
        });
      }

      const confirmMoveBtn = document.getElementById('confirmMoveBtn');
      if (confirmMoveBtn) {
        confirmMoveBtn.addEventListener('click', async () => {
          if (!currentPlayerId) return;
          try {
            await call({
              type: 'confirm_move',
              roomId: snapshot.roomId,
              playerId: currentPlayerId,
              expectedVersion: snapshot.version,
              idempotencyKey: buildIdempotencyKey('confirm-move')
            });
            resetAllSelections();
            setStatus('Trekk bekreftet.');
            await loadRoom();
          } catch (error) {
            setStatus(`Kunne ikke bekrefte trekk: ${String(error)}`, true);
          }
        });
      }

      const cancelPreviewBtn = document.getElementById('cancelPreviewBtn');
      if (cancelPreviewBtn) {
        cancelPreviewBtn.addEventListener('click', async () => {
          if (!currentPlayerId) return;
          try {
            await call({
              type: 'cancel_move_preview',
              roomId: snapshot.roomId,
              playerId: currentPlayerId,
              expectedVersion: snapshot.version,
              idempotencyKey: buildIdempotencyKey('cancel-preview')
            });
            setStatus('Preview avbrutt.');
            await loadRoom();
          } catch (error) {
            setStatus(`Kunne ikke avbryte preview: ${String(error)}`, true);
          }
        });
      }


      const passTurnBtn = document.getElementById('passTurnBtn');
      if (passTurnBtn) {
        passTurnBtn.addEventListener('click', async () => {
          if (!currentPlayerId) return;
          try {
            await call({
              type: 'pass_turn_if_blocked',
              roomId: snapshot.roomId,
              playerId: currentPlayerId,
              expectedVersion: snapshot.version,
              idempotencyKey: buildIdempotencyKey('pass-turn')
            });
            resetAllSelections();
            setStatus('Tur passert (ingen lovlige trekk).');
            await loadRoom();
          } catch (error) {
            setStatus(`Kunne ikke passe tur: ${String(error)}`, true);
          }
        });
      }

      const clearBtn = document.getElementById('clearChoiceBtn');
      if (clearBtn) {
        clearBtn.addEventListener('click', () => {
          selectedCardId = null;
          resetMoveSelection();
          renderPanels();
        });
      }
    }

    function render() {
      if (!snapshot) return;
      const players = snapshot.players || [];
      const seats = allSeats(snapshot.config);
      const currentPlayer = playerIdEl.value.trim();
      const isHost = currentPlayer && snapshot.hostPlayerId === currentPlayer;
      const full = players.length === snapshot.maxPlayers;
      const allReady = full && players.every((player) => player.ready === true);

      roomMetaEl.innerHTML = `<p>Rom: <strong>${snapshot.roomId}</strong> · ${players.length}/${snapshot.maxPlayers} spillere · status: ${snapshot.status} · ready: ${players.filter((player) => player.ready).length}/${snapshot.maxPlayers}</p>`;
      seatsEl.innerHTML = '';
      invitesEl.innerHTML = '';

      seats.forEach((seat) => {
        const player = players.find((p) => p.teamNo === seat.teamNo && p.slotInTeam === seat.slotInTeam);
        const item = document.createElement('div');
        item.className = 'seat';
        item.innerHTML = `
          <strong>Sete ${seat.seatNo}</strong>
          <div>Lag ${seat.teamNo}, plass ${seat.slotInTeam}</div>
          <span class="pill ${player ? 'taken' : 'open'}">${player ? `Tatt av ${player.playerId}` : 'Ledig'}</span>
          ${player ? `<span class="pill ${player.ready ? 'ready' : 'not-ready'}">${player.ready ? 'Ready' : 'Not ready'}</span>` : ''}
        `;

        if (!player && currentPlayer && snapshot.status === 'lobby') {
          const joinBtn = document.createElement('button');
          joinBtn.type = 'button';
          joinBtn.className = 'secondary';
          joinBtn.textContent = 'Ta denne plassen';
          joinBtn.addEventListener('click', async () => {
            try {
              await call({
                type: 'join_room',
                roomId: snapshot.roomId,
                playerId: currentPlayer,
                teamNo: seat.teamNo,
                slotInTeam: seat.slotInTeam,
                expectedVersion: snapshot.version,
                idempotencyKey: buildIdempotencyKey('join-room')
              });
              setStatus(`Du tok sete ${seat.seatNo}.`);
              await loadRoom();
            } catch (error) {
              setStatus(`Kunne ikke ta sete: ${String(error)}`, true);
            }
          });
          item.appendChild(joinBtn);
        }

        if (player && currentPlayer && player.playerId === currentPlayer && snapshot.status === 'lobby') {
          const readyBtn = document.createElement('button');
          readyBtn.type = 'button';
          readyBtn.className = player.ready ? 'ghost' : '';
          readyBtn.textContent = player.ready ? 'Sett som ikke ready' : 'Sett som ready';
          readyBtn.addEventListener('click', async () => {
            try {
              await call({
                type: 'set_ready',
                roomId: snapshot.roomId,
                playerId: currentPlayer,
                isReady: !player.ready,
                expectedVersion: snapshot.version,
                idempotencyKey: buildIdempotencyKey('set-ready')
              });
              setStatus(!player.ready ? 'Du er markert som ready.' : 'Du er markert som ikke ready.');
              await loadRoom();
            } catch (error) {
              setStatus(`Kunne ikke oppdatere ready-status: ${String(error)}`, true);
            }
          });
          item.appendChild(readyBtn);
        }

        seatsEl.appendChild(item);

        if (!player && isHost) {
          const inviteUrl = new URL(window.location.href);
          inviteUrl.search = '';
          inviteUrl.searchParams.set('room', snapshot.roomId);
          inviteUrl.searchParams.set('teamNo', String(seat.teamNo));
          inviteUrl.searchParams.set('slotInTeam', String(seat.slotInTeam));
          if (DOG_ENDPOINT && SHOULD_EMBED_ENDPOINT_IN_INVITES) inviteUrl.searchParams.set('endpoint', DOG_ENDPOINT);
          const invite = document.createElement('div');
          invite.className = 'invite-item';
          invite.innerHTML = `<div>Sete ${seat.seatNo} (lag ${seat.teamNo}, plass ${seat.slotInTeam})</div><code>${inviteUrl.toString()}</code>`;
          const copyBtn = document.createElement('button');
          copyBtn.type = 'button';
          copyBtn.className = 'ghost';
          copyBtn.textContent = 'Kopier link';
          copyBtn.addEventListener('click', async () => {
            await navigator.clipboard.writeText(inviteUrl.toString());
            setStatus(`Invite-link for sete ${seat.seatNo} kopiert.`);
          });
          invite.appendChild(copyBtn);
          invitesEl.appendChild(invite);
        }
      });

      startMatchBtnEl.disabled = !isHost || !allReady || snapshot.status !== 'lobby';
      hostStartActionsEl.classList.toggle('hidden', !isHost);

      const hasMatch = snapshot.status !== 'lobby' && snapshot.match;
      lobbyIntroEl.classList.toggle('hidden', hasMatch);
      roomControlsEl.classList.toggle('hidden', hasMatch);
      seatsSectionEl.classList.toggle('hidden', hasMatch);
      invitesSectionEl.classList.toggle('hidden', hasMatch || !isHost);
      gameRoomEl.classList.toggle('hidden', !hasMatch);

      if (hasMatch) {
        renderBoard();
        renderPanels();
        if (snapshot.match?.winner) {
          setStatus(`Spillet er ferdig. Vinner: ${JSON.stringify(snapshot.match.winner)}`);
        }
      } else {
        resetAllSelections();
      }
    }

    async function fetchSnapshot(roomId, playerId) {
      return call({ type: 'attach', roomId, playerId: playerId || undefined });
    }

    async function handleRealtimeRoomUpdate(payload) {
      const rowState = payload?.new?.state;
      const incomingVersion = Number(rowState?.version ?? -1);
      const currentVersion = Number(snapshot?.version ?? -1);
      markRealtimeHealthy();

      if (!Number.isFinite(incomingVersion) || incomingVersion < 0) {
        await loadRoom({ forceAttach: true, source: 'realtime-invalid-payload' });
        return;
      }

      if (incomingVersion < currentVersion) {
        return;
      }

      await loadRoom({ forceAttach: true, source: 'realtime-update' });
    }

    function initRealtimeClient() {
      if (realtimeClient || !SUPABASE_URL || !SUPABASE_ANON_KEY || !window.supabase?.createClient) {
        return;
      }

      realtimeClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        realtime: { params: { eventsPerSecond: 8 } }
      });
    }

    function teardownRealtimeSubscription() {
      if (!realtimeClient || !realtimeRoomChannel) {
        subscribedRoomId = null;
        return;
      }

      realtimeClient.removeChannel(realtimeRoomChannel);
      realtimeRoomChannel = null;
      subscribedRoomId = null;
    }

    function ensureRealtimeSubscription(roomId) {
      initRealtimeClient();
      if (!realtimeClient || !roomId) {
        teardownRealtimeSubscription();
        return;
      }

      if (subscribedRoomId === roomId && realtimeRoomChannel) {
        return;
      }

      teardownRealtimeSubscription();
      const normalizedRoomId = roomId.toUpperCase();
      const channelName = `dog-room-${normalizedRoomId}`;
      realtimeRoomChannel = realtimeClient
        .channel(channelName)
        .on('postgres_changes', {
          event: 'UPDATE',
          schema: 'public',
          table: 'dog_room_states',
          filter: `room_id=eq.${normalizedRoomId}`
        }, (payload) => {
          handleRealtimeRoomUpdate(payload).catch((error) => {
            console.error('Realtime room update failed', error);
          });
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            subscribedRoomId = normalizedRoomId;
            markRealtimeHealthy();
            return;
          }

          if (status === 'CLOSED' || status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
            lastRealtimeMessageAt = 0;
            await loadRoom({ forceAttach: true, source: `realtime-${status.toLowerCase()}` });
          }
        });
    }

    async function tryAutoJoinPreferredSeat() {
      if (!snapshot || !preferredSeat) return;
      const currentPlayer = playerIdEl.value.trim();
      if (!currentPlayer) return;
      const alreadyJoined = (snapshot.players || []).some((p) => p.playerId === currentPlayer);
      if (alreadyJoined) {
        preferredSeat = null;
        return;
      }
      const taken = (snapshot.players || []).some((p) => p.teamNo === preferredSeat.teamNo && p.slotInTeam === preferredSeat.slotInTeam);
      if (taken) {
        setStatus('Setet i invite-linken er allerede tatt. Velg et annet.', true);
        preferredSeat = null;
        return;
      }
      await call({
        type: 'join_room',
        roomId: snapshot.roomId,
        playerId: currentPlayer,
        teamNo: preferredSeat.teamNo,
        slotInTeam: preferredSeat.slotInTeam,
        expectedVersion: snapshot.version,
        idempotencyKey: buildIdempotencyKey('autojoin-seat')
      });
      setStatus('Du ble automatisk satt i setet fra invite-linken.');
      preferredSeat = null;
      await fetchSnapshot(snapshot.roomId, currentPlayer);
      render();
    }

    async function loadRoom(options = {}) {
      const {
        forceAttach = false,
        allowRealtimeSkip = false,
        silentSuccess = false
      } = options;
      const roomId = roomIdEl.value.trim().toUpperCase();
      const playerId = playerIdEl.value.trim();
      if (!roomId) {
        setStatus('Skriv inn romkode først.', true);
        teardownRealtimeSubscription();
        return;
      }

      if (isLoadingRoom) {
        refreshRequestedWhileLoading = true;
        pendingLoadRoomOptions = {
          forceAttach: Boolean(forceAttach || pendingLoadRoomOptions?.forceAttach),
          allowRealtimeSkip: Boolean(allowRealtimeSkip || pendingLoadRoomOptions?.allowRealtimeSkip),
          silentSuccess: Boolean(silentSuccess && pendingLoadRoomOptions?.silentSuccess !== false)
        };
        return;
      }

      isLoadingRoom = true;
      pendingLoadRoomOptions = null;
      try {
        const shouldSkipAttach = allowRealtimeSkip && !forceAttach && isRealtimeHealthy();
        const result = shouldSkipAttach
          ? { wasStale: false }
          : await fetchSnapshot(roomId, playerId);

        ensureRealtimeSubscription(roomId);
        render();
        await tryAutoJoinPreferredSeat();

        if (!silentSuccess) {
          if (shouldSkipAttach) {
            setStatus('Realtime synk aktiv. Polling bruker ikke attach akkurat nå.');
          } else if (result.wasStale) {
            setStatus('Ignorerte utdatert snapshot.');
          } else {
            setStatus('Romstatus oppdatert.');
          }
        }
      } catch (error) {
        setStatus(`Kunne ikke hente rom: ${String(error)}`, true);
      } finally {
        isLoadingRoom = false;
        if (refreshRequestedWhileLoading) {
          refreshRequestedWhileLoading = false;
          const nextOptions = pendingLoadRoomOptions || {};
          pendingLoadRoomOptions = null;
          loadRoom(nextOptions);
        }
      }
    }

    async function startMatch() {
      const roomId = roomIdEl.value.trim().toUpperCase();
      const playerId = playerIdEl.value.trim();
      if (!roomId || !playerId) {
        setStatus('Du må ha både romkode og spiller-ID.', true);
        return;
      }
      try {
        await call({
          type: 'start_match',
          roomId,
          playerId,
          expectedVersion: snapshot?.version,
          idempotencyKey: buildIdempotencyKey('start-match')
        });
        setStatus('Spillet er startet.');
        await loadRoom();
      } catch (error) {
        setStatus(`Kunne ikke starte: ${String(error)}`, true);
      }
    }

    document.getElementById('loadRoomBtn').addEventListener('click', () => loadRoom());
    document.getElementById('startMatchBtn').addEventListener('click', startMatch);
    document.getElementById('newRoomBtn').addEventListener('click', () => {
      const target = new URL('/dog/', window.location.origin);
      if (DOG_ENDPOINT) target.searchParams.set('endpoint', DOG_ENDPOINT);
      window.location.href = target.toString();
    });
    document.getElementById('copyRoomCodeBtn').addEventListener('click', async () => {
      const roomId = roomIdEl.value.trim().toUpperCase();
      if (!roomId) return;
      await navigator.clipboard.writeText(roomId);
      setStatus('Romkode kopiert.');
    });

    roomIdEl.addEventListener('change', () => loadRoom());

    getQueryDefaults();
    if (!DOG_ENDPOINT) {
      setStatus('Mangler endpoint-konfigurasjon for dette miljøet. Kontakt support/host.', true);
    }
    if (roomIdEl.value) loadRoom();
    pollTimer = setInterval(() => {
      if (!roomIdEl.value.trim()) return;
      loadRoom({ allowRealtimeSkip: true, silentSuccess: true });
    }, 3000);
    window.addEventListener('beforeunload', () => {
      clearInterval(pollTimer);
      teardownRealtimeSubscription();
    });
  </script>
</body>
</html>
