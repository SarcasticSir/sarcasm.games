<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog · Opprett rom</title>
  <style>
    :root { --bg:#0b0c10; --card:#1d1f27; --text:#eef1f7; --muted:#aeb6c8; --border:#303444; --accent:#50d3a2; --danger:#ff6b6b; }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 system-ui,Segoe UI,Roboto,Arial;padding:20px}
    .wrap{max-width:780px;margin:0 auto;display:grid;gap:14px}.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
    h1,h2{margin:0 0 8px} p{margin:0;color:var(--muted)} .grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-top:12px}
    label{display:block;margin-bottom:6px;color:var(--muted);font-size:.93rem} input,select,button{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--border);background:#12141c;color:var(--text);font:inherit}
    button{cursor:pointer;border:0;background:var(--accent);font-weight:700;color:#082117} button.secondary{background:#3b4254;color:var(--text);border:1px solid var(--border)}
    .actions{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-top:12px}
    .status{min-height:20px;margin-top:8px;font-weight:600;color:var(--muted)} .status.error{color:var(--danger)} .hint{font-size:.9rem;margin-top:8px}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Lag nytt Dog-rom</h1>
      <p>Steg 1: Velg lagoppsett. Steg 2: Opprett rom. Steg 3: Del sete-linker eller romkode fra romsiden.</p>
    </section>

    <section class="card">
      <h2>Host-oppsett</h2>
      <div class="grid">
        <div>
          <label for="hostPlayerId">Ditt navn / host-ID</label>
          <input id="hostPlayerId" placeholder="f.eks. Isak" />
        </div>
        <div>
          <label for="roomId">Romkode</label>
          <input id="roomId" placeholder="DOG7K2" />
        </div>
      </div>
      <div class="actions">
        <button id="randomHostBtn" class="secondary" type="button">Generer host-ID</button>
        <button id="randomRoomBtn" class="secondary" type="button">Generer romkode</button>
      </div>

      <div class="grid">
        <div>
          <label for="gameMode">Spillmodus</label>
          <select id="gameMode">
            <option value="solo">Alle mot alle (1v1v1v1)</option>
            <option value="teams">Lagmodus</option>
          </select>
        </div>
        <div>
          <label for="teamCount">Antall lag</label>
          <input id="teamCount" type="number" min="1" max="8" value="2" />
        </div>
        <div>
          <label for="playersPerTeam">Spillere per lag</label>
          <input id="playersPerTeam" type="number" min="1" max="4" value="2" />
        </div>
      </div>
      <p id="capacity" class="hint"></p>

      <div class="actions">
        <button id="createRoomBtn" type="button">Create room</button>
        <button id="goLobbyBtn" class="secondary" type="button">Gå til lobby / join</button>
      </div>
      <p id="status" class="status">Klar.</p>
    </section>
  </main>

  <script>
    const DEFAULT_DOG_ENDPOINT = 'https://hmwzdnebhqavatuxmtki.supabase.co/functions/v1/dog-room';

    function resolveDogEndpoint() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = params.get('endpoint');
      const fromGlobal = window.DOG_ENDPOINT;
      const fromStorage = window.localStorage.getItem('dog.endpoint');
      const endpoint = fromQuery || fromGlobal || fromStorage || DEFAULT_DOG_ENDPOINT;
      window.localStorage.setItem('dog.endpoint', endpoint);
      return endpoint;
    }

    const DOG_ENDPOINT = resolveDogEndpoint();

    const roomIdEl = document.getElementById('roomId');
    const hostPlayerIdEl = document.getElementById('hostPlayerId');
    const gameModeEl = document.getElementById('gameMode');
    const teamCountEl = document.getElementById('teamCount');
    const playersPerTeamEl = document.getElementById('playersPerTeam');
    const statusEl = document.getElementById('status');
    const capacityEl = document.getElementById('capacity');

    function randomCode(prefix, length) {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let value = prefix;
      for (let i = 0; i < length; i += 1) value += chars[Math.floor(Math.random() * chars.length)];
      return value;
    }

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle('error', isError);
    }

    function syncMode() {
      if (gameModeEl.value === 'solo') {
        teamCountEl.value = '4';
        playersPerTeamEl.value = '1';
        teamCountEl.disabled = true;
        playersPerTeamEl.disabled = true;
      } else {
        teamCountEl.disabled = false;
        playersPerTeamEl.disabled = false;
      }
      const total = Number(teamCountEl.value) * Number(playersPerTeamEl.value);
      const ok = total >= 4 && total <= 8;
      capacityEl.textContent = `Kapasitet: ${total} spillere ${ok ? '(gyldig)' : '(må være mellom 4 og 8)'}`;
      capacityEl.style.color = ok ? '#aeb6c8' : '#ff6b6b';
    }

    async function createRoom() {
      const roomId = roomIdEl.value.trim().toUpperCase();
      const playerId = hostPlayerIdEl.value.trim();
      const gameMode = gameModeEl.value;
      const teamCount = Number(teamCountEl.value);
      const playersPerTeam = Number(playersPerTeamEl.value);

      if (!roomId || !playerId) {
        setStatus('Fyll inn host-ID og romkode først.', true);
        return;
      }

      const totalPlayers = teamCount * playersPerTeam;
      if (totalPlayers < 4 || totalPlayers > 8) {
        setStatus('Ugyldig kapasitet. Må være 4-8 spillere.', true);
        return;
      }

      setStatus('Oppretter rom ...');
      try {
        const res = await fetch(DOG_ENDPOINT, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ type: 'create_room', roomId, playerId, gameMode, teamCount, playersPerTeam })
        });
        const body = await res.json();
        if (!res.ok || !body.ok) {
          throw new Error(body.error || 'Ukjent feil');
        }

        const target = new URL('/dog/lobby/', window.location.origin);
        target.searchParams.set('room', roomId);
        target.searchParams.set('player', playerId);
        target.searchParams.set('host', '1');
        target.searchParams.set('endpoint', DOG_ENDPOINT);
        window.location.href = target.toString();
      } catch (error) {
        setStatus(`Kunne ikke opprette rom: ${String(error)}`, true);
      }
    }

    document.getElementById('randomHostBtn').addEventListener('click', () => {
      hostPlayerIdEl.value = `Host-${randomCode('', 3)}`;
    });

    document.getElementById('randomRoomBtn').addEventListener('click', () => {
      roomIdEl.value = randomCode('DOG', 3);
    });

    document.getElementById('createRoomBtn').addEventListener('click', createRoom);
    document.getElementById('goLobbyBtn').addEventListener('click', () => {
      const target = new URL('/dog/lobby/', window.location.origin);
      target.searchParams.set('endpoint', DOG_ENDPOINT);
      window.location.href = target.toString();
    });

    gameModeEl.addEventListener('change', syncMode);
    teamCountEl.addEventListener('change', syncMode);
    playersPerTeamEl.addEventListener('change', syncMode);

    if (!hostPlayerIdEl.value) hostPlayerIdEl.value = `Host-${randomCode('', 3)}`;
    if (!roomIdEl.value) roomIdEl.value = randomCode('DOG', 3);
    syncMode();
  </script>
</body>
</html>
