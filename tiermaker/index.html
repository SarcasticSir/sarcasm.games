<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <title>Sarcasm's simple tier list</title>
  <style>
    /*
      Enkel stilsett for en lokal tier‑liste.

      Rekkene (tier) består av en farget overskrift og et område hvor elementer
      (titler) kan flyttes rundt med drag‑and‑drop. Fargene og navnene kan
      endres for hver tier, og nye titler kan legges til via kontrollene
      øverst. Til slutt kan oppsettet lagres til nettleserens localStorage.
    */
    :root {
      /* Bredde på tier‑headeren. Justert ned for å gjøre boksene litt smalere */
      --header-width: 110px;
      --tier-gap: 8px;
      /* Fargevariabler for lys modus */
      --background: #f8f9fa;
      --foreground: #333333;
      --item-bg: #ffffff;
      --tier-items-bg: #fafafa;
      --control-bg: #007bff;
      --control-hover-bg: #0056b3;
      --button-text-color: #ffffff;
    }

    /* Når data-theme=dark settes på documentElement (html), overskrives variablene for mørk modus */
    [data-theme="dark"] {
      --background: #121212;
      --foreground: #e0e0e0;
      --item-bg: #1e1e1e;
      --tier-items-bg: #2a2a2a;
      --control-bg: #0d6efd;
      --control-hover-bg: #0a58ca;
      --button-text-color: #ffffff;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: var(--background);
      margin: 0;
      padding: 20px;
      color: var(--foreground);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
      color: var(--foreground);
    }

    /* Tillat redigering av sidetittel uten å vise en stygg kant. 
       Vis heller en diskret stiplet ramme når feltet er i fokus. */
    #pageTitle[contenteditable] {
      border: none;
      outline: none;
      cursor: text;
      display: inline-block;
      padding: 2px 4px;
      border-radius: 4px;
    }
    #pageTitle[contenteditable]:focus {
      outline: 2px dashed #007bff;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 15px;
      align-items: center;
    }

    .controls input[type="text"] {
      flex-grow: 1;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .controls button {
      padding: 8px 12px;
      border: none;
      background-color: var(--control-bg);
      color: var(--button-text-color);
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .controls button:hover {
      background-color: var(--control-hover-bg);
    }

    /* Spesiell styling for temaveksler-knappen for å gjøre den liten og avvikende. */
    #themeToggle {
      width: 2.1rem;
      height: 2.1rem;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border-radius: 50%;
      background-color: transparent;
      border: 2px solid var(--control-bg);
      color: var(--control-bg);
      margin-left: auto;
    }
    #themeToggle:hover {
      background-color: var(--control-bg);
      color: var(--button-text-color);
    }

    /* Tier layout */
    .tier {
      display: flex;
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: var(--tier-gap);
      background-color: #fff;
    }

    .tier-header {
      width: var(--header-width);
      padding: 5px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 3px;
      box-sizing: border-box;
    }

    .tier-header input[type="text"] {
      width: 100%;
      border: none;
      font-weight: bold;
      font-size: 1rem;
      background-color: transparent;
      padding: 4px;
      outline: none;
      /* tillat automatisk linjebryting av lange kategorinavn */
      white-space: normal;
      overflow-wrap: anywhere;
      /* arve fargen fra headeren for god kontrast */
      color: inherit;
    }

    /* Progress bar inne i tier-headeren */
    .progress-container {
      width: 100%;
      height: 6px;
      background-color: rgba(255, 255, 255, 0.3);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: currentColor;
    }

    /* Footer med telling, prosent, fargevelger og fjernknapp */
    .tier-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
    }
    /* Spesifikke klasser for å enklere finne telling og prosent i JS */
    .count-info {
      /* no specific styles yet */
    }
    .percent-info {
      /* no specific styles yet */
    }

    /* Søppelbøtte for å fjerne elementer */
    #trashBin {
      width: 100px;
      height: 50px;
      border: 2px dashed #999;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      margin-top: 10px;
      cursor: pointer;
      color: var(--foreground);
      background-color: var(--tier-items-bg);
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }
    #trashBin.drag-over {
      background-color: #ffe6e6;
      border-color: #ff6b6b;
    }
    .tier-footer input[type="color"] {
      width: 1.3rem;
      height: 1.3rem;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .tier-items {
      flex-grow: 1;
      /* Reduser min-høyden slik at boksene ikke blir så høye */
      min-height: 50px;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 8px;
      background-color: var(--tier-items-bg);
      transition: background-color 0.2s ease;
    }

    .tier-items.drag-over {
      background-color: #e6f7ff;
      border: 2px dashed #007bff;
    }

    .item {
      padding: 6px 10px;
      background-color: var(--item-bg);
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: move;
      user-select: none;
      font-size: 0.85rem;
      /* tillat line wraps når ekstra felt vises */
      white-space: normal;
      /* Stable rader for tekst og ekstra felt */
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      color: var(--foreground);
    }

    .item.dragging {
      opacity: 0.6;
    }

    /* Små ekstra felt som vises permanent på elementene */
    .extra-fields {
      font-size: 0.7rem;
      opacity: 0.8;
      margin-top: 2px;
      color: var(--foreground);
    }

    /* Modal overlays and panels */
    #settingsOverlay,
    #helpOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      display: none;
    }

    #settingsPanel,
    #helpPanel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: var(--item-bg);
      color: var(--foreground);
      border: 2px solid #ccc;
      border-radius: 6px;
      padding: 20px;
      z-index: 1001;
      width: min(680px, calc(100vw - 24px));
      box-sizing: border-box;
      max-height: calc(100vh - 24px);
      overflow-y: auto;
      display: none;
    }
    #settingsPanel {
      width: min(420px, calc(100vw - 24px));
    }
    #settingsPanel h2,
    #helpPanel h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.2rem;
    }
    .column-setting {
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
    }
    .column-setting label {
      font-size: 0.8rem;
      margin-bottom: 3px;
    }
    .help-intro,
    .settings-description {
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .help-list {
      padding-left: 1.25rem;
      line-height: 1.5;
    }
    .help-table-wrapper {
      overflow-x: auto;
      margin: 12px 0;
    }
    .help-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .help-table th,
    .help-table td {
      border: 1px solid #ccc;
      padding: 7px;
      text-align: left;
      white-space: nowrap;
    }
    .help-table th {
      background-color: var(--tier-items-bg);
    }
    .settings-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 15px;
    }
    #settingsBtn,
    #importHelpBtn {
      width: 2.1rem;
      height: 2.1rem;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border-radius: 50%;
      background-color: transparent;
      border: 2px solid var(--control-bg);
      color: var(--control-bg);
      margin-left: 5px;
    }
    #settingsBtn:hover,
    #importHelpBtn:hover {
      background-color: var(--control-bg);
      color: var(--button-text-color);
    }

    /* Tellingsinformasjon i tier-headeren */
    .counts {
      font-size: 0.8rem;
      opacity: 0.8;
    }

    /* Knapp for å fjerne en tier */
    .remove-tier {
      background: none;
      border: none;
      color: inherit;
      font-weight: bold;
      cursor: pointer;
      align-self: flex-end;
      padding: 0;
    }

    /* Duplikat-varsel */
    #duplicateMsg {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      font-size: 0.85rem;
      pointer-events: none;
      z-index: 1000;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      :root {
        --header-width: 100px;
      }
      .controls input[type="text"] {
        flex-basis: 100%;
      }
    }

    /* Utskriftsvennlig stil: skjul kontroller og søppelbøtte */
    @media print {
      .controls,
      #trashBin,
      #settingsOverlay,
      #settingsPanel,
      #helpOverlay,
      #helpPanel,
      #duplicateMsg {
        display: none !important;
      }
      body {
        margin: 0;
        padding: 0;
      }
    }
  </style>
  <!--
    Legg til eksternt XLSX‑bibliotek for å kunne lese Excel‑filer. Denne filen
    lastes fra CDN når du har nettforbindelse. Dersom du skal bruke verktøyet
    offline, kan du laste ned xlsx.full.min.js fra https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js
    og plassere den i samme mappe som denne HTML‑filen. Endre deretter src til
    den lokale filen (f.eks. src="xlsx.full.min.js").
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Bibliotek for å eksportere som bilde -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
    <!-- Gjør sidetittelen direkte redigerbar ved å sette contenteditable. 
         Bruker en id for å kunne hente elementet i JavaScript. -->
    <h1 id="pageTitle" contenteditable="true" spellcheck="false">Click to edit title</h1>
    <div class="controls">
      <!-- Felt for å legge til titler. Skill med | eller ; hvis du legger til flere -->
      <input type="text" id="bulkTitles" placeholder="Add title(s) ... (separate with | or ;)" style="flex-grow:1;" />
      <button id="addBulkBtn">Add title</button>
      
      <!-- Filopplasting for å importere titler fra tekst/CSV/Excel. 
           Vi aksepterer .txt, .csv og .xlsx/.xls. Hvis en Excel-fil velges og XLSX-biblioteket er lastet (via CDN eller lokal fil),
           vil første kolonne i første ark bli importert. -->
      <input type="file" id="fileInput" accept=".txt,.csv,.xls,.xlsx" style="display:none" />
      <button id="importBtn">Import file</button>
      <button id="importHelpBtn" type="button" aria-label="Excel import help" title="Excel import help">?</button>

      <button id="addTierBtn">Add another tier</button>
      <!-- Temaveksler: smått ikon for å bytte mellom lys/mørk modus -->
      <button id="themeToggle" title="Bytt tema">🌙</button>
      <!-- Innstillinger-knapp (gir tilgang til kolonnevalg) -->
      <button id="settingsBtn" title="Innstillinger">⚙</button>
    </div>

    <!-- Meldingsboks for duplikater. Skjules som standard og posisjoneres ved behov via JS -->
    <div id="duplicateMsg" style="display:none; position: absolute;"></div>

    <!-- Sorteringsknapper for urankerte titler -->
    <div class="controls" style="margin-top: 5px;">
      <button id="sortUnrankedBtn">Sort unranked (A–Z)</button>
      <button id="shuffleUnrankedBtn">Shuffle unranked</button>
    </div>
    <div id="tiers">
      <!-- Tiers settes inn her via JavaScript -->
    </div>
    <!-- Kontroller nederst: lagre, tilbakestill og eksport/import JSON -->
    <div class="controls" id="bottomControls" style="margin-top: 10px;">
      <button id="saveBtn">Save template</button>
      <button id="resetBtn">Reset template</button>
      <button id="exportJsonBtn">Export JSON</button>
      <input type="file" id="importJsonInput" accept=".json" style="display:none" />
      <button id="importJsonBtn">Import JSON</button>
      <!-- Knapp for å eksportere som bilde (PNG) -->
      <button id="exportImageBtn">Export image</button>
      <!-- #adding Knapp for å eksportere som tekstfil -->
      <button id="exportTextBtn">Export text file</button>
      <a href="https://sarcasm.games/">
    <button>Back to main</button>
</a>
    </div>

    <!-- Søppelbøtte for å dra og slippe elementer som skal slettes -->
    <div id="trashBin" title="Dra elementer hit for å slette">🗑 Erase</div>

    <!-- Overlegg og panel for kolonneinnstillinger -->
    <div id="settingsOverlay"></div>
    <div id="settingsPanel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <h2 id="settingsTitle">Column settings</h2>
      <!-- Dynamic content is inserted by JavaScript. -->
      <div id="columnSettingsContainer"></div>
      <div class="settings-actions">
        <button id="cancelSettingsBtn">Cancel</button>
        <button id="saveSettingsBtn">Save</button>
      </div>
    </div>

    <div id="helpOverlay"></div>
    <div id="helpPanel" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
      <h2 id="helpTitle"></h2>
      <p id="helpIntro" class="help-intro"></p>
      <ul class="help-list">
        <li id="helpColumnA"></li>
        <li id="helpColumnsBG"></li>
        <li id="helpFirstSheet"></li>
        <li id="helpDuplicates"></li>
      </ul>
      <h3 id="helpExampleTitle"></h3>
      <div class="help-table-wrapper">
        <table class="help-table">
          <thead>
            <tr>
              <th id="helpHeaderTitle"></th>
              <th id="helpHeaderGenre"></th>
              <th id="helpHeaderYear"></th>
              <th id="helpHeaderNotes"></th>
            </tr>
          </thead>
          <tbody>
            <tr><td>The Matrix</td><td>Science fiction</td><td>1999</td><td id="helpExampleNoteOne"></td></tr>
            <tr><td>Alien</td><td>Horror</td><td>1979</td><td id="helpExampleNoteTwo"></td></tr>
            <tr><td>Arrival</td><td>Science fiction</td><td>2016</td><td id="helpExampleNoteThree"></td></tr>
          </tbody>
        </table>
      </div>
      <h3 id="helpSettingsTitle"></h3>
      <p id="helpSettingsIntro" class="help-intro"></p>
      <ul class="help-list">
        <li id="helpColumnLabel"></li>
        <li id="helpShowHover"></li>
        <li id="helpShowPermanent"></li>
        <li id="helpBothOptions"></li>
      </ul>
      <div class="settings-actions">
        <button id="closeHelpBtn" type="button"></button>
      </div>
    </div>
  </div>

  <script>
    /*
      JavaScript for å styre tier‑listen. Følgende funksjoner støttes:
        – Opprett standard tierer (S, A, B, C, D, Unranked) med farge.
        – Rediger navn og farge for hver tier dynamisk.
        – Legg til nye titler som kan dras og slippes mellom tiers.
        – Drag‑and‑drop med HTML5 API for både rekkeflyt innen samme tier og flytting mellom tiers.
        – Lagre og laste oppsett fra browserens localStorage.
        – Tilbakestille til standard.
    */

    // Definer standard tiers. Bruk en liste med objekter som inneholder navn, farge og tom liste for elementer.
    const defaultTiers = [
      { name: 'S', color: '#f94144', items: [] },
      { name: 'A', color: '#f3722c', items: [] },
      { name: 'B', color: '#f9844a', items: [] },
      { name: 'C', color: '#f8961e', items: [] },
      { name: 'D', color: '#f9c74f', items: [] },
      { name: 'Unranked', color: '#90be6d', items: [] }
    ];

    // Global state for tiers og neste id for elementer
    let tiers = [];
    let nextItemId = 1;
    const LAYOUT_STORAGE_KEY = 'tierLayout';
    const AUTO_SAVE_DELAY_MS = 250;
    let autoSaveTimeout = null;

    // Kolonneinnstillinger: et array med opptil 6 objekter { label, showHover, showPermanent }.
    // Disse brukes til å bestemme hvordan ekstra kolonner vises i verktøytips og permanent på elementene.
    let columnSettings = [];
    // Maksimalt antall ekstra kolonner (fra Excel kolonne B til G)
    const MAX_EXTRA_COLS = 6;
    const TIER_LANGUAGE_KEY = 'quizLanguage';
    const TIER_TRANSLATIONS = {
      en: {
        importHelpLabel: 'Excel import help',
        helpTitle: 'How to import from Excel',
        helpIntro: 'Create a spreadsheet where each row represents one item in the tier list. Save it as .xlsx or .xls, select Import file, and choose the file.',
        helpColumnA: 'Column A: The item title or name. This column is required.',
        helpColumnsBG: 'Columns B–G: Optional information such as category, year, genre, score, or notes.',
        helpFirstSheet: 'The first row can be a header row when column A is named Title, Name, or Item. Only the first worksheet is imported, and imported items are added to Unranked.',
        helpDuplicates: 'Items that already exist in the tier list are not added again. CSV and TXT files are also supported.',
        helpExampleTitle: 'Example spreadsheet',
        helpHeaderTitle: 'A – Title',
        helpHeaderGenre: 'B – Genre',
        helpHeaderYear: 'C – Year',
        helpHeaderNotes: 'D – Notes',
        helpExampleNoteOne: 'A classic',
        helpExampleNoteTwo: 'Suspenseful',
        helpExampleNoteThree: 'Great story',
        helpSettingsTitle: 'Column settings',
        helpSettingsIntro: 'Select the gear button to control how information from columns B–G is displayed.',
        helpColumnLabel: 'Column label: Give the column a descriptive name, such as Genre or Year.',
        helpShowHover: 'Show on hover: Display the information in a tooltip when you hover over an item.',
        helpShowPermanent: 'Show in tier list: Display the information permanently below the title.',
        helpBothOptions: 'Both display options can be enabled at the same time. Settings are stored locally in your browser.',
        close: 'Close',
        settingsTitle: 'Column settings',
        settingsDescription: 'Columns B–G contain optional Excel data. Name each column and choose whether its values appear when you hover over an item, permanently below its title, or both.',
        column: 'Column',
        showHover: 'Show on hover',
        showPermanent: 'Show in tier list',
        cancel: 'Cancel',
        save: 'Save'
      },
      no: {
        importHelpLabel: 'Hjelp med Excel-import',
        helpTitle: 'Slik importerer du fra Excel',
        helpIntro: 'Opprett et regneark der hver rad representerer ett element i tier-listen. Lagre det som .xlsx eller .xls, trykk Import file og velg filen.',
        helpColumnA: 'Kolonne A: Tittelen eller navnet på elementet. Denne kolonnen er obligatorisk.',
        helpColumnsBG: 'Kolonne B–G: Valgfri tilleggsinformasjon, for eksempel kategori, år, sjanger, poengsum eller kommentar.',
        helpFirstSheet: 'Den første raden kan være en overskriftsrad når kolonne A heter Tittel, Navn eller Element. Bare det første arket importeres, og elementene legges i Unranked.',
        helpDuplicates: 'Elementer som allerede finnes i tier-listen, blir ikke lagt til på nytt. CSV- og TXT-filer støttes også.',
        helpExampleTitle: 'Eksempel på regneark',
        helpHeaderTitle: 'A – Tittel',
        helpHeaderGenre: 'B – Sjanger',
        helpHeaderYear: 'C – År',
        helpHeaderNotes: 'D – Kommentar',
        helpExampleNoteOne: 'En klassiker',
        helpExampleNoteTwo: 'Spennende',
        helpExampleNoteThree: 'Sterk historie',
        helpSettingsTitle: 'Kolonneinnstillinger',
        helpSettingsIntro: 'Trykk på tannhjulet for å bestemme hvordan informasjonen fra kolonne B–G skal vises.',
        helpColumnLabel: 'Kolonnenavn: Gi kolonnen et beskrivende navn, for eksempel Sjanger eller År.',
        helpShowHover: 'Vis når musepekeren holdes over: Vis informasjonen som et verktøytips når du holder musepekeren over et element.',
        helpShowPermanent: 'Vis i tier-listen: Vis informasjonen permanent under tittelen.',
        helpBothOptions: 'Begge visningsvalgene kan være slått på samtidig. Innstillingene lagres lokalt i nettleseren.',
        close: 'Lukk',
        settingsTitle: 'Kolonneinnstillinger',
        settingsDescription: 'Kolonne B–G inneholder valgfrie Excel-data. Gi hver kolonne et navn og velg om verdiene skal vises når musepekeren holdes over, permanent under tittelen eller begge deler.',
        column: 'Kolonne',
        showHover: 'Vis når musepekeren holdes over',
        showPermanent: 'Vis i tier-listen',
        cancel: 'Avbryt',
        save: 'Lagre'
      }
    };

    function getTierLanguage() {
      try {
        const storedLanguage = localStorage.getItem(TIER_LANGUAGE_KEY);
        if (storedLanguage === 'en' || storedLanguage === 'no') return storedLanguage;
      } catch (error) {
        // Fall back to the browser language when storage is unavailable.
      }
      const browserLanguage = (navigator.language || '').toLowerCase();
      return browserLanguage.startsWith('no') || browserLanguage.startsWith('nb') || browserLanguage.startsWith('nn') ? 'no' : 'en';
    }

    function getTierTranslations() {
      return TIER_TRANSLATIONS[getTierLanguage()] || TIER_TRANSLATIONS.en;
    }

    function getDefaultColumnLabel(index) {
      return `${getTierTranslations().column} ${String.fromCharCode(66 + index)}`;
    }

    // Globale variabler for drag‑and‑drop. Brukes for å flytte elementer mellom tiers.
    // Når et item begynner å dras, settes currentDraggedEl til elementet.
    // Dette gjør at vi ikke er avhengige av dataTransfer for å hente id ved drop.
    let currentDraggedEl = null;

    // Flag som indikerer om et element ble slettet i trash-drop handler. Brukes for å forhindre tilbakeføring i dragend.
    let wasDeleted = false;

    /**
     * Beregn kontrastfarge (sort eller hvit) basert på bakgrunnsfarge.
     * @param {string} hex – Farge i formatet #rrggbb
     * @returns {string} '#000000' eller '#ffffff'
     */
    function getContrastColor(hex) {
      // Fjern # hvis tilstede
      hex = hex.replace('#', '');
      if (hex.length === 3) {
        hex = hex.split('').map(c => c + c).join('');
      }
      const r = parseInt(hex.substr(0, 2), 16);
      const g = parseInt(hex.substr(2, 2), 16);
      const b = parseInt(hex.substr(4, 2), 16);
      // Beregn luminans iht. YIQ-formelen
      const yiq = (r * 299 + g * 587 + b * 114) / 1000;
      return yiq >= 128 ? '#000000' : '#ffffff';
    }

    /**
     * Lysne en hex-farge med en prosentandel. Brukes til progresjonslinjen.
     * @param {string} hex Farge i format #rrggbb
     * @param {number} percent Prosent å lysne (0–1)
     * @returns {string} Ny hex-farge
     */
    function lightenColor(hex, percent) {
      hex = hex.replace('#', '');
      if (hex.length === 3) {
        hex = hex.split('').map(c => c + c).join('');
      }
      let r = parseInt(hex.substr(0, 2), 16);
      let g = parseInt(hex.substr(2, 2), 16);
      let b = parseInt(hex.substr(4, 2), 16);
      r = Math.round(r + (255 - r) * percent);
      g = Math.round(g + (255 - g) * percent);
      b = Math.round(b + (255 - b) * percent);
      return '#' + r.toString(16).padStart(2, '0') +
                   g.toString(16).padStart(2, '0') +
                   b.toString(16).padStart(2, '0');
    }

    /**
     * Konverter en tekst til tittelkasus (første bokstav i hvert ord stor).
     * Ord skilles på mellomrom. Hvis teksten inneholder bindestrek eller andre
     * skilletegn, behandles hver del separat. Ønsker du å beholde eksisterende
     * store bokstaver inne i ord, må du justere denne funksjonen.
     * @param {string} str
     * @returns {string}
     */
    function toTitleCase(str) {
      return str.trim()
        .split(/\s+/)
        .map(word => {
          if (!word) return '';
          const first = word[0].toUpperCase();
          const rest = word.slice(1).toLowerCase();
          return first + rest;
        })
        .join(' ');
    }

    // Sidetittel lagres også i localStorage
    let pageTitle = 'Simple Tier - list';

    /**
     * Last inn kolonneinnstillinger fra localStorage eller bruk standardverdier.
     */
    function loadColumnSettings() {
      try {
        const saved = localStorage.getItem('tierColumnSettings');
        if (saved) {
          const arr = JSON.parse(saved);
          if (Array.isArray(arr) && arr.length === MAX_EXTRA_COLS) {
            columnSettings = arr;
            return;
          }
        }
      } catch (e) {
        console.warn('Kunne ikke lese kolonneinnstillinger fra localStorage', e);
      }
      // Hvis ingen lagrede innstillinger, sett standard
      columnSettings = [];
      for (let i = 0; i < MAX_EXTRA_COLS; i++) {
        // Standardnavn basert på alfabetet (B, C, D, E, F, G)
        columnSettings.push({ label: getDefaultColumnLabel(i), showHover: true, showPermanent: false });
      }
    }

    /**
     * Lagre kolonneinnstillinger til localStorage
     */
    function saveColumnSettings() {
      try {
        localStorage.setItem('tierColumnSettings', JSON.stringify(columnSettings));
      } catch (e) {
        console.warn('Kunne ikke lagre kolonneinnstillinger', e);
      }
    }

    /**
     * Påfør kolonneinnstillinger til alle eksisterende elementer.
     */
    function applySettingsToAllItems() {
      const itemEls = document.querySelectorAll('.item');
      itemEls.forEach(el => {
        const obj = findItemById(el.id);
        if (obj) {
          applySettingsToItem(el, obj);
        }
      });
    }

    /**
     * Påfør kolonneinnstillinger til et enkelt element.
     * @param {HTMLElement} el – DOM-element for item
     * @param {Object} item – Objekt med tekst og ekstra felter
     */
    function applySettingsToItem(el, item) {
      // Hent ekstra felt som array (kan være undefined)
      const extraArr = Array.isArray(item.extra) ? item.extra : [];
      // Bygg verktøytips
      const hoverParts = [];
      // Tittel (alltid inkludert først)
      hoverParts.push(item.text);
      for (let i = 0; i < MAX_EXTRA_COLS; i++) {
        const value = extraArr[i];
        if (value !== undefined && value !== null && String(value).trim()) {
          const cfg = columnSettings[i] || { label: getDefaultColumnLabel(i), showHover: true, showPermanent: false };
          if (cfg.showHover) {
            hoverParts.push(`${cfg.label} - ${String(value).trim()}`);
          }
        }
      }
      el.title = hoverParts.join(', ');
      // Fjern eksisterende permanente ekstra-felts container hvis finnes
      const existing = el.querySelector('.extra-fields');
      if (existing) existing.remove();
      const permanentParts = [];
      for (let i = 0; i < MAX_EXTRA_COLS; i++) {
        const value = extraArr[i];
        if (value !== undefined && value !== null && String(value).trim()) {
          const cfg = columnSettings[i] || { label: getDefaultColumnLabel(i), showHover: true, showPermanent: false };
          if (cfg.showPermanent) {
            permanentParts.push({ label: cfg.label, value: String(value).trim() });
          }
        }
      }
      if (permanentParts.length > 0) {
        const container = document.createElement('div');
        container.className = 'extra-fields';
        permanentParts.forEach(part => {
          const span = document.createElement('span');
          span.textContent = `${part.label} - ${part.value}`;
          container.appendChild(span);
        });
        el.appendChild(container);
      }
    }

    /**
     * Generer et unikt id for et nytt element.
     */
    function generateItemId() {
      return 'item-' + nextItemId++;
    }

    /**
     * Lag DOM for en tier og dens elementer. Returnerer et DOM‑element.
     * @param {Object} tierObj – Tieren som skal vises.
     * @param {number} tierIndex – Indeksen i tiers‑arrayet.
     */
    function createTierElement(tierObj, tierIndex, totalCount) {
      const tier = document.createElement('div');
      tier.className = 'tier';

      // Header for tier (navn, progress og footer)
      const header = document.createElement('div');
      header.className = 'tier-header';
      header.style.backgroundColor = tierObj.color;
      const contrastColor = getContrastColor(tierObj.color);
      header.style.color = contrastColor;

      // Hindre dropp på header og navnefelt
      header.addEventListener('dragover', (ev) => {
        ev.preventDefault();
      });
      header.addEventListener('drop', (ev) => {
        ev.preventDefault();
      });

      // Toppen: navnefelt
      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.value = tierObj.name;
      nameInput.title = 'Endre navn på tier';
      nameInput.addEventListener('input', () => {
        tierObj.name = nameInput.value;
        scheduleAutoSave();
      });
      // Unngå at drag/slipp putter data inn i navnefeltet
      ['dragover', 'drop'].forEach(evtName => {
        nameInput.addEventListener(evtName, (ev) => {
          ev.preventDefault();
        });
      });
      header.appendChild(nameInput);

      // Midten: progressbar
      const progressContainer = document.createElement('div');
      progressContainer.className = 'progress-container';
      const progressBar = document.createElement('div');
      progressBar.className = 'progress-bar';
      // Beregn prosentandel av elementer i denne tieren
      const tierCount = tierObj.items.length;
      const denom = totalCount || 0;
      let percent = 0;
      if (denom > 0) percent = Math.round((tierCount / denom) * 100);
      progressBar.style.width = `${percent}%`;
      // Lysne fargen litt for progressbar
      // Bruk en sterkere lysning for å tydeliggjøre progresjonen
      progressBar.style.backgroundColor = lightenColor(tierObj.color, 0.7);
      progressContainer.appendChild(progressBar);
      header.appendChild(progressContainer);

      // Bunnen: footer med tellinger, prosent, fargevelger og fjernknapp
      const footer = document.createElement('div');
      footer.className = 'tier-footer';
      // Tellingsinfo (vises i parentes)
      const countSpan = document.createElement('span');
      countSpan.className = 'count-info';
      countSpan.textContent = `(${tierCount}/${denom}),`;
      // Prosentinfo
      const percentSpan = document.createElement('span');
      percentSpan.className = 'percent-info';
      percentSpan.textContent = denom > 0 ? `${percent}%` : '0%';
      // Fargevelger (lite)
      const colorInput = document.createElement('input');
      colorInput.type = 'color';
      colorInput.value = tierObj.color;
      colorInput.title = 'Velg farge for tier';
      // Ved fargeendring: oppdater bakgrunn, kontrast, progressbar og tekstfarger
      colorInput.addEventListener('input', () => {
        tierObj.color = colorInput.value;
        // Oppdater bakgrunnsfarge
        header.style.backgroundColor = tierObj.color;
        // Oppdater progressbar farge med lysning
        progressBar.style.backgroundColor = lightenColor(tierObj.color, 0.7);
        // Oppdater kontrastfarge
        const newContrast = getContrastColor(tierObj.color);
        header.style.color = newContrast;
        countSpan.style.color = newContrast;
        percentSpan.style.color = newContrast;
        removeBtn && (removeBtn.style.color = newContrast);
        scheduleAutoSave();
      });
      // Unngå at drag droppes på fargevelger
      ['dragover', 'drop'].forEach(evtName => {
        colorInput.addEventListener(evtName, (ev) => {
          ev.preventDefault();
        });
      });

      // Fjern-knapp (kun hvis ikke unranket)
      let removeBtn = null;
      if (tierIndex < tiers.length - 1) {
        removeBtn = document.createElement('button');
        removeBtn.className = 'remove-tier';
        removeBtn.textContent = '×';
        removeBtn.title = 'Fjern denne tier';
        removeBtn.addEventListener('click', () => {
          removeTier(tierIndex);
        });
      }
      // Sett tekstfarger i footer for kontrast
      countSpan.style.color = contrastColor;
      percentSpan.style.color = contrastColor;
      // Legg til elementer i footer
      footer.appendChild(countSpan);
      footer.appendChild(percentSpan);
      footer.appendChild(colorInput);
      if (removeBtn) footer.appendChild(removeBtn);

      header.appendChild(footer);

      // Element‑container
      const itemsContainer = document.createElement('div');
      itemsContainer.className = 'tier-items';
      itemsContainer.dataset.tierIndex = tierIndex;
      // Dragover event lar drop
      itemsContainer.addEventListener('dragover', (ev) => {
        ev.preventDefault();
        // Vis at vi tillater flytting
        if (ev.dataTransfer) {
          ev.dataTransfer.dropEffect = 'move';
        }
      });
      itemsContainer.addEventListener('dragenter', (ev) => {
        ev.preventDefault();
        itemsContainer.classList.add('drag-over');
      });
      itemsContainer.addEventListener('dragleave', () => {
        itemsContainer.classList.remove('drag-over');
      });
      itemsContainer.addEventListener('drop', (ev) => {
        ev.preventDefault();
        // Stopp bobling for å unngå at andre drop-hendere kjøres
        ev.stopPropagation();
        const draggedEl = currentDraggedEl;
        if (draggedEl) {
          // Fjern markeringsklasse fra alle containere
          const allContainers = document.querySelectorAll('.tier-items');
          allContainers.forEach(c => c.classList.remove('drag-over'));
          // Legg elementet til i denne containeren (flytter automatisk fra tidligere container)
          itemsContainer.appendChild(draggedEl);
          // Ikke oppdater datamodellen her; det gjøres i dragend for å unngå duplisering.
        }
      });

      // Legg til eksisterende elementer i itemsContainer
      tierObj.items.forEach(item => {
        const itemEl = createItemElement(item);
        itemsContainer.appendChild(itemEl);
      });

      tier.appendChild(header);
      tier.appendChild(itemsContainer);
      return tier;
    }

    /**
     * Lag DOM‑element for et item.
     * @param {Object} item – Objekt med id og tekst.
     */
    function createItemElement(item) {
      const el = document.createElement('div');
      el.className = 'item';
      el.id = item.id;
      // Lagre en referanse til item-objektet på DOM-elementet for å bruke det senere ved reordering
      el._item = item;
      el.textContent = item.text;
      // Verktøytips og ekstra felter håndteres via applySettingsToItem
      el.draggable = true;
      el.addEventListener('dragstart', (ev) => {
        // Lagre referanse til elementet som dras globalt
        currentDraggedEl = el;
        // Sett også dataTransfer for kompatibilitet, men avhenger ikke av det
        ev.dataTransfer.setData('text/plain', el.id);
        ev.dataTransfer.effectAllowed = 'move';
        setTimeout(() => {
          el.classList.add('dragging');
        }, 0);
        // Lagre original forelder for å kunne flytte tilbake hvis sluppet i et ugyldig område
        el._originalParent = el.parentElement;
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        // Etter at dragging avsluttes, oppdater datamodellen og teller/progresjon.
        // Dette fanger også tilfeller der slipp skjer utenfor en gyldig container.
        // Hvis elementet ble slettet i trash-drop handler, unngå å reversere og nullstill flagget
        if (!wasDeleted) {
          // Hvis elementet ikke lenger er i en tier-items container eller søppelbøtten, flytt det tilbake til original container
          const parent = el.parentElement;
          const trash = document.getElementById('trashBin');
          if (!parent || (!parent.classList.contains('tier-items') && parent !== trash)) {
            if (el._originalParent) {
              el._originalParent.appendChild(el);
            }
          }
        }
        // Uansett, oppdater datamodell og teller/progresjon
        updateDataFromDOM();
        updateCountsAndProgress();
        scheduleAutoSave();
        // Nullstill flagg og global variabel
        wasDeleted = false;
        currentDraggedEl = null;
      });
      // Tillat rekkefølge-endring ved å slippe på et annet element
      el.addEventListener('dragover', (ev) => {
        ev.preventDefault();
        if (ev.dataTransfer) {
          ev.dataTransfer.dropEffect = 'move';
        }
      });
      el.addEventListener('drop', (ev) => {
        ev.preventDefault();
        // Stopp bobling slik at containeren ikke også håndterer droppet (forhindrer at elementet flyttes to ganger)
        ev.stopPropagation();
        // Hent elementet som dras fra global variabel
        const draggedEl = currentDraggedEl;
        if (!draggedEl || draggedEl === el) return;
        // Flytt elementet før dette elementet
        el.parentElement.insertBefore(draggedEl, el);
        // Ikke oppdater datamodellen her; det gjøres i dragend.
      });
      // Påfør kolonneinnstillinger til dette elementet
      applySettingsToItem(el, item);
      return el;
    }

    /**
     * Tegn alle tiers i DOM basert på global variabel "tiers".
     */
    function renderTiers() {
      const tiersContainer = document.getElementById('tiers');
      tiersContainer.innerHTML = '';
      // Beregn totalt antall elementer på tvers av alle tiers
      const totalCount = tiers.reduce((sum, t) => sum + t.items.length, 0);
      tiers.forEach((tierObj, index) => {
        const tierEl = createTierElement(tierObj, index, totalCount);
        tiersContainer.appendChild(tierEl);
      });

      // Ikke oppdater sidetittelen her; den styres av contenteditable h1
    }

    /**
     * Legg til en ny tittel i Urangerte tier (siste tier). Oppretter item‑objekt og DOM‑element.
     * @param {string} text – Tittelteksten.
     */
    function addNewItem(text, extra = null) {
      if (!text.trim()) return;
      const id = generateItemId();
      const itemObj = { id, text };
      if (extra) {
        itemObj.extra = extra;
      }
      // Legg til i siste tier (Urangerte) i data
      tiers[tiers.length - 1].items.push(itemObj);
      // Opprett DOM og legg til i siste tier
      const itemEl = createItemElement(itemObj);
      const containers = document.querySelectorAll('.tier-items');
      const unrankedContainer = containers[containers.length - 1];
      unrankedContainer.appendChild(itemEl);
      // Oppdater counts/progress uten full re-render
      updateCountsAndProgress();
      scheduleAutoSave();
    }

    /**
     * Hent data fra DOM for å oppdatere global "tiers" (navn, farger, elementrekkefølge).
     */
    function updateDataFromDOM() {
      tiers.forEach((tierObj, tierIndex) => {
        // Oppdater navn og farge
        const tierEl = document.querySelectorAll('.tier')[tierIndex];
        const nameInput = tierEl.querySelector('.tier-header input[type="text"]');
        const colorInput = tierEl.querySelector('.tier-header input[type="color"]');
        tierObj.name = nameInput.value;
        tierObj.color = colorInput.value;
        // Oppdater items
        const itemsContainer = tierEl.querySelector('.tier-items');
        const newItems = [];
        itemsContainer.querySelectorAll('.item').forEach(itemEl => {
          // Hent objektet fra elementets interne referanse dersom mulig
          const obj = itemEl._item || findItemById(itemEl.id);
          if (obj) {
            newItems.push(obj);
          }
        });
        tierObj.items = newItems;
      });
    }

    /**
     * Finn et item‑objekt i alle tiers basert på id.
     * @param {string} id – Id til elementet.
     * @returns {Object|null} Elementet hvis funnet, ellers null.
     */
    function findItemById(id) {
      for (const tier of tiers) {
        for (const item of tier.items) {
          if (item.id === id) return item;
        }
      }
      return null;
    }

    /**
     * Oppdater teller, prosent og fremdriftsstang for alle tiers basert på global state.
     * Dette kalles etter at items har blitt flyttet eller lagt til uten å bygge DOM på nytt.
     */
    function updateCountsAndProgress() {
      const totalCount = tiers.reduce((sum, t) => sum + t.items.length, 0);
      // Hent alle tier-elementene i DOM
      const tierEls = document.querySelectorAll('.tier');
      tiers.forEach((tierObj, idx) => {
        const tierEl = tierEls[idx];
        if (!tierEl) return;
        const count = tierObj.items.length;
        const percent = totalCount > 0 ? Math.round((count / totalCount) * 100) : 0;
        // Oppdater progress bar bredde og farge
        const progressBar = tierEl.querySelector('.progress-bar');
        if (progressBar) {
          progressBar.style.width = `${percent}%`;
          // Lysne fargen for progressbar mer for tydelig kontrast
          progressBar.style.backgroundColor = lightenColor(tierObj.color, 0.7);
        }
        // Oppdater telling og prosent tekst
        const countSpan = tierEl.querySelector('.count-info');
        const percentSpan = tierEl.querySelector('.percent-info');
        if (countSpan) countSpan.textContent = `(${count}/${totalCount}),`;
        if (percentSpan) percentSpan.textContent = `${percent}%`;
        // Oppdater tekstfarger for kontrast
        const contrastColor = getContrastColor(tierObj.color);
        if (countSpan) countSpan.style.color = contrastColor;
        if (percentSpan) percentSpan.style.color = contrastColor;
        const removeBtn = tierEl.querySelector('.remove-tier');
        if (removeBtn) removeBtn.style.color = contrastColor;
      });
    }

    /**
     * Påfør et tema ("light" eller "dark"). Oppdaterer data-theme-attributt på html, lagrer i localStorage
     * og endrer ikon på temaveksleren.
     * @param {string} theme
     */
    function applyTheme(theme) {
      const htmlEl = document.documentElement;
      htmlEl.setAttribute('data-theme', theme);
      try {
        localStorage.setItem('tierTheme', theme);
      } catch (e) {
        // localStorage kan være utilgjengelig (f.eks. private browsing)
      }
      const btn = document.getElementById('themeToggle');
      if (btn) {
        btn.textContent = theme === 'dark' ? '☀️' : '🌙';
        btn.title = theme === 'dark' ? 'Swap to light theme' : 'Swap to dark theme';
      }
    }
    /**
     * Sjekk om en tittel allerede finnes i noen tier. Sammenligner case-insensitivt.
     * @param {string} text – Titteltekst å sjekke
     * @returns {boolean} true hvis den finnes, ellers false
     */
    function isDuplicateTitle(text) {
      const val = text.trim().toLowerCase();
      for (const t of tiers) {
        for (const item of t.items) {
          if (item.text.trim().toLowerCase() === val) {
            return true;
          }
        }
      }
      return false;
    }

    /**
     * Forsøk å legge til et nytt element hvis det ikke er duplikat. Returnerer true hvis lagt til.
     * @param {string} text
     * @returns {boolean}
     */
    function attemptAddItem(text, extra = null) {
      const trimmed = text.trim();
      if (!trimmed) return false;
      // Konverter til tittelkasus slik at alle elementer vises konsistent
      const normalized = toTitleCase(trimmed);
      // Sjekk duplikat basert på tekst (uavhengig av ekstra informasjon)
      if (isDuplicateTitle(normalized)) {
        return false;
      }
      addNewItem(normalized, extra);
      return true;
    }

    /**
     * Vis en kortvarig duplikatmelding over legg til-knappen.
     * @param {string} msg
     */
    function showDuplicateMessage(msg) {
      const msgDiv = document.getElementById('duplicateMsg');
      if (!msgDiv) return;
      msgDiv.textContent = msg;
      const btn = document.getElementById('addBulkBtn');
      const rect = btn.getBoundingClientRect();
      // Plasser meldingen like over knappen
      msgDiv.style.left = rect.left + 'px';
      // ta hensyn til scroll-posisjon for body
      msgDiv.style.top = (rect.top - 30 + window.scrollY) + 'px';
      msgDiv.style.display = 'block';
      clearTimeout(msgDiv._timeout);
      msgDiv._timeout = setTimeout(() => {
        msgDiv.style.display = 'none';
      }, 3000);
    }

    /**
     * Legg til en ny tier før den urankede (siste). Flytter ingen elementer.
     */
    function addTier() {
      // Bruk et generert standardnavn basert på antall tiers
      const newName = `Tier ${tiers.length}`;
      const defaultColor = '#577590';
      const newTier = { name: newName, color: defaultColor, items: [] };
      // Sett inn før uranket (siste indeks)
      tiers.splice(tiers.length - 1, 0, newTier);
      renderTiers();
      scheduleAutoSave();
    }

    /**
     * Fjern en tier ved gitt indeks. Elementene flyttes til uranket tier.
     * @param {number} index
     */
    function removeTier(index) {
      if (index < 0 || index >= tiers.length - 1) return;
      const removed = tiers.splice(index, 1)[0];
      const unranked = tiers[tiers.length - 1];
      // Flytt elementer til uranket
      unranked.items = unranked.items.concat(removed.items);
      renderTiers();
      scheduleAutoSave();
    }

    /**
     * Sorter eller miks elementene i urankert tier (siste tier).
     * @param {boolean} shuffle – true for tilfeldig rekkefølge, false for alfabetisk.
     */
    function sortUnranked(shuffle = false) {
      const unrankedIndex = tiers.length - 1;
      const unrankedTier = tiers[unrankedIndex];
      const container = document.querySelectorAll('.tier-items')[unrankedIndex];
      // Lag en kopi av DOM-elementene
      const items = Array.from(container.querySelectorAll('.item'));
      if (items.length === 0) return;
      // Funksjon for å hente tekstinnhold for sortering
      const getText = (el) => el.textContent.toLowerCase();
      if (shuffle) {
        // Fisher–Yates shuffle
        for (let i = items.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [items[i], items[j]] = [items[j], items[i]];
        }
      } else {
        items.sort((a, b) => getText(a).localeCompare(getText(b)));
      }
      // Tøm container og legg til i ny rekkefølge
      container.innerHTML = '';
      const newItemObjs = [];
      items.forEach(itemEl => {
        container.appendChild(itemEl);
        const obj = findItemById(itemEl.id);
        if (obj) newItemObjs.push(obj);
      });
      // Oppdater data for urankert tier
      unrankedTier.items = newItemObjs;
      // Oppdater teller og progresjonsbar
      updateCountsAndProgress();
      scheduleAutoSave();
    }

    /**
     * Persist the current layout to localStorage.
     * @param {Object} options
     * @param {boolean} options.syncFromDOM Update state from the DOM before saving.
     * @param {boolean} options.showFeedback Show a confirmation to the user.
     * @returns {boolean} true when the layout was saved successfully.
     */
    function persistLayout({ syncFromDOM = false, showFeedback = false } = {}) {
      if (syncFromDOM) {
        updateDataFromDOM();
      }

      try {
        localStorage.setItem(LAYOUT_STORAGE_KEY, JSON.stringify({ tiers, nextItemId, pageTitle, columnSettings }));
        if (showFeedback) {
          alert('Oppsett lagret!');
        }
        return true;
      } catch (e) {
        if (showFeedback) {
          alert('Kunne ikke lagre oppsettet.');
        }
        console.error('Could not save the layout to localStorage', e);
        return false;
      }
    }

    /**
     * Schedule an automatic save after a short pause between changes.
     */
    function scheduleAutoSave() {
      window.clearTimeout(autoSaveTimeout);
      autoSaveTimeout = window.setTimeout(() => {
        autoSaveTimeout = null;
        persistLayout();
      }, AUTO_SAVE_DELAY_MS);
    }

    /**
     * Flush a pending automatic save before the page is hidden or reloaded.
     */
    function flushAutoSave() {
      if (autoSaveTimeout === null) return;
      window.clearTimeout(autoSaveTimeout);
      autoSaveTimeout = null;
      persistLayout({ syncFromDOM: true });
    }

    /**
     * Save the current layout to localStorage and show manual feedback.
     */
    function saveLayout() {
      window.clearTimeout(autoSaveTimeout);
      autoSaveTimeout = null;
      persistLayout({ syncFromDOM: true, showFeedback: true });
    }

    /**
     * Last oppsett fra localStorage hvis tilstede, ellers bruk standard.
     */
    function loadLayout() {
      let saved = null;
      try {
        saved = localStorage.getItem(LAYOUT_STORAGE_KEY);
      } catch (e) {
        console.error('Could not read the layout from localStorage', e);
      }
      if (saved) {
        try {
          const data = JSON.parse(saved);
          if (Array.isArray(data.tiers)) {
            tiers = data.tiers;
            nextItemId = data.nextItemId || 1;
            pageTitle = data.pageTitle || pageTitle;
            // Les kolonneinnstillinger hvis inkludert
            if (Array.isArray(data.columnSettings) && data.columnSettings.length === MAX_EXTRA_COLS) {
              columnSettings = data.columnSettings;
              // lagre til localStorage for konsistens med andre lagringsmekanismer
              saveColumnSettings();
            }
            renderTiers();
            // Etter å ha tegnet tiers, påfør kolonneinnstillinger til alle elementer
            applySettingsToAllItems();
            // Oppdater sidetittel i DOM når vi laster fra lagret oppsett
            const pageTitleEl = document.getElementById('pageTitle');
            if (pageTitleEl) pageTitleEl.textContent = pageTitle;
            return;
          }
        } catch (e) {
          console.error('Feil ved lesing av lagret oppsett', e);
        }
      }
      // Fall back til standard
      tiers = JSON.parse(JSON.stringify(defaultTiers));
      nextItemId = 1;
      renderTiers();
      // Sett sidetittel til standard
      const titleEl = document.getElementById('pageTitle');
      if (titleEl) titleEl.textContent = pageTitle;
      // Påfør kolonneinnstillinger til elementer
      applySettingsToAllItems();
    }

    /**
     * Legg til flere titler fra tekstfeltet. Bruker | eller ; som separator.
     * Duplikater (eksisterende eller innen samme input) blir ikke lagt til og gir melding.
     */
    function handleAddBulk() {
      const field = document.getElementById('bulkTitles');
      const raw = field.value;
      if (!raw || !raw.trim()) return;
      // Splitt tekst på separatorer | eller ;
      const parts = raw.split(/\||;/).map(p => p.trim()).filter(p => p);
      if (parts.length === 0) {
        field.value = '';
        return;
      }
      const duplicates = [];
      const addedTitlesThisBatch = new Set();
      parts.forEach(origTitle => {
        // Konverter til tittelkasus for konsistent visning
        const title = toTitleCase(origTitle);
        const lower = title.toLowerCase();
        // Hvis duplikat i denne batchen, registrer og hopp over
        if (addedTitlesThisBatch.has(lower)) {
          duplicates.push(title);
          return;
        }
        // Forsøk å legge til. attemptAddItem returnerer true hvis unikt.
        if (attemptAddItem(title)) {
          addedTitlesThisBatch.add(lower);
        } else {
          duplicates.push(title);
        }
      });
      // Tøm feltet
      field.value = '';
      // Hvis duplikater ble funnet, vis melding
      if (duplicates.length > 0) {
        const uniq = Array.from(new Set(duplicates.map(d => d.toLowerCase())));
        const names = uniq.join(', ');
        showDuplicateMessage(`Duplicates not added: ${names}`);
      }
      // Oppdater counts og progresjonsbar for å reflektere nye elementer
      updateCountsAndProgress();
    }

        handleAddBulk();
      }
    });

    function isRecognizedImportHeader(value) {
      if (typeof value !== 'string') return false;
      const normalized = value.trim().toLowerCase().replace(/[_-]+/g, ' ').replace(/\s+/g, ' ');
      const recognizedHeaders = new Set([
        'title', 'item', 'item title', 'name', 'item name',
        'tittel', 'element', 'elementtittel', 'navn', 'elementnavn'
      ]);
      return recognizedHeaders.has(normalized);
    }

    // Import titles and optional metadata from text, CSV, or Excel files.
    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const fileName = file.name || '';
      const ext = fileName.split('.').pop().toLowerCase();
      // Hvis Excel‑fil og XLSX‑bibliotek er tilgjengelig, bruk det til å lese første ark
      if ((ext === 'xlsx' || ext === 'xls') && typeof XLSX !== 'undefined') {
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            // Konverter arket til et 2D‑array
            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            // Skip the first row only when column A contains a recognized heading.
            const firstCell = rows.length > 0 && Array.isArray(rows[0]) ? rows[0][0] : '';
            const startIndex = isRecognizedImportHeader(firstCell) ? 1 : 0;
            const duplicates = [];
            for (let i = startIndex; i < rows.length; i++) {
              const row = rows[i];
              if (Array.isArray(row) && row.length > 0) {
                const cell = row[0];
                const raw = cell !== undefined && cell !== null ? String(cell).trim() : '';
                if (raw) {
                  // Konverter til tittelkasus
                  const title = toTitleCase(raw);
                  // Hent ekstra kolonner opptil MAX_EXTRA_COLS
                  let extraArr = null;
                  for (let j = 1; j <= MAX_EXTRA_COLS; j++) {
                    const val = row.length > j ? row[j] : null;
                    if (val !== undefined && val !== null && String(val).trim()) {
                      if (!extraArr) extraArr = new Array(MAX_EXTRA_COLS).fill(null);
                      extraArr[j - 1] = String(val).trim();
                    }
                  }
                  if (!attemptAddItem(title, extraArr)) {
                    duplicates.push(title);
                  }
                }
              }
            }
            if (duplicates.length > 0) {
              // vis duplikater
              const uniq = Array.from(new Set(duplicates.map(d => d.toLowerCase())));
              const names = uniq.join(', ');
              showDuplicateMessage(`Duplicates not added: ${names}`);
            }
            // Oppdater counts/progresjon etter import
            updateCountsAndProgress();
          } catch (err) {
            console.error("Couldn't read uploaded file", err);
            alert("Wasn't able to read file. Make sure there's only one column with titles.");
          }
        };
        reader.readAsArrayBuffer(file);
      } else {
        // Behandle som tekst/csv
        const reader = new FileReader();
        reader.onload = (evt) => {
          const text = evt.target.result;
          // Del opp i linjer og kolonner (komma/semikolon eller tab)
        const lines = text.split(/\r?\n/);
        const duplicatesCsv = [];
        lines.forEach(line => {
          if (!line.trim()) return;
          // Splitt på semikolon, komma eller tab
          const cols = line.split(/[;,\t]/);
          const firstRaw = cols[0] ? cols[0].trim() : '';
          if (firstRaw) {
            const title = toTitleCase(firstRaw);
            // Hent ekstra kolonner opptil MAX_EXTRA_COLS
            let extraArr = null;
            for (let j = 1; j <= MAX_EXTRA_COLS; j++) {
              const val = cols.length > j ? cols[j] : null;
              if (val !== undefined && val !== null && String(val).trim()) {
                if (!extraArr) extraArr = new Array(MAX_EXTRA_COLS).fill(null);
                extraArr[j - 1] = String(val).trim();
              }
            }
            if (!attemptAddItem(title, extraArr)) {
              duplicatesCsv.push(title);
            }
          }
        });
        if (duplicatesCsv.length > 0) {
          const uniq = Array.from(new Set(duplicatesCsv.map(d => d.toLowerCase())));
          const names = uniq.join(', ');
          showDuplicateMessage(`Duplicates not added: ${names}`);
        }
        // Oppdater teller/progresjon etter import
        updateCountsAndProgress();
        };
        reader.readAsText(file);
      }
      // Tilbakestill input slik at man kan laste samme fil igjen
      e.target.value = '';
    });

      // #remark Elementer vi vil skjule under eksport (kontroller og søppelbøtte)

      const originalDisplays = new Map();
      toHide.forEach(el => {
        originalDisplays.set(el, el.style.visibility);

      });
      
      // #adding Hide color pickers and replace with colored squares for better image export
      const colorInputs = Array.from(document.querySelectorAll('.tier-footer input[type="color"]'));
      const colorReplacements = [];
      colorInputs.forEach(input => {
        const color = input.value;

        replacement.style.borderRadius = '2px';
        input.parentNode.insertBefore(replacement, input);
        input.style.display = 'none';
        colorReplacements.push({ input, replacement });
      });
      
      // #remark Scroll til toppen for å sikre at alt er synlig
      const previousScroll = { x: window.scrollX, y: window.scrollY };

      // #remark Bruk html2canvas til å fange containeren
      html2canvas(containerEl, { backgroundColor: null }).then(canvas => {

            URL.revokeObjectURL(url);
          } else {

          // #remark Gjenopprett synlighet
          toHide.forEach(el => {
            el.style.visibility = originalDisplays.get(el) || '';
          });
          // #adding Restore color pickers
          colorReplacements.forEach(({ input, replacement }) => {
            replacement.remove();
            input.style.display = '';
          });
          // #remark Gjenopprett scrollposisjon
          window.scrollTo(previousScroll.x, previousScroll.y);
        });
      }).catch(err => {
        console.error(err);
        alert('Failed to export image.');
        toHide.forEach(el => {
          el.style.visibility = originalDisplays.get(el) || '';
        });
        // #adding Restore color pickers on error
        colorReplacements.forEach(({ input, replacement }) => {

        window.scrollTo(previousScroll.x, previousScroll.y);

      if (!container) return;
      for (let i = 0; i < MAX_EXTRA_COLS; i++) {
        const labelInput = container.querySelector(`input[type="text"][data-col-index="${i}"]`);
        const hoverCheckbox = container.querySelector(`input[type="checkbox"][data-col-index="${i}"][data-type="hover"]`);
        const permanentCheckbox = container.querySelector(`input[type="checkbox"][data-col-index="${i}"][data-type="permanent"]`);
        if (!columnSettings[i]) columnSettings[i] = { label: '', showHover: true, showPermanent: false };
        columnSettings[i].label = labelInput ? labelInput.value || getDefaultColumnLabel(i) : getDefaultColumnLabel(i);
        columnSettings[i].showHover = hoverCheckbox ? hoverCheckbox.checked : true;
        columnSettings[i].showPermanent = permanentCheckbox ? permanentCheckbox.checked : false;
      }
      saveColumnSettings();
      applySettingsToAllItems();
      scheduleAutoSave();
      hideSettingsPanel();
    });
    document.getElementById('cancelSettingsBtn').addEventListener('click', hideSettingsPanel);
    document.getElementById('settingsOverlay').addEventListener('click', hideSettingsPanel);
    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Escape') return;
      if (document.getElementById('helpPanel').style.display === 'block') hideHelpPanel();
      if (document.getElementById('settingsPanel').style.display === 'block') hideSettingsPanel();
    });

    // Save the latest change even when the page is refreshed or left immediately.
    window.addEventListener('pagehide', flushAutoSave);

    // Last oppsett når siden lastes
    window.addEventListener('DOMContentLoaded', () => {
      // Sett tema fra lagring eller systempreferanse
      try {
        const savedTheme = localStorage.getItem('tierTheme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const initialTheme = savedTheme || (prefersDark ? 'dark' : 'light');
        applyTheme(initialTheme);
      } catch (e) {
        // Faller tilbake til lys modus hvis localStorage ikke er tilgjengelig
        applyTheme('light');
      }

      const texts = getTierTranslations();
      const importHelpButton = document.getElementById('importHelpBtn');
      importHelpButton.setAttribute('aria-label', texts.importHelpLabel);
      importHelpButton.title = texts.importHelpLabel;

      // Last inn kolonneinnstillinger
      loadColumnSettings();
      loadLayout();
    });
  </script>


  <script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
  <script>
    kofiWidgetOverlay.draw('sarcasticsir', {
      'type': 'floating-chat',
      'floating-chat.donateButton.text': 'Support me',
      'floating-chat.donateButton.background-color': '#00000',
      'floating-chat.donateButton.text-color': '#323842'
    });
  </script>
  <style>
    #kofi-widget-overlay {
      left: 20px !important;
      right: auto !important;
      bottom: 20px !important;
    }
  </style>

</body>
