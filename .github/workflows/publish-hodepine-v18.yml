name: Publish Hodepinekalender v19

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-hodepine-v18.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Build verified standalone v19
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/hodepine-v19/part-00
          test -f .github/hodepine-v19/part-05

          cat .github/hodepine-v19/part-* \
            | tr -d '\r\n ' \
            | base64 --decode \
            | gzip --decompress \
            > hodepinekalender/index.html.new

          echo '638c0b70dc64120c3d8c2c0fc7fa1c19deed3493bc9aedfe8e08a1791fe37c69  hodepinekalender/index.html.new' \
            | sha256sum --check --strict

          grep -q 'id="calendarViewButton"' hodepinekalender/index.html.new
          grep -q 'id="bedtimeInput"' hodepinekalender/index.html.new
          grep -q 'id="wakeTimeInput"' hodepinekalender/index.html.new
          grep -q 'id="sleepStatistics"' hodepinekalender/index.html.new

          mv hodepinekalender/index.html.new hodepinekalender/index.html

      - name: Remove temporary publication files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/hodepine-v18
          rm -rf .github/hodepine-v19
          rm -f .github/workflows/publish-hodepine-v18.yml
          if [ -f hodepinekalender/styles.css ] && [ "$(cat hodepinekalender/styles.css)" = 'PLACEHOLDER' ]; then
            rm -f hodepinekalender/styles.css
          fi

      - name: Commit v19 to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish Hodepinekalender v19 as standalone HTML'
          git push origin HEAD:main
