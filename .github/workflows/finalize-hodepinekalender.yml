name: Finalize Hodepinekalender

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finalize-hodepinekalender.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Replace payload loader with the standalone calendar
        shell: bash
        run: |
          set -euo pipefail
          test -f hodepinekalender/payload/payload-01.b64
          cat hodepinekalender/payload/payload-*.b64 \
            | tr -d '\r\n ' \
            | base64 --decode \
            | gzip --decompress \
            > hodepinekalender/index.html.new
          grep -q '<title>Hodepinekalender</title>' hodepinekalender/index.html.new
          grep -q 'const STORAGE_KEY' hodepinekalender/index.html.new
          mv hodepinekalender/index.html.new hodepinekalender/index.html
          rm -rf hodepinekalender/payload

      - name: Add Hodepinekalender to the front page
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          entry = "      { href: '/hodepinekalender/', title: 'Hodepinekalender', tooltip: { en: 'Simple headache and migraine calendar', no: 'Enkel kalender for hodepine, migrene og medisinbruk' } },\n"
          marker = "    const GAMES = [\n"

          if "href: '/hodepinekalender/'" not in text:
              if marker not in text:
                  raise SystemExit('Could not find GAMES list in root index.html')
              text = text.replace(marker, marker + entry, 1)
              path.write_text(text, encoding='utf-8')

      - name: Remove one-time workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/finalize-hodepinekalender.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html hodepinekalender .github/workflows/finalize-hodepinekalender.yml
          git commit -m 'Publish Hodepinekalender as a regular static page'
          git push origin HEAD:main
