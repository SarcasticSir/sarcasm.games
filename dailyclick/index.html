<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Daily Click</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep:    #0a0812;
    --bg-mid:     #110f1e;
    --bg-card:    #1a1730;
    --bg-card2:   #211e3a;
    --border-dim: rgba(120,100,220,0.18);
    --border-glow:rgba(180,140,255,0.45);
    --text-main:  #e8e0ff;
    --text-muted: #8a80b0;
    --text-dim:   #4a4470;
    --red-main:   #e8334a;
    --red-dark:   #b01e31;
    --red-glow:   rgba(232,51,74,0.45);
    --gold:       #f5c842;
    --gold-glow:  rgba(245,200,66,0.5);
    --purple:     #9b59f5;
    --teal:       #2ecbaa;
    --title-a:    #c9a0ff;
    --title-b:    #7b5fff;
    --title-c:    #ff6ba8;
    --accent-a:   #7b5fff;
    --accent-b:   #ff6ba8;
    --accent-c:   #c96fff;
    --button-done-a:#5af0c0;
    --button-done-b:#2ecbaa;
    --button-done-c:#1a7f6a;
    --button-locked-a:#3a354a;
    --button-locked-b:#2a2540;
    --button-locked-c:#1e1a30;
    --star-a:#f5c842;
    --star-b:#ff9de2;
    --star-stroke:#b8860b;
    --page-bg:
      radial-gradient(circle at 50% -10%, rgba(155,89,245,0.22), transparent 36%),
      linear-gradient(180deg, var(--bg-deep), var(--bg-mid));
    --ambient-layer:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.4) 0%, transparent 100%);
    --card-radius:18px;
    --click-radius:50%;
    --layout-gap:0.8rem;
    --font: 'Segoe UI', system-ui, sans-serif;
    --radius: 12px;
  }

    --bg-deep:#06130d; --bg-mid:#102418; --bg-card:#14281c; --bg-card2:#1b3525;

    --title-a:#d7f99a; --title-b:#67c978; --title-c:#f2ffd0; --accent-a:#3e8f5b; --accent-b:#b7e36f; --accent-c:#65d69a;
    --button-done-a:#c9f985; --button-done-b:#58c783; --button-done-c:#1f6e45;
    --button-locked-a:#2d3d29; --button-locked-b:#1d2b20; --button-locked-c:#101a12;
    --star-a:#d9e76c; --star-b:#65d69a; --star-stroke:#5f8f39;
    --page-bg:radial-gradient(circle at 18% 14%, rgba(143,210,111,0.22), transparent 28%), radial-gradient(circle at 82% 78%, rgba(77,146,96,0.28), transparent 34%), linear-gradient(180deg,#06130d,#102418);
    --ambient-layer:linear-gradient(115deg, transparent 0 42%, rgba(186,240,150,0.05) 44%, transparent 47%), radial-gradient(2px 9px at 18% 22%, rgba(188,244,156,0.28), transparent 80%), radial-gradient(2px 8px at 72% 42%, rgba(108,209,133,0.24), transparent 80%);
    --card-radius:22px; --click-radius:34% 66% 38% 62%;
  }

  body[data-theme="fire"] {
    --bg-deep:#190607; --bg-mid:#35100b; --bg-card:#2a0e10; --bg-card2:#421513;

    --page-bg:radial-gradient(circle at 50% 100%, rgba(255,90,30,0.26), transparent 34%), radial-gradient(circle at 18% 15%, rgba(255,196,71,0.16), transparent 26%), linear-gradient(180deg,#190607,#35100b);
    --ambient-layer:linear-gradient(15deg, transparent 0 44%, rgba(255,112,43,0.11) 46%, transparent 48%), radial-gradient(2px 7px at 32% 72%, rgba(255,197,87,0.46), transparent 80%), radial-gradient(3px 10px at 68% 84%, rgba(255,91,46,0.36), transparent 80%);
    --card-radius:10px; --click-radius:42% 58% 48% 52%;

  body[data-theme="shadow"] {
    --bg-deep:#05060a; --bg-mid:#0c0d14; --bg-card:#11131d; --bg-card2:#181a28;

    --button-done-a:#ffffff; --button-done-b:#86efac; --button-done-c:#239b78;
    --button-locked-a:#284044; --button-locked-b:#183035; --button-locked-c:#0a1a20;
    --star-a:#ffffff; --star-b:#86efac; --star-stroke:#2dd4bf;
    --page-bg:radial-gradient(circle at 26% 20%, rgba(134,239,172,0.18), transparent 30%), radial-gradient(circle at 78% 68%, rgba(103,232,249,0.18), transparent 34%), linear-gradient(180deg,#07121a,#102331);
    --ambient-layer:radial-gradient(24px 24px at 18% 28%, rgba(255,255,255,0.10), transparent 70%), radial-gradient(18px 18px at 82% 34%, rgba(134,239,172,0.12), transparent 72%), radial-gradient(2px 2px at 55% 70%, rgba(255,255,255,0.35), transparent 100%);
    --card-radius:28px; --click-radius:50%;
  }

  body[data-theme="water"] {
    --bg-deep:#03111f; --bg-mid:#08233a; --bg-card:#0e2a42; --bg-card2:#123653;
    --border-dim:rgba(56,189,248,0.24); --border-glow:rgba(125,211,252,0.54);

    --ambient-layer:linear-gradient(105deg, transparent 0 45%, rgba(125,211,252,0.07) 47%, transparent 50%), radial-gradient(30px 9px at 24% 36%, rgba(125,211,252,0.16), transparent 80%), radial-gradient(42px 12px at 78% 72%, rgba(45,212,191,0.13), transparent 80%);
    --card-radius:18px 18px 30px 30px; --click-radius:46% 54% 52% 48%;
  }

  body[data-theme="holy"] {
    --bg-deep:#16130a; --bg-mid:#27210f; --bg-card:#2b2514; --bg-card2:#373017;
    --border-dim:rgba(253,230,138,0.28); --border-glow:rgba(255,255,210,0.58);
    --text-main:#fffbe8; --text-muted:#d9c98b; --text-dim:#8f7f45;

    --title-a:#ffffff; --title-b:#ffe68a; --title-c:#facc15; --accent-a:#d6a80f; --accent-b:#fff1a8; --accent-c:#facc15;
    --button-done-a:#ffffff; --button-done-b:#ffe68a; --button-done-c:#b68a10;
    --button-locked-a:#4a4326; --button-locked-b:#302b19; --button-locked-c:#18140a;
    --star-a:#ffffff; --star-b:#ffe68a; --star-stroke:#b68a10;
    --page-bg:radial-gradient(circle at 50% 0%, rgba(255,246,184,0.22), transparent 36%), linear-gradient(180deg,#16130a,#27210f);
    --ambient-layer:radial-gradient(1px 9px at 50% 18%, rgba(255,255,220,0.34), transparent 90%), radial-gradient(2px 2px at 20% 34%, rgba(255,245,184,0.38), transparent 100%), radial-gradient(2px 2px at 82% 76%, rgba(255,245,184,0.25), transparent 100%);
    --card-radius:20px; --click-radius:50%;
  }

  body[data-theme="heaven"] {
    --bg-deep:#dfefff; --bg-mid:#b9d9ff; --bg-card:rgba(255,255,255,0.72); --bg-card2:rgba(232,244,255,0.86);
    --border-dim:rgba(62,130,190,0.22); --border-glow:rgba(255,255,255,0.72);
    --text-main:#183047; --text-muted:#54708b; --text-dim:#7b91a8;
    --gold:#f6d36b; --gold-glow:rgba(246,211,107,0.48); --purple:#7aa8ff; --teal:#63cdda;
    --title-a:#ffffff; --title-b:#4c8ddb; --title-c:#f6d36b; --accent-a:#6ea8fe; --accent-b:#ffffff; --accent-c:#f6d36b;
    --button-done-a:#ffffff; --button-done-b:#7dd3fc; --button-done-c:#3b82f6;
    --button-locked-a:#c8d6e5; --button-locked-b:#a7bad0; --button-locked-c:#8298ad;
    --star-a:#ffffff; --star-b:#f6d36b; --star-stroke:#6ea8fe;
    --page-bg:radial-gradient(circle at 50% -5%, rgba(255,255,255,0.9), transparent 28%), linear-gradient(180deg,#dfefff,#b9d9ff);
    --ambient-layer:radial-gradient(80px 28px at 20% 30%, rgba(255,255,255,0.45), transparent 70%), radial-gradient(120px 34px at 78% 62%, rgba(255,255,255,0.38), transparent 72%), radial-gradient(2px 2px at 52% 20%, rgba(255,255,255,0.7), transparent 100%);
    --card-radius:26px; --click-radius:999px;
  }

  body[data-theme="death"] {
    --bg-deep:#080807; --bg-mid:#15140f; --bg-card:#1d1b16; --bg-card2:#28251d;
    --border-dim:rgba(170,160,135,0.22); --border-glow:rgba(230,220,190,0.42);
    --text-main:#eee5d1; --text-muted:#a69a84; --text-dim:#655f54;
    --gold:#d8c08a; --gold-glow:rgba(216,192,138,0.42); --purple:#9a8f76; --teal:#c5bca8;
    --title-a:#f3ead8; --title-b:#94886d; --title-c:#d8c08a; --accent-a:#706752; --accent-b:#d8c08a; --accent-c:#b8aa8c;
    --button-done-a:#f3ead8; --button-done-b:#94886d; --button-done-c:#3a352d;
    --button-locked-a:#343128; --button-locked-b:#211f1a; --button-locked-c:#11100d;
    --star-a:#f3ead8; --star-b:#94886d; --star-stroke:#3a352d;
    --page-bg:radial-gradient(circle at 50% 75%, rgba(216,192,138,0.10), transparent 34%), linear-gradient(180deg,#080807,#15140f);
    --ambient-layer:linear-gradient(90deg, transparent 0 48%, rgba(238,229,209,0.035) 50%, transparent 52%), radial-gradient(1px 1px at 28% 26%, rgba(238,229,209,0.20), transparent 100%), radial-gradient(1px 1px at 70% 70%, rgba(238,229,209,0.13), transparent 100%);
    --card-radius:4px; --click-radius:6px;
  }

  body[data-theme="unholy"] {
    --bg-deep:#12030b; --bg-mid:#250816; --bg-card:#260b1b; --bg-card2:#3a0d28;
    --border-dim:rgba(255,79,216,0.24); --border-glow:rgba(255,79,216,0.58);
    --text-main:#ffe6f8; --text-muted:#cc8eba; --text-dim:#7e4e72;
    --gold:#ff8bdc; --gold-glow:rgba(255,79,216,0.5); --purple:#a855f7; --teal:#ff4fd8;
    --title-a:#ffe6f8; --title-b:#ff4fd8; --title-c:#a855f7; --accent-a:#a855f7; --accent-b:#ff4fd8; --accent-c:#fb7185;
    --button-done-a:#ffb3ec; --button-done-b:#ff4fd8; --button-done-c:#7e145f;
    --button-locked-a:#462039; --button-locked-b:#2b1123; --button-locked-c:#150711;
    --star-a:#ffb3ec; --star-b:#a855f7; --star-stroke:#7e145f;
    --page-bg:radial-gradient(circle at 20% 15%, rgba(255,79,216,0.20), transparent 28%), radial-gradient(circle at 78% 78%, rgba(168,85,247,0.22), transparent 34%), linear-gradient(180deg,#12030b,#250816);

    --card-radius:18px 4px 18px 4px; --click-radius:50% 18% 50% 18%;

  body {
    background: var(--page-bg);
    color: var(--text-main);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    overflow-x: hidden;
  }

  /* ===== BACKGROUND STARS ===== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: var(--ambient-layer);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== LAYOUT ===== */
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 540px;
  }

  /* ===== HEADER ===== */
  header {
    text-align: center;
    margin-bottom: 2rem;
  }
  header h1 {
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: linear-gradient(110deg, var(--title-a) 0%, var(--title-b) 28%, #ffffff 42%, var(--title-c) 56%, var(--title-a) 100%);
    background-size: 260% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    margin-bottom: 0.25rem;
    animation: title-shimmer 4.5s ease-in-out infinite;
  }
  header p {
    color: var(--text-muted);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .theme-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    margin-bottom: 1rem;
    padding: 0.75rem 0.85rem;
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: var(--card-radius);
  }
  .theme-panel label {
    color: var(--text-muted);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .theme-panel select {
    min-width: 150px;
    background: var(--bg-card2);
    border: 1px solid var(--border-glow);
    border-radius: 10px;
    color: var(--text-main);
    padding: 0.5rem 0.65rem;
    font: 700 0.78rem var(--font);
    outline: none;
  }

  /* ===== STATS BAR ===== */
  .stats {
    display: flex;
    justify-content: space-between;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .stat-box {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius);
    padding: 0.7rem 0.5rem;
    text-align: center;
  }
  .stat-box .label {
    font-size: 0.68rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 0.2rem;
  }
  .stat-box .value {
    font-size: 1.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--title-a), var(--title-b));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ===== STARS ROW ===== */
  .stars-section {
    margin-bottom: 1.5rem;
  }
  .stars-section h2 {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
  }
  .stars-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  /* ===== STAR BUTTON ===== */
  .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    position: relative;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }
  .star-btn:hover { transform: scale(1.15); }
  .star-btn:active { transform: scale(0.95); }
  .star-btn svg { width: 40px; height: 40px; filter: drop-shadow(0 0 6px var(--gold-glow)); }
  .star-btn .star-num {
    position: absolute;
    font-size: 0.6rem;
    font-weight: 700;
    color: var(--bg-deep);
    pointer-events: none;
  }

  /* ===== STAR EXPAND PANEL ===== */
  .star-panel {
    background: var(--bg-card);
    border: 1px solid var(--border-glow);
    border-radius: var(--radius);
    padding: 1rem;
    margin-top: 0.5rem;
    margin-bottom: 1rem;
    animation: fadeIn 0.3s ease;
  }
  .star-panel h3 {
    font-size: 0.8rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.8rem;
  }
  .star-days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
    gap: 0.4rem;
  }
  .star-day-chip {
    border-radius: 8px;
    padding: 0.35rem 0.4rem;
    text-align: center;
    font-size: 0.72rem;
    font-weight: 600;
    color: #fff;
  }

  /* ===== MAIN GAME CARD ===== */
  .game-card {
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: var(--card-radius);
    padding: 1.5rem 1.2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, color-mix(in srgb, var(--accent-a) 18%, transparent) 0%, transparent 70%);
    pointer-events: none;
  }

  .day-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 0.3rem;
  }
  .day-number {
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--title-c), var(--accent-b), var(--accent-c));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .day-status {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
    min-height: 1.2em;
  }

  /* ===== BUTTON GRID ===== */
  .btn-grid {
    display: flex;
    flex-wrap: wrap;
    gap: var(--layout-gap);
    justify-content: center;
    margin-bottom: 0.5rem;
  }

  /* ===== CLICK BUTTON ===== */
  /* #changed: base styles only — per-button gradient colors applied inline in JS */
  .click-btn {
    width: 72px;
    height: 72px;
    border-radius: var(--click-radius);
    border: 3px solid rgba(0,0,0,0.25);
    cursor: pointer;
    font-size: 1.5rem;
    color: #fff;
    font-weight: 900;
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    outline: none;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
  .click-btn:hover:not([style*="pointer-events: none"]):not(.locked) {
    transform: scale(1.1);
    filter: brightness(1.15);
  }
  .click-btn:active:not(.locked) {
    transform: scale(0.93);
  }
  /* Clicked state — teal checkmark */
  .click-btn.clicked {
    background: radial-gradient(circle at 35% 35%, var(--button-done-a), var(--button-done-b) 55%, var(--button-done-c)) !important;
    border-color: var(--button-done-c) !important;
    box-shadow: 0 0 16px rgba(46,203,170,0.45) !important;
    cursor: default;
  }
  /* Locked state (day done) */
  .click-btn.locked {
    background: radial-gradient(circle at 35% 35%, var(--button-locked-a), var(--button-locked-b) 55%, var(--button-locked-c)) !important;
    border-color: var(--button-locked-a) !important;
    box-shadow: none !important;
    cursor: not-allowed;
    opacity: 0.45;
    pointer-events: none;
  }
  /* Ripple */
  .click-btn .ripple {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    animation: ripple-anim 0.5s ease-out forwards;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }

  /* ===== COLLAPSIBLE BUTTON GROUP (star toggle inside game card) ===== */
  /* #added: wraps groups of 30 buttons behind a clickable inline star */
  .btn-group-toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: none;
    border: 1.5px solid rgba(245,200,66,0.35);
    border-radius: 99px;
    padding: 0.35rem 0.9rem 0.35rem 0.5rem;
    cursor: pointer;
    color: var(--gold);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    transition: background 0.2s, border-color 0.2s;
    margin-bottom: 0.5rem;
  }
  .btn-group-toggle:hover { background: rgba(245,200,66,0.08); border-color: rgba(245,200,66,0.6); }
  .btn-group-toggle svg { width: 28px; height: 28px; flex-shrink: 0; }
  .btn-group-toggle .toggle-arrow {
    font-size: 0.65rem;
    opacity: 0.6;
    transition: transform 0.2s;
  }
  .btn-group-toggle.open .toggle-arrow { transform: rotate(180deg); }

  /* #added: visual feedback when an entire 30-button star group is completed */
  .btn-group-toggle.group-complete {
    border-color: rgba(245,200,66,0.95);
    background: linear-gradient(135deg, rgba(245,200,66,0.18), rgba(255,157,226,0.16));
    box-shadow: 0 0 18px rgba(245,200,66,0.22);
  }

  .btn-group-complete-text {
    color: #ffe27a;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .btn-group-inner {
    display: none;
    flex-wrap: wrap;
    gap: 0.7rem;
    justify-content: center;
    padding: 0.8rem 0 0.4rem;
    animation: fadeIn 0.25s ease;
  }
  .btn-group-inner.open { display: flex; }

  /* ===== COMPLETED OVERLAY ===== */
  .day-done-msg {
    font-size: 0.85rem;
    color: var(--teal);
    margin-top: 0.8rem;
    min-height: 1.4em;
    letter-spacing: 0.04em;
  }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap {
    margin-top: 1.2rem;
    height: 6px;
    background: rgba(255,255,255,0.07);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent-a), var(--accent-b));
    transition: width 0.4s ease;
  }

  /* ===== POPUP CELEBRATION ===== */
  #popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,6,18,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 2rem;
  }
  #popup-overlay.show { display: flex; animation: fadeIn 0.35s ease; }

  .popup-inner {
    max-width: 380px;
  }
  .popup-emoji {
    font-size: 4rem;
    margin-bottom: 0.5rem;
    animation: bounce 0.6s ease infinite alternate;
    display: block;
  }
  .popup-title {
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--gold), var(--title-c), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.6rem;
    animation: popIn 0.5s cubic-bezier(0.22,1,0.36,1);
  }
  .popup-sub {
    font-size: 1rem;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }
  .popup-close-btn {
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    color: #fff;
    border: none;
    border-radius: 99px;
    padding: 0.7rem 2.2rem;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: transform 0.15s, opacity 0.15s;
  }
  .popup-close-btn:hover { transform: scale(1.05); }
  .popup-close-btn:active { transform: scale(0.97); }

  /* Confetti particles */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 99;
    animation: confetti-fall var(--dur, 2.5s) var(--delay, 0s) ease-in forwards;
  }

  /* ===== TESTING CONTROLS (reset + set-day) ===== */
  /* #added: dev toolbar fixed to bottom-left, discreet styling */
  .dev-bar {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    z-index: 10;
  }
  .reset-btn, .setday-btn, .save-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-size: 0.65rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: color 0.2s, border-color 0.2s;
    font-family: var(--font);
  }
  .reset-btn:hover, .setday-btn:hover, .save-btn:hover { color: var(--text-muted); border-color: rgba(255,255,255,0.2); }

  .import-save-input {
    display: none;
  }
  /* #added: small number input for target day */
  .setday-input {
    width: 42px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 0.3rem 0.4rem;
    font-size: 0.65rem;
    text-align: center;
    outline: none;
    font-family: var(--font);
  }
  .setday-input:focus { border-color: rgba(255,255,255,0.25); }

  .hidden { display: none !important; }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
  @keyframes popIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes title-shimmer {
    0%, 18%   { background-position: 100% 50%; }
    48%, 100% { background-position: 0% 50%; }
  }
  @keyframes ripple-anim {
    from { width: 10px; height: 10px; opacity: 0.6; }
    to   { width: 120px; height: 120px; opacity: 0; }
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-30px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  @keyframes btn-click-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(46,203,170,0.7); }
    70%  { box-shadow: 0 0 0 16px rgba(46,203,170,0); }
    100% { box-shadow: 0 0 0 0 rgba(46,203,170,0); }
  }
  .pulse-anim { animation: btn-click-pulse 0.5s ease-out; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 400px) {
    .click-btn { width: 62px; height: 62px; font-size: 1.2rem; }
    .btn-grid { gap: 0.6rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    header h1 { animation: none; }
  }
</style>
</head>
<body>
<a href="/" style="position: relative; z-index: 2; color: var(--text-main); text-decoration: none; margin-bottom: 1rem;">← Back to sarcasm.games</a>
<div class="container">
  <header>
    <h1>The Daily Click</h1>
    <p>Hva bør det stå her, Henrik?k</p>
  </header>

  <div class="theme-panel">
    <label for="theme-select">Theme</label>
    <select id="theme-select" aria-label="Visual theme">
      <option value="forest">Forest</option>
      <option value="fire">Fire</option>
      <option value="shadow">Shadow</option>
      <option value="spirit">Spirit</option>
      <option value="water">Water</option>
      <option value="holy">Holy</option>
      <option value="heaven">Heaven</option>
      <option value="death">Death</option>
      <option value="unholy">Unholy</option>
    </select>
  </div>

  <!-- Stats bar -->
  <div class="stats">
    <div class="stat-box">
      <span class="label">Current day</span>
      <span class="value" id="stat-day">1</span>
    </div>
    <div class="stat-box">
      <span class="label">Best streak</span>
      <span class="value" id="stat-best">0</span>
    </div>
    <div class="stat-box">
      <span class="label">Stars earned</span>
      <span class="value" id="stat-stars">0</span>
    </div>
  </div>

  <!-- Stars archive section -->
  <div class="stars-section" id="stars-section" style="display:none;">
    <h2>&#9733; Completed periods</h2>
    <div class="stars-row" id="stars-row"></div>
    <div id="star-panel-container"></div>
  </div>

  <!-- Main game card -->
  <div class="game-card">
    <div class="day-label">Day</div>
    <div class="day-number" id="day-number">1</div>
    <div class="day-status" id="day-status">Click the button to begin</div>

    <div class="btn-grid" id="btn-grid"></div>

    <div class="day-done-msg" id="day-done-msg"></div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- Celebration popup -->
<div id="popup-overlay" role="dialog" aria-modal="true" aria-label="Day complete">
  <div class="popup-inner">
    <span class="popup-emoji" id="popup-emoji">🎉</span>
    <div class="popup-title" id="popup-title">Day Complete!</div>
    <div class="popup-sub" id="popup-sub">Amazing work. Come back tomorrow!</div>
    <button class="popup-close-btn" id="popup-close-btn">Continue</button>
  </div>
</div>

<!-- Discreet reset button for testing -->
<button class="save-btn" id="admin-toggle-btn" style="position:fixed;bottom:1rem;left:1rem;z-index:11;">admin tools</button>
<!-- #added: dev toolbar — discreet testing controls fixed to bottom-right -->
<div class="dev-bar hidden" id="dev-bar">
  <!-- #changed: removed max="30" so tester can jump past day 30 -->
  <input class="setday-input" id="setday-input" type="number" min="1" max="300" value="1" title="Jump to day (testing)" />
  <button class="setday-btn" id="setday-btn" title="Set current day for testing">set day</button>
  <button class="save-btn" id="export-save-btn" title="Export save file">export</button>
  <button class="save-btn" id="import-save-btn" title="Import save file">import</button>
  <input class="import-save-input" id="import-save-input" type="file" accept="application/json,.json" />
  <button class="reset-btn" id="reset-btn" title="Reset all progress (testing only)">reset</button>
</div>

<script>
  const KEYS = { day:'dcg_day', clickedSet:'dcg_clickedSet', lastDate:'dcg_lastDate', best:'dcg_best', stars:'dcg_stars', openStar:'dcg_openStar', theme:'dcg_theme' };
  const DAY_GRADIENTS = ['#e84393,#7b2fff','#ff6b35,#f7c948','#2ecbaa,#1a6fff','#ff3c5f,#ff9de2','#a78bfa,#06b6d4','#f59e0b,#ef4444','#10b981,#3b82f6','#f43f5e,#fb923c','#8b5cf6,#ec4899','#14b8a6,#6366f1','#f97316,#a855f7','#22d3ee,#f472b6','#84cc16,#22c55e','#e879f9,#fbbf24','#38bdf8,#818cf8','#fb7185,#fda4af','#a3e635,#4ade80','#c084fc,#f0abfc','#fdba74,#fb923c','#6ee7b7,#34d399','#fca5a5,#f87171','#93c5fd,#60a5fa','#fcd34d,#fbbf24','#d8b4fe,#c084fc','#86efac,#4ade80','#fed7aa,#fb923c','#bae6fd,#38bdf8','#fce7f3,#f9a8d4','#e0e7ff,#a5b4fc','#d1fae5,#6ee7b7'];
  const PRAISE_NORMAL = [["A DAY HAS BEEN VANQUISHED!","You pressed the sacred button and reality has filed the paperwork. Return tomorrow for another microscopic triumph."],["THE CLICKENING IS COMPLETE!","Historians are already arguing about where to put the statue. The streak survives."],["ABSURDLY WELL CLICKED!","One tiny button, one colossal act of unnecessary discipline. Tomorrow demands a sequel."],["THE DAILY PROPHECY IS FULFILLED!","The button has been clicked, the cosmos has nodded, and your future self is being smug about it."],["STREAK DEFENSE SUCCESSFUL!","Against all odds, distractions, and basic common sense, you have protected the ritual."],["BUTTON DOMINANCE ACHIEVED!","A lesser person might have forgotten. You arrived, clicked, and left destiny slightly intimidated."],["TODAY HAS BEEN CERTIFIED CLICKED!","The auditors are weeping. The numbers are glowing. The streak machine remains operational."]];
  const PRAISE_MILESTONE = [["10 DAYS!","TEN WHOLE DAYS. A double-digit monument to clicking discipline. Somewhere, a tiny parade is blocking traffic in your honor."],["20 DAYS!","TWENTY DAYS! This is no longer a habit; this is a legally suspicious lifestyle choice with excellent branding."],["30 DAYS!","ONE FULL PERIOD COMPLETE! You have earned a star, bent time around a button, and forced the calendar to acknowledge your greatness."]];
  const THEMES = ['forest','fire','shadow','spirit','water','holy','heaven','death','unholy'];
  const THEME_BUTTON_GRADIENTS = {
    forest: [['#d7f99a','#3f8f53'],['#b7e36f','#245f38'],['#83d475','#174a2d'],['#e5ffb8','#5e9f42'],['#65d69a','#1f6e45']],
    fire: [['#ffe08a','#b91c1c'],['#ff7a2d','#7f1d1d'],['#ffc447','#c2410c'],['#ff5b2e','#7c120d'],['#fff1a8','#dc2626']],
    shadow: [['#c7cad8','#2e3344'],['#8e96b8','#171a25'],['#afb4c9','#3b4054'],['#747b98','#11131d'],['#e5e7f2','#4b5166']],
    spirit: [['#ffffff','#239b78'],['#b8f7d4','#0f766e'],['#9ce8ff','#1d8096'],['#86efac','#166534'],['#eaffff','#2dd4bf']],
    water: [['#a7f3ff','#075985'],['#38bdf8','#0c4a6e'],['#2dd4bf','#0f766e'],['#dffbff','#0284c7'],['#7dd3fc','#164e63']],
    holy: [['#ffffff','#b68a10'],['#ffe68a','#854d0e'],['#fff1a8','#ca8a04'],['#facc15','#713f12'],['#fffbe8','#d6a80f']],
    heaven: [['#ffffff','#3b82f6'],['#dbeafe','#60a5fa'],['#f6d36b','#4c8ddb'],['#e0f2fe','#0ea5e9'],['#fff7cc','#6ea8fe']],
    death: [['#f3ead8','#3a352d'],['#d8c08a','#4a4030'],['#b8aa8c','#211f1a'],['#eee5d1','#655f54'],['#a69a84','#302b24']],
    unholy: [['#ffb3ec','#7e145f'],['#ff4fd8','#4c0d3a'],['#a855f7','#581c87'],['#fb7185','#831843'],['#ffe6f8','#a21caf']]
  };

  let currentTheme = 'forest';

  function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
  function parseLocalDate(s){ if(!/^\d{4}-\d{2}-\d{2}$/.test(s)) return null; const [y,m,d]=s.split('-').map(Number); const dt=new Date(y,m-1,d); return (dt.getFullYear()===y&&dt.getMonth()===m-1&&dt.getDate()===d)?dt:null; }
  function daysBetweenDates(a,b){const f=parseLocalDate(a), t=parseLocalDate(b); if(!f||!t) return null; return Math.round((t-f)/(24*60*60*1000));}
  function load(k,f){const v=localStorage.getItem(k); if(v===null) return f; try{return JSON.parse(v);}catch{return v;}}
  function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

  function applyTheme(theme, shouldSave = true){
    currentTheme = THEMES.includes(theme) ? theme : 'forest';
    document.body.dataset.theme = currentTheme;
    const select = document.getElementById('theme-select');
    if (select) select.value = currentTheme;
    if (shouldSave) save(KEYS.theme, currentTheme);
  }

  function cssVar(name){return getComputedStyle(document.body).getPropertyValue(name).trim();}

  let state={day:1,clickedSet:new Set(),lastDate:'',best:0,stars:[],openStar:-1};
  let openButtonGroup=-1;

  function loadState(){state.day=load(KEYS.day,1);state.clickedSet=new Set(load(KEYS.clickedSet,[]));state.lastDate=load(KEYS.lastDate,'');state.best=load(KEYS.best,0);state.stars=load(KEYS.stars,[]);state.openStar=load(KEYS.openStar,-1);}
  function saveState(){save(KEYS.day,state.day);save(KEYS.clickedSet,Array.from(state.clickedSet));save(KEYS.lastDate,state.lastDate);save(KEYS.best,state.best);save(KEYS.stars,state.stars);save(KEYS.openStar,state.openStar);}

  function reconcileDay(){const today=todayStr(); if(!state.lastDate){state.lastDate=today;state.clickedSet=new Set();return;} if(state.lastDate===today)return; const daysElapsed=daysBetweenDates(state.lastDate,today); if(daysElapsed!==1){state.day=1;state.clickedSet=new Set();state.lastDate=today;return;} const required=state.day; if(state.clickedSet.size<required){state.day=1;state.clickedSet=new Set();} else { if(state.day>=30){archivePeriod(state.lastDate);state.day=1;} else {state.day+=1;} state.clickedSet=new Set(); } state.lastDate=today; }
  function archivePeriod(completedOn=todayStr()){state.openStar=-1;openButtonGroup=-1; if(state.stars.some((s)=>s.completedOn===completedOn)) return; const periodId=state.stars.length+1; state.stars.push({id:periodId,completedOn});}

  function handleClick(btnEl, idx){const required=state.day; if(state.clickedSet.size>=required||state.clickedSet.has(idx))return; btnEl.classList.add('clicked');btnEl.style.pointerEvents='none';btnEl.disabled=true;btnEl.textContent='✓'; state.clickedSet.add(idx);state.lastDate=todayStr(); if(state.day>state.best)state.best=state.day; updateButtonGroupLabels();updateProgressBar();updateUI(); if(state.clickedSet.size>=required){if(state.day===30)archivePeriod(state.lastDate);openButtonGroup=-1;saveState();renderButtons();updateUI();onDayComplete();} else saveState(); }

  function onDayComplete(){document.getElementById('day-done-msg').textContent='✨ Day complete! The button council has been notified.';document.getElementById('day-status').textContent='All clicks spent. The ritual chamber is sealed until tomorrow.'; let emoji,title,sub; if(state.day===10||state.day===20||state.day===30){const i=state.day===10?0:state.day===20?1:2;[title,sub]=PRAISE_MILESTONE[i];emoji=state.day===30?'⭐':state.day===20?'🌟':'🔥';} else {const r=PRAISE_NORMAL[Math.floor(Math.random()*PRAISE_NORMAL.length)];[title,sub]=r;emoji=['🎉','✨','🌙','💫','⚡','🔮','🎇'][state.day%7];} setTimeout(()=>showPopup(emoji,title,sub),500); setTimeout(()=>launchConfetti(),600);}

  function showPopup(emoji,title,sub){document.getElementById('popup-emoji').textContent=emoji;document.getElementById('popup-title').textContent=title;document.getElementById('popup-sub').textContent=sub;document.getElementById('popup-overlay').classList.add('show');}
  document.getElementById('popup-close-btn').addEventListener('click',()=>{document.getElementById('popup-overlay').classList.remove('show');clearConfetti();});

  const CONFETTI_COLORS=['#ff6ba8','#c96fff','#f5c842','#2ecbaa','#7b5fff','#ff9de2','#38bdf8']; const confettiPieces=[];
  function launchConfetti(){clearConfetti();for(let i=0;i<55;i++){const el=document.createElement('div');el.classList.add('confetti-piece');el.style.left=Math.random()*100+'vw';el.style.top='-10px';el.style.background=CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];el.style.setProperty('--dur',(1.8+Math.random()*1.5)+'s');el.style.setProperty('--delay',(Math.random()*0.8)+'s');el.style.borderRadius=Math.random()>0.5?'50%':'2px';el.style.width=(6+Math.random()*8)+'px';el.style.height=(6+Math.random()*8)+'px';document.body.appendChild(el);confettiPieces.push(el);}}
  function clearConfetti(){confettiPieces.forEach((el)=>el.remove());confettiPieces.length=0;}

  function renderStars(){const section=document.getElementById('stars-section'),row=document.getElementById('stars-row'); if(state.stars.length===0){section.style.display='none';return;} const starA=cssVar('--star-a')||'#f5c842',starB=cssVar('--star-b')||'#ff9de2',starStroke=cssVar('--star-stroke')||'#b8860b'; section.style.display='block';row.innerHTML=''; state.stars.forEach((star,idx)=>{const btn=document.createElement('button');btn.className='star-btn';btn.title=`Period ${star.id} — completed ${star.completedOn}`;btn.innerHTML=`<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sg${idx}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${starA}" /><stop offset="100%" stop-color="${starB}" /></linearGradient></defs><polygon points="20,3 24.7,14.4 37,14.4 27.2,21.6 31,33 20,26 9,33 12.8,21.6 3,14.4 15.3,14.4" fill="url(#sg${idx})" stroke="${starStroke}" stroke-width="0.8"/></svg><span class="star-num">${star.id}</span>`;btn.addEventListener('click',()=>toggleStarPanel(idx));row.appendChild(btn);});renderStarPanel();}
  function toggleStarPanel(idx){state.openStar=state.openStar===idx?-1:idx;saveState();renderStarPanel();}
  function renderStarPanel(){const panel=document.getElementById('star-panel-container'); if(state.openStar===-1||state.openStar>=state.stars.length){panel.innerHTML='';return;} const star=state.stars[state.openStar]; const palette=THEME_BUTTON_GRADIENTS[currentTheme]||BTN_GRADIENTS; let chips=''; for(let d=1;d<=30;d++){const [c1,c2]=palette[(d-1)%palette.length]; chips+=`<div class="star-day-chip" style="background:linear-gradient(135deg,${c1},${c2})">Day ${d}<br><small style="font-weight:400;opacity:0.85">${d} click${d>1?'s':''}</small></div>`;} panel.innerHTML=`<div class="star-panel"><h3>⭐ Period ${star.id} — completed on ${star.completedOn}</h3><div class="star-days-grid">${chips}</div></div>`;}
  const BTN_GRADIENTS=[['#ff5c74','#b01e31'],['#ff8c42','#c45a10'],['#ffcc44','#c47a00'],['#aaee44','#5a8a00'],['#44ddaa','#0a7a5a'],['#44aaff','#0055bb'],['#8866ff','#4400cc'],['#ee44cc','#990088'],['#ff6688','#aa2244'],['#ff9966','#cc4400'],['#ffee66','#aa8800'],['#88ee66','#338800'],['#22ddcc','#007766'],['#6699ff','#2233cc'],['#bb66ff','#6600cc'],['#ff66bb','#cc0077'],['#ff4455','#880011'],['#ffaa33','#885500'],['#ddff44','#778800'],['#33ffaa','#007744'],['#33ccff','#005588'],['#9944ff','#440088'],['#ff44aa','#880044'],['#ff7733','#993300'],['#eecc22','#886600'],['#66ff88','#118833'],['#00ccdd','#006677'],['#7755ee','#330099'],['#ff55dd','#881166'],['#ff3333','#991111']];
  function btnGradientStyle(i){const palette=THEME_BUTTON_GRADIENTS[currentTheme]||BTN_GRADIENTS;const [c1,c2]=palette[i%palette.length]; return `background: radial-gradient(circle at 35% 35%, ${c1}, ${c2} 80%);box-shadow: 0 0 16px ${c2+'88'}, inset 0 2px 4px rgba(255,255,255,0.18);`;}
  function buildBtn(label,i,isClicked,isDone,onClickFn){const btn=document.createElement('button');btn.className='click-btn'; if(isClicked){btn.classList.add('clicked');btn.textContent='✓';btn.style.pointerEvents='none';btn.disabled=true;} else if(isDone){btn.classList.add('locked');btn.textContent=label;btn.disabled=true;} else {btn.setAttribute('style',btnGradientStyle(i));btn.textContent=label;btn.addEventListener('click',()=>onClickFn(btn));} return btn;}

  function renderButtons(){const grid=document.getElementById('btn-grid');const required=state.day;grid.innerHTML='';const dayDone=state.clickedSet.size>=required;if(dayDone)openButtonGroup=-1; const fullPeriods=Math.floor(required/30), remainder=required%30;
    for(let p=0;p<fullPeriods;p++){const groupStart=p*30, groupEnd=groupStart+30;const groupClicked=Array.from(state.clickedSet).filter((x)=>x>=groupStart&&x<groupEnd).length;const groupAllDone=groupClicked>=30; const toggle=document.createElement('button');toggle.className='btn-group-toggle';if(groupAllDone)toggle.classList.add('group-complete');toggle.innerHTML=`<svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="tsg${p}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${groupAllDone?'#f5c842':'#9b8fcc'}"/><stop offset="100%" stop-color="${groupAllDone?'#ff9de2':'#5a4f99'}"/></linearGradient></defs><polygon points="14,2 17,10.5 26,10.5 19,16 21.5,24.5 14,19.5 6.5,24.5 9,16 2,10.5 11,10.5" fill="url(#tsg${p})"/></svg><span class="btn-group-label" data-group-index="${p}">Period ${p + 1} &mdash; ${groupAllDone ? '30/30' : groupClicked + '/30'}</span>${groupAllDone ? '<span class="btn-group-complete-text">Complete</span>' : ''}<span class="toggle-arrow">▲</span>`;
      const isGroupOpen=openButtonGroup===p;toggle.classList.toggle('open',isGroupOpen);
      const inner=document.createElement('div');inner.className='btn-group-inner';inner.classList.toggle('open',isGroupOpen);
      for(let i=groupStart;i<groupEnd;i++){const label=i+1;inner.appendChild(buildBtn(label,i,state.clickedSet.has(i),dayDone&&!state.clickedSet.has(i),(b)=>handleClick(b,i)));}
      toggle.addEventListener('click',()=>{openButtonGroup=openButtonGroup===p?-1:p;renderButtons();});grid.appendChild(toggle);grid.appendChild(inner);
    }
    if(remainder>0&&openButtonGroup===-1){const gs=fullPeriods*30;for(let i=gs;i<gs+remainder;i++){const label=i+1;grid.appendChild(buildBtn(label,i,state.clickedSet.has(i),dayDone&&!state.clickedSet.has(i),(b)=>handleClick(b,i)));}}
  }
  function updateButtonGroupLabels(){document.querySelectorAll('.btn-group-label').forEach((el)=>{const p=Number(el.dataset.groupIndex);if(Number.isNaN(p))return; const s=p*30,e=s+30,c=Array.from(state.clickedSet).filter((x)=>x>=s&&x<e).length;el.innerHTML=`Period ${p+1} &mdash; ${c>=30?'30/30':c+'/30'}`;});}
  function updateProgressBar(){const req=state.day;document.getElementById('progress-bar').style.width=(req>0?(state.clickedSet.size/req)*100:0)+'%';}
  function updateUI(){document.getElementById('day-number').textContent=state.day;document.getElementById('stat-day').textContent=state.day;document.getElementById('stat-best').textContent=state.best;document.getElementById('stat-stars').textContent=state.stars.length;const req=state.day,done=state.clickedSet.size>=req;document.getElementById('day-status').textContent=done?'All clicks spent. The ritual chamber is sealed until tomorrow.':`${req-state.clickedSet.size} click${req-state.clickedSet.size>1?'s':''} remaining today`;document.getElementById('day-done-msg').textContent=done?'✨ Day complete! The button council has been notified.':'';updateProgressBar();renderStars();}


  async function isLoggedInAdmin(){
    try {
      const response = await fetch('/api/auth/session', { credentials: 'include' });
      if (!response.ok) return false;
      const data = await response.json();
      return data?.user?.role === 'admin';
    } catch {
      return false;
    }
  }

  async function syncAdminPanelVisibility(){
    const allowed = await isLoggedInAdmin();
    document.getElementById('dev-bar').classList.toggle('hidden', !allowed);
    document.getElementById('admin-toggle-btn').classList.toggle('hidden', !allowed);
  }

  document.getElementById('reset-btn').addEventListener('click',()=>{if(!confirm('Reset ALL progress? This cannot be undone.'))return;Object.entries(KEYS).filter(([name])=>name!=='theme').forEach(([,key])=>localStorage.removeItem(key));loadState();init();});
  document.getElementById('setday-btn').addEventListener('click',()=>{const target=parseInt(document.getElementById('setday-input').value,10);if(isNaN(target)||target<1||target>300){alert('Please enter a day number from 1 to 300.');return;} state.day=target;state.clickedSet=new Set();openButtonGroup=-1;state.lastDate=todayStr();saveState();renderButtons();updateUI();});
  document.getElementById('export-save-btn').addEventListener('click',()=>alert('Export from inline version is disabled in this compact embed.'));
  document.getElementById('import-save-btn').addEventListener('click',()=>alert('Import from inline version is disabled in this compact embed.'));
  document.getElementById('theme-select').addEventListener('change',(event)=>{applyTheme(event.target.value);renderButtons();renderStars();});

  async function init(){applyTheme(load(KEYS.theme,'forest'), false);loadState();reconcileDay();saveState();renderButtons();updateUI();await syncAdminPanelVisibility();}
  init();
</script>
</body>
</html>
