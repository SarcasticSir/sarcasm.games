<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sarcasm.games</title>
  <style>
    :root { --bg:#0b0c10; --card:#1e1f25; --txt:#eaeaea; --bd:#2f313a; --accent:#4ecca3; --danger:#ff6b6b; --muted:#9aa0ad; }
    body.light-mode { --bg:#f7f7fb; --card:#fff; --txt:#111; --bd:#e7e7ef; --muted:#5d6470; }
    body { margin:0; font:16px/1.4 system-ui, Segoe UI, Roboto, Arial; background:var(--bg); color:var(--txt); min-height:100dvh; }
    .hidden{display:none!important}

    .auth-shell{position:fixed;inset:0;padding:24px;display:grid;place-items:center;background:rgba(0,0,0,.55);z-index:2000}
    .auth-card{width:min(700px,100%);background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:20px;box-sizing:border-box;position:relative;max-height:88vh;overflow:auto}
    .auth-close{position:absolute;top:10px;right:10px;background:transparent;border:1px solid var(--bd);color:var(--txt);padding:6px 10px;border-radius:8px}
    .auth-title{margin:0 0 8px;font-size:1.6rem}
    .auth-subtitle{margin:0 0 16px;color:var(--muted)}
    .auth-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
    .tab-btn{border:1px solid var(--bd);background:transparent;color:var(--txt);border-radius:8px;padding:8px 12px;cursor:pointer}
    .tab-btn.active{background:var(--accent);color:#111;border-color:var(--accent);font-weight:700}
    .form-group{margin-bottom:10px}
    .form-group label{display:block;margin-bottom:4px;font-size:.9rem;color:var(--muted)}
    input{width:100%;box-sizing:border-box;background:var(--bg);border:1px solid var(--bd);color:var(--txt);padding:10px 12px;border-radius:8px;font-size:14px;outline:none}
    .btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    button{border:0;border-radius:8px;padding:10px 14px;cursor:pointer;font-weight:700}
    .btn-primary{background:var(--accent);color:#111}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-neutral{background:var(--bd);color:var(--txt)}
    .status-box{margin-top:12px;min-height:20px;color:var(--muted);font-size:.92rem;word-break:break-word}

    .app-shell{display:flex;flex-direction:column;align-items:center;min-height:100dvh}
    .top-bar{width:100%;background:var(--card);border-bottom:1px solid var(--bd);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;box-sizing:border-box;gap:10px;flex-wrap:wrap}
    .top-bar .right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .language-picker{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:6px 10px}
    .language-picker label{font-size:.85rem;color:var(--muted)}
    .language-picker select{background:transparent;color:var(--txt);border:0;outline:none;font-size:.9rem}
    .language-badge{font-size:.85rem;color:var(--accent);font-weight:700}
    .wrap{max-width:860px;width:100%;padding:28px;text-align:center;box-sizing:border-box}
    h1{margin:0 0 8px;font-size:32px}
    p{opacity:.85;margin:0 0 24px}
    .grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    a{display:block;text-decoration:none;padding:18px 20px;border-radius:12px;background:var(--card);color:inherit;border:1px solid var(--bd);transition:.15s;position:relative}
    .tooltip-text{visibility:hidden;opacity:0;transition:opacity .3s;position:absolute;top:-35px;left:50%;transform:translateX(-50%);background-color:var(--bd);color:var(--txt);text-align:center;padding:4px 8px;border-radius:6px;font-size:12px;white-space:nowrap;pointer-events:none}
    a:hover{transform:translateY(-1px);border-color:#767a88}
    a:hover .tooltip-text{visibility:visible;opacity:1}

    .season-card,.member-list{margin-top:24px;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:left}
    .season-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
    .module-group{border:1px dashed var(--bd);border-radius:10px;padding:10px}
    .module-group h4{margin:0 0 8px}

  </style>
</head>
<body>
  <div id="appShell" class="app-shell">
    <div class="top-bar">
      <strong id="welcomeText">Logged in as: Guest</strong>
      <div class="right">
        <div class="language-picker" aria-label="Language picker">
          <label for="languageSelect" id="languageLabel">Language</label>
          <select id="languageSelect">
            <option value="en">English</option>
            <option value="no">Norsk</option>
          </select>
          <span class="language-badge" id="activeLanguageLabel">English</span>
        </div>
        <button class="btn-neutral" id="themeToggle">🌓 Theme</button>
        <button class="btn-neutral" id="toggleLoginBtn">Login</button>
        <button class="btn-danger hidden" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="wrap">
      <h1>sarcasm.games</h1>
      <p id="pageSubtitle">Where do you want to go?</p>
      <div class="grid" id="gameGrid"></div>

      <section class="season-card hidden" id="featureModulesSection">
        <h3 id="featureModulesTitle">Admin modules</h3>
        <div class="season-grid" id="featureModulesGrid"></div>
      </section>

      <section id="memberListSection" class="member-list hidden">
        <h3 id="memberListTitle">Member list (admin only)</h3>
        <ul id="memberList"></ul>
      </section>
    </div>

    <div id="authShell" class="auth-shell hidden">
      <div class="auth-card">
        <button class="auth-close" id="closeLoginBtn" type="button">✕</button>
        <h2 class="auth-title" id="authTitle">Optional login</h2>
        <p class="auth-subtitle" id="authSubtitle">Log in for personal or admin-only features.</p>

        <div class="auth-tabs">
          <button class="tab-btn active" data-tab="login" id="loginTabBtn">Login</button>
          <button class="tab-btn" data-tab="register" id="registerTabBtn">Create account</button>
          <button class="tab-btn" data-tab="reset" id="resetTabBtn">Forgot password?</button>
        </div>

        <section id="loginTab" class="tab-content">
          <div class="form-group">
            <label for="loginUsername" id="loginUsernameLabel">Username</label>
            <input id="loginUsername" type="text" autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="loginPassword" id="loginPasswordLabel">Password</label>
            <input id="loginPassword" type="password" autocomplete="current-password" />
          </div>
          <div class="form-group hidden">
            <label for="loginWebsite" id="loginWebsiteLabel">Website</label>
            <input id="loginWebsite" type="text" autocomplete="off" tabindex="-1" />
          </div>
          <div class="btn-row"><button class="btn-primary" id="loginBtn">Login</button></div>
        </section>

        <section id="registerTab" class="tab-content hidden">
          <div class="form-group">
            <label for="registerUser" id="registerUserLabel">Username</label>
            <input id="registerUser" type="text" autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="registerEmail" id="registerEmailLabel">Email</label>
            <input id="registerEmail" type="email" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="registerPassword" id="registerPasswordLabel">Password</label>
            <input id="registerPassword" type="password" autocomplete="new-password" />
          </div>
          <div class="form-group hidden">
            <label for="registerWebsite" id="registerWebsiteLabel">Website</label>
            <input id="registerWebsite" type="text" autocomplete="off" tabindex="-1" />
          </div>
          <div class="btn-row"><button class="btn-primary" id="registerBtn">Create account</button></div>
        </section>

        <section id="resetTab" class="tab-content hidden">
          <div class="form-group">
            <label for="resetUsername" id="resetUsernameLabel">Username</label>
            <input id="resetUsername" type="text" />
          </div>
          <div class="form-group">
            <label for="resetEmail" id="resetEmailLabel">Email</label>
            <input id="resetEmail" type="email" />
          </div>
          <div class="form-group">
            <label for="resetNewPassword" id="resetPasswordLabel">New password</label>
            <input id="resetNewPassword" type="password" autocomplete="new-password" />
          </div>
          <div class="form-group hidden">
            <label for="resetWebsite" id="resetWebsiteLabel">Website</label>
            <input id="resetWebsite" type="text" autocomplete="off" tabindex="-1" />
          </div>
          <div class="form-group">
            <label for="resetCaptchaAnswer" id="captchaQuestion">Security question</label>
            <input id="resetCaptchaAnswer" type="text" />
          </div>
          <div class="btn-row">
            <button class="btn-primary" id="resetBtn">Update password</button>
            <button class="btn-neutral" id="newCaptchaBtn" type="button">New question</button>
            <button class="btn-neutral hidden" id="resetInfoBtn" type="button">Info</button>
          </div>
        </section>

        <div id="statusBox" class="status-box"></div>
      </div>
    </div>

  </div>

  <script>
    const QUIZ_LANGUAGE_KEY = 'quizLanguage';
    const GAMES = [
      { href: '/tiermaker/', title: 'Tier-maker', tooltip: { en: 'Make your own tier list.', no: 'Lag din egen tier-liste.' } },
      { href: '/monstercatch/', title: 'Monster catcher', tooltip: { en: 'A local game.', no: 'Et lokalt spill.' } },
      { href: '/achievements/', title: 'Life Achievements', tooltip: { en: 'Track accomplishments', no: 'Følg fremgang og prestasjoner' } },
      { href: '/poketruefalse/', title: 'Pokemon True or False', tooltip: { en: 'Facts game!', no: 'Fakta-spill!' } },
      { href: '/lighthousekeeper/', title: 'Lighthouse Keeper', tooltip: { en: 'Keep the light on!', no: 'Hold lyset på!' } },
      { href: '/CosmicClick/', title: 'Cosmic clicker', tooltip: { en: 'Incremental clicker!', no: 'Incremental clicker!' } },
      { href: '/orb/', title: 'Orb Game', tooltip: { en: 'Race to the finish!', no: 'Kappløp til mål!' } },
      { href: '/CrystalClick/', title: 'Crystal Mining', tooltip: { en: 'Second clicker!', no: 'Andre clicker!' } },
      { href: '/GalacticClick/', title: 'Galactic Mining', tooltip: { en: 'Third clicker!', no: 'Tredje clicker!' } },
      { href: '/memory/', title: 'Guess the mon!', tooltip: { en: 'How fast are you?', no: 'Hvor rask er du?' } },
      { href: '/random10/', title: 'Random 10 quiz', tooltip: { en: 'Quick 10-question mode', no: 'Rask modus med 10 spørsmål' } },
      { href: '/quiz-categories/', title: 'Quiz categories', tooltip: { en: 'Choose categories and play', no: 'Velg kategorier og spill' } },
      { href: '/quiz-quest/', title: 'Quiz quest', tooltip: { en: 'Quest mode (placeholder)', no: 'Oppdragsmodus (placeholder)' } },
      { href: '/pokemon-quiz/', title: 'Pokémon quiz', tooltip: { en: 'Pokémon mode (placeholder)', no: 'Pokémon-modus (placeholder)' } },
      { href: 'https://html.itch.zone/html/14908902/index.html', title: '3D Platformer', tooltip: { en: 'Playable in browser', no: 'Spillbart i nettleser' } }
    ];

    const I18N = {
      en: {
        welcomeGuest: 'Logged in as: Guest',
        welcomeUser: (username) => `Logged in as: ${username}`,
        languageLabel: 'Language',
        activeLanguageName: 'English',
        themeButton: '🌓 Theme',
        loginButton: 'Login',
        hideLoginButton: 'Hide login',
        logoutButton: 'Logout',
        pageSubtitle: 'Where do you want to go?',
        memberListTitle: 'Member list (admin only)',
        authTitle: 'Optional login',
        authSubtitle: 'Log in for personal or admin-only features.',
        tabLogin: 'Login',
        tabRegister: 'Create account',
        tabReset: 'Forgot password?',
        usernameLabel: 'Username',
        passwordLabel: 'Password',
        websiteLabel: 'Website',
        emailLabel: 'Email',
        newPasswordLabel: 'New password',
        securityQuestionLabel: 'Security question',
        createAccountButton: 'Create account',
        updatePasswordButton: 'Update password',
        newQuestionButton: 'New question',
        infoButton: 'Info',
        extraModules: 'Extra modules',
        adminModules: 'Admin modules',
        unknownCountry: 'unknown',
        countryLabel: 'country',
        statusMissingLoginFields: 'Please enter both username and password.',
        statusLoginFailed: 'Login failed.',
        statusRegistrationFailed: 'Registration failed.',
        statusRegistrationOk: 'Account created. Log in with username and password.',
        statusPasswordResetFailed: 'Could not update password.',
        statusPasswordResetOk: 'Password updated. You can now log in.',
        statusResetHelp: 'Forgot your password? Contact admin at xxxx@gmail.com',
        statusLoggedOut: 'Logged out.',
        captchaPool: [
          { id: 'site_first_word', question: 'What is the first word in this website name?' },
          { id: 'bil_reverse', question: 'Type the word BIL backwards' },
          { id: 'color_sky', question: 'What color is the sky on a clear day?' },
          { id: 'two_plus_three', question: 'What is 2 + 3?' }
        ]
      },
      no: {
        welcomeGuest: 'Logget inn som: Gjest',
        welcomeUser: (username) => `Logget inn som: ${username}`,
        languageLabel: 'Språk',
        activeLanguageName: 'Norsk',
        themeButton: '🌓 Tema',
        loginButton: 'Logg inn',
        hideLoginButton: 'Skjul innlogging',
        logoutButton: 'Logg ut',
        pageSubtitle: 'Hvor vil du gå?',
        memberListTitle: 'Medlemsliste (kun admin)',
        authTitle: 'Valgfri innlogging',
        authSubtitle: 'Logg inn for personlige eller admin-funksjoner.',
        tabLogin: 'Logg inn',
        tabRegister: 'Opprett konto',
        tabReset: 'Glemt passord?',
        usernameLabel: 'Brukernavn',
        passwordLabel: 'Passord',
        websiteLabel: 'Nettside',
        emailLabel: 'E-post',
        newPasswordLabel: 'Nytt passord',
        securityQuestionLabel: 'Sikkerhetsspørsmål',
        createAccountButton: 'Opprett konto',
        updatePasswordButton: 'Oppdater passord',
        newQuestionButton: 'Nytt spørsmål',
        infoButton: 'Info',
        extraModules: 'Ekstra moduler',
        adminModules: 'Admin-moduler',
        unknownCountry: 'ukjent',
        countryLabel: 'land',
        statusMissingLoginFields: 'Fyll inn både brukernavn og passord.',
        statusLoginFailed: 'Innlogging feilet.',
        statusRegistrationFailed: 'Registrering feilet.',
        statusRegistrationOk: 'Konto opprettet. Logg inn med brukernavn og passord.',
        statusPasswordResetFailed: 'Kunne ikke oppdatere passord.',
        statusPasswordResetOk: 'Passord oppdatert. Du kan nå logge inn.',
        statusResetHelp: 'Glemt passord? Kontakt admin på xxxx@gmail.com',
        statusLoggedOut: 'Logget ut.',
        captchaPool: [
          { id: 'site_first_word', question: 'Hva er første ord i nettsidens navn?' },
          { id: 'bil_reverse', question: 'Skriv ordet BIL baklengs' },
          { id: 'color_sky', question: 'Hvilken farge har himmelen på en klar dag?' },
          { id: 'two_plus_three', question: 'Hva er 2 + 3?' }
        ]
      }
    };

    const FEATURE_MODULES = [
      {
        id: 'morsdag-2026',
        title: '🌸 Morsdag 2026',
        adminOnly: true,
        links: [
          { label: '👸 Mamma', href: '/Mamma/' },
          { label: '👦 Isak', href: '/Isak/' },
          { label: '👧 Lilly', href: '/Lilly/' },
          { label: '🧔 Pappa', href: '/Pappa/' },
          { label: '📸 Karusell', href: '/Karusell/' }
        ]
      }
    ];

    let currentCaptcha = null;
    let failedResetAttempts = 0;
    let currentUser = null;
    let currentLanguage = 'en';

    const statusBox = document.getElementById('statusBox');
    const authShell = document.getElementById('authShell');
    const welcomeText = document.getElementById('welcomeText');
    const memberListSection = document.getElementById('memberListSection');
    const memberList = document.getElementById('memberList');
    const featureModulesSection = document.getElementById('featureModulesSection');
    const featureModulesTitle = document.getElementById('featureModulesTitle');
    const featureModulesGrid = document.getElementById('featureModulesGrid');
    const captchaQuestion = document.getElementById('captchaQuestion');
    const resetInfoBtn = document.getElementById('resetInfoBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const toggleLoginBtn = document.getElementById('toggleLoginBtn');
    const languageSelect = document.getElementById('languageSelect');
    const activeLanguageLabel = document.getElementById('activeLanguageLabel');
    const gameGrid = document.getElementById('gameGrid');

    function t() {
      return I18N[currentLanguage] || I18N.en;
    }

    function setStatus(message, isError = false) {
      statusBox.style.color = isError ? 'var(--danger)' : 'var(--muted)';
      statusBox.textContent = message;
    }

    function renderGames() {
      gameGrid.innerHTML = '';
      for (const game of GAMES) {
        const anchor = document.createElement('a');
        anchor.href = game.href;
        anchor.textContent = game.title;

        const tooltip = document.createElement('span');
        tooltip.className = 'tooltip-text';
        tooltip.textContent = game.tooltip[currentLanguage] || game.tooltip.en;
        anchor.appendChild(document.createTextNode(' '));
        anchor.appendChild(tooltip);

        gameGrid.appendChild(anchor);
      }
    }

    function toggleLoginPanel() {
      if (currentUser) return;
      const isHidden = authShell.classList.contains('hidden');
      if (isHidden) {
        authShell.classList.remove('hidden');
        toggleLoginBtn.textContent = t().hideLoginButton;
      } else {
        authShell.classList.add('hidden');
        toggleLoginBtn.textContent = t().loginButton;
      }
    }

    function closeLoginPanel() {
      authShell.classList.add('hidden');
      if (!currentUser) toggleLoginBtn.textContent = t().loginButton;
    }

    function generateCaptchaQuestion() {
      const captchaPool = t().captchaPool;
      const index = Math.floor(Math.random() * captchaPool.length);
      currentCaptcha = captchaPool[index];
      captchaQuestion.textContent = currentCaptcha.question;
      document.getElementById('resetCaptchaAnswer').value = '';
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach((btn) => btn.classList.toggle('active', btn.dataset.tab === tabName));
      document.querySelectorAll('.tab-content').forEach((section) => section.classList.add('hidden'));
      document.getElementById(`${tabName}Tab`).classList.remove('hidden');
      if (tabName === 'reset' && !currentCaptcha) generateCaptchaQuestion();
      setStatus('');
    }

    function setThemeFromStorage() {
      if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');
    }

    function toggleTheme() {
      const isLight = document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    function inferDefaultLanguage() {
      const browserLanguage = (navigator.language || '').toLowerCase();
      if (browserLanguage.startsWith('no') || browserLanguage.startsWith('nb') || browserLanguage.startsWith('nn')) {
        return 'no';
      }
      return 'en';
    }

    function getStoredQuizLanguage() {
      const stored = localStorage.getItem(QUIZ_LANGUAGE_KEY);
      return stored === 'en' || stored === 'no' ? stored : null;
    }

    function updateActiveLanguageUi(language) {
      const languageName = language === 'no' ? 'Norsk' : 'English';
      activeLanguageLabel.textContent = languageName;
      languageSelect.value = language;
    }

    function applyTranslations() {
      const texts = t();
      document.getElementById('languageLabel').textContent = texts.languageLabel;
      document.getElementById('themeToggle').textContent = texts.themeButton;
      document.getElementById('pageSubtitle').textContent = texts.pageSubtitle;
      document.getElementById('memberListTitle').textContent = texts.memberListTitle;
      document.getElementById('authTitle').textContent = texts.authTitle;
      document.getElementById('authSubtitle').textContent = texts.authSubtitle;
      document.getElementById('loginTabBtn').textContent = texts.tabLogin;
      document.getElementById('registerTabBtn').textContent = texts.tabRegister;
      document.getElementById('resetTabBtn').textContent = texts.tabReset;
      document.getElementById('loginUsernameLabel').textContent = texts.usernameLabel;
      document.getElementById('loginPasswordLabel').textContent = texts.passwordLabel;
      document.getElementById('loginWebsiteLabel').textContent = texts.websiteLabel;
      document.getElementById('registerUserLabel').textContent = texts.usernameLabel;
      document.getElementById('registerEmailLabel').textContent = texts.emailLabel;
      document.getElementById('registerPasswordLabel').textContent = texts.passwordLabel;
      document.getElementById('registerWebsiteLabel').textContent = texts.websiteLabel;
      document.getElementById('resetUsernameLabel').textContent = texts.usernameLabel;
      document.getElementById('resetEmailLabel').textContent = texts.emailLabel;
      document.getElementById('resetPasswordLabel').textContent = texts.newPasswordLabel;
      document.getElementById('resetWebsiteLabel').textContent = texts.websiteLabel;
      document.getElementById('resetBtn').textContent = texts.updatePasswordButton;
      document.getElementById('newCaptchaBtn').textContent = texts.newQuestionButton;
      document.getElementById('resetInfoBtn').textContent = texts.infoButton;
      document.getElementById('loginBtn').textContent = texts.loginButton;
      document.getElementById('registerBtn').textContent = texts.createAccountButton;
      document.getElementById('logoutBtn').textContent = texts.logoutButton;
      if (authShell.classList.contains('hidden')) {
        toggleLoginBtn.textContent = texts.loginButton;
      } else {
        toggleLoginBtn.textContent = texts.hideLoginButton;
      }
      if (currentUser) {
        welcomeText.textContent = texts.welcomeUser(currentUser.username);
      } else {
        welcomeText.textContent = texts.welcomeGuest;
      }

      generateCaptchaQuestion();
      renderGames();
      renderFeatureModules(currentUser);
      updateActiveLanguageUi(currentLanguage);
    }

    function saveQuizLanguage(language) {
      localStorage.setItem(QUIZ_LANGUAGE_KEY, language);
      currentLanguage = language;
      applyTranslations();
    }

    function initQuizLanguage() {
      const initialLanguage = getStoredQuizLanguage() || inferDefaultLanguage();
      saveQuizLanguage(initialLanguage);

      languageSelect.addEventListener('change', (event) => {
        const selectedLanguage = event.target.value;
        if (selectedLanguage !== 'en' && selectedLanguage !== 'no') return;
        saveQuizLanguage(selectedLanguage);
      });
    }

    function renderFeatureModules(user) {
      const role = user?.role || 'guest';
      const visibleModules = FEATURE_MODULES.filter((moduleConfig) => !(moduleConfig.adminOnly && role !== 'admin'));
      if (visibleModules.length === 0) {
        featureModulesSection.classList.add('hidden');
        featureModulesGrid.innerHTML = '';
        return;
      }

      const containsPublicModules = visibleModules.some((moduleConfig) => !moduleConfig.adminOnly);
      featureModulesTitle.textContent = containsPublicModules ? t().extraModules : t().adminModules;
      featureModulesGrid.innerHTML = '';

      for (const moduleConfig of visibleModules) {
        const moduleGroup = document.createElement('div');
        moduleGroup.className = 'module-group';
        const heading = document.createElement('h4');
        heading.textContent = moduleConfig.title;
        moduleGroup.appendChild(heading);

        for (const link of moduleConfig.links) {
          const anchor = document.createElement('a');
          anchor.href = link.href;
          anchor.textContent = link.label;
          moduleGroup.appendChild(anchor);
        }

        featureModulesGrid.appendChild(moduleGroup);
      }

      featureModulesSection.classList.remove('hidden');
    }

    async function fetchSession() {
      const response = await fetch('/api/auth/session', { credentials: 'include' });
      if (!response.ok) return null;
      const data = await response.json();
      return data.user || null;
    }

    async function renderMemberList(user) {
      if (!user || user.role !== 'admin') {
        memberListSection.classList.add('hidden');
        memberList.innerHTML = '';
        return;
      }

      const response = await fetch('/api/admin/users', { credentials: 'include' });
      if (!response.ok) {
        memberListSection.classList.add('hidden');
        memberList.innerHTML = '';
        return;
      }

      const data = await response.json();
      memberList.innerHTML = '';
      for (const member of data.users || []) {
        const li = document.createElement('li');
        li.textContent = `${member.username} (${member.email}) - ${t().countryLabel}: ${member.country || t().unknownCountry}`;
        memberList.appendChild(li);
      }
      memberListSection.classList.remove('hidden');
    }

    async function applyUserState(user) {
      currentUser = user;
      if (user) {
        welcomeText.textContent = t().welcomeUser(user.username);
        closeLoginPanel();
        logoutBtn.classList.remove('hidden');
        toggleLoginBtn.classList.add('hidden');
      } else {
        welcomeText.textContent = t().welcomeGuest;
        closeLoginPanel();
        logoutBtn.classList.add('hidden');
        toggleLoginBtn.classList.remove('hidden');
        toggleLoginBtn.textContent = t().loginButton;
      }
      renderFeatureModules(user);
      await renderMemberList(user);
    }

    async function login() {
      const username = document.getElementById('loginUsername').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value;
      const honeypot = document.getElementById('loginWebsite').value;

      if (!username || !password) {
        setStatus(t().statusMissingLoginFields, true);
        return;
      }

      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ username, password, honeypot })
      });

      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        setStatus(data.error || t().statusLoginFailed, true);
        return;
      }

      const data = await response.json();
      await applyUserState(data.user);
      setStatus('');
    }

    async function registerUser() {
      const username = document.getElementById('registerUser').value.trim().toLowerCase();
      const email = document.getElementById('registerEmail').value.trim().toLowerCase();
      const password = document.getElementById('registerPassword').value;
      const honeypot = document.getElementById('registerWebsite').value;

      const response = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password, honeypot })
      });

      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        setStatus(data.error || t().statusRegistrationFailed, true);
        return;
      }

      setStatus(t().statusRegistrationOk);
      switchTab('login');
      document.getElementById('loginUsername').value = username;
      document.getElementById('loginPassword').value = '';
    }

    async function selfResetPassword() {
      if (!currentCaptcha) generateCaptchaQuestion();

      const payload = {
        username: document.getElementById('resetUsername').value.trim().toLowerCase(),
        email: document.getElementById('resetEmail').value.trim().toLowerCase(),
        newPassword: document.getElementById('resetNewPassword').value,
        honeypot: document.getElementById('resetWebsite').value,
        captchaId: currentCaptcha.id,
        captchaAnswer: document.getElementById('resetCaptchaAnswer').value.trim()
      };

      const response = await fetch('/api/auth/self-reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        failedResetAttempts += 1;
        if (failedResetAttempts >= 3) resetInfoBtn.classList.remove('hidden');
        const data = await response.json().catch(() => ({}));
        setStatus(data.error || t().statusPasswordResetFailed, true);
        generateCaptchaQuestion();
        return;
      }

      failedResetAttempts = 0;
      resetInfoBtn.classList.add('hidden');
      setStatus(t().statusPasswordResetOk);
      switchTab('login');
    }

    function showResetHelpInfo() {
      setStatus(t().statusResetHelp);
    }

    async function logout() {
      await fetch('/api/auth/logout', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ honeypot: '' })
      });
      await applyUserState(null);
      setStatus(t().statusLoggedOut);
    }

    async function init() {
      setThemeFromStorage();
      initQuizLanguage();

      await applyUserState(null);
      const user = await fetchSession();
      if (user) await applyUserState(user);

      document.querySelectorAll('.tab-btn').forEach((btn) => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
      document.getElementById('loginBtn').addEventListener('click', login);
      document.getElementById('registerBtn').addEventListener('click', registerUser);
      document.getElementById('resetBtn').addEventListener('click', selfResetPassword);
      document.getElementById('newCaptchaBtn').addEventListener('click', generateCaptchaQuestion);
      document.getElementById('resetInfoBtn').addEventListener('click', showResetHelpInfo);
      document.getElementById('logoutBtn').addEventListener('click', logout);
      document.getElementById('themeToggle').addEventListener('click', toggleTheme);
      document.getElementById('toggleLoginBtn').addEventListener('click', toggleLoginPanel);
      document.getElementById('closeLoginBtn').addEventListener('click', closeLoginPanel);

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeLoginPanel();
        }
      });

      const submitOnEnter = (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          login();
        }
      };
      document.getElementById('loginUsername').addEventListener('keydown', submitOnEnter);
      document.getElementById('loginPassword').addEventListener('keydown', submitOnEnter);
    }

    init();
  </script>

</body>
</html>
