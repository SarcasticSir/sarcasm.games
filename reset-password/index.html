<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password</title>
  <style>
    :root { --bg:#0b0c10; --card:#1e1f25; --txt:#eaeaea; --bd:#2f313a; --accent:#4ecca3; --danger:#ff6b6b; --muted:#9aa0ad; }
    body { margin:0; min-height:100dvh; display:grid; place-items:center; background:var(--bg); color:var(--txt); font:16px/1.4 system-ui, Segoe UI, Roboto, Arial; padding:24px; box-sizing:border-box; }
    .card { width:min(480px, 100%); background:var(--card); border:1px solid var(--bd); border-radius:16px; padding:24px; box-sizing:border-box; }
    .hidden { display:none !important; }
    h1 { margin:0 0 12px; font-size:1.8rem; }
    p { margin:0 0 16px; color:var(--muted); }
    label { display:block; margin:12px 0 6px; color:var(--muted); font-size:.95rem; }
    input { width:100%; box-sizing:border-box; background:var(--bg); border:1px solid var(--bd); color:var(--txt); padding:11px 12px; border-radius:10px; font-size:15px; }
    button, a.button-link { margin-top:16px; width:100%; display:inline-flex; justify-content:center; align-items:center; box-sizing:border-box; border:0; border-radius:10px; padding:12px 14px; font-weight:700; cursor:pointer; text-decoration:none; }
    button { background:var(--accent); color:#111; }
    a.button-link { background:transparent; color:var(--txt); border:1px solid var(--bd); }
    .status { min-height:24px; margin-top:14px; color:var(--muted); }
    .status.error { color:var(--danger); }
    .status.success { color:var(--accent); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Reset password</h1>
    <p id="lead">Choose a new password for your account.</p>

    <form id="resetForm">
      <label for="password">New password</label>
      <input id="password" type="password" autocomplete="new-password" minlength="8" required />

      <label for="confirmPassword">Confirm password</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required />

      <button id="submitBtn" type="submit">Save new password</button>
    </form>

    <div id="status" class="status"></div>
    <a class="button-link" href="/">Back to front page</a>
  </main>

  <script type="module">
    const statusEl = document.getElementById('status');
    const formEl = document.getElementById('resetForm');
    const passwordEl = document.getElementById('password');
    const confirmPasswordEl = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');

    function setStatus(message, type = '') {
      statusEl.textContent = message;
      statusEl.className = `status${type ? ` ${type}` : ''}`;
    }

    async function loadSupabase() {
      const configResponse = await fetch('/api/auth/public-config');
      if (!configResponse.ok) {
        throw new Error('Could not load public Supabase config');
      }

      const config = await configResponse.json();
      const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2.99.3?bundle');
      return createClient(config.supabaseUrl, config.supabaseAnonKey, {
        auth: {
          persistSession: false,
          autoRefreshToken: false,
          detectSessionInUrl: false
        }
      });
    }

    async function syncServerSession(supabase) {
      const { data, error } = await supabase.auth.getSession();
      if (error) throw error;

      const session = data?.session;
      if (!session?.access_token || !session?.refresh_token) {
        throw new Error('Missing session after password reset.');
      }

      const response = await fetch('/api/auth/sync-session', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          accessToken: session.access_token,
          refreshToken: session.refresh_token
        })
      });

      if (!response.ok) {
        const payload = await response.json().catch(() => ({}));
        throw new Error(payload.error || 'Could not sync session after password reset.');
      }
    }

    async function establishRecoverySession(supabase) {
      const searchParams = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.startsWith('#')
        ? window.location.hash.slice(1)
        : window.location.hash);

      const code = searchParams.get('code');
      if (code) {
        const { error } = await supabase.auth.exchangeCodeForSession(code);
        if (error) throw error;
        return;
      }

      const tokenHash = searchParams.get('token_hash');
      const type = searchParams.get('type');
      if (tokenHash && type) {
        const { error } = await supabase.auth.verifyOtp({
          type,
          token_hash: tokenHash
        });
        if (error) throw error;
        return;
      }

      const accessToken = hashParams.get('access_token');
      const refreshToken = hashParams.get('refresh_token');
      if (accessToken && refreshToken) {
        const { error } = await supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });
        if (error) throw error;
        return;
      }

      throw new Error('Missing reset token. Please open the latest reset link from your email again.');
    }

    let supabase = null;

    try {
      setStatus('Preparing password reset…');
      supabase = await loadSupabase();
      await establishRecoverySession(supabase);
      setStatus('Ready. Enter your new password.');
    } catch (error) {
      console.error('[reset-password] init failed:', error);
      formEl.classList.add('hidden');
      submitBtn.disabled = true;
      setStatus(error.message || 'Could not validate reset link.', 'error');
    }

    formEl.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!supabase) return;

      const password = passwordEl.value;
      const confirmPassword = confirmPasswordEl.value;

      if (password.length < 8) {
        setStatus('Password must be at least 8 characters.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        setStatus('Passwords do not match.', 'error');
        return;
      }

      submitBtn.disabled = true;
      setStatus('Saving new password…');

      try {
        const { error } = await supabase.auth.updateUser({ password });
        if (error) throw error;

        await syncServerSession(supabase);

        passwordEl.value = '';
        confirmPasswordEl.value = '';
        setStatus('Password updated. You are now signed in with the new password.', 'success');
      } catch (error) {
        console.error('[reset-password] update failed:', error);
        setStatus(error.message || 'Could not save the new password.', 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
