<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz categories</title>
  <style>
    :root {
      --bg:#0b0c10;
      --card:#1e1f25;
      --txt:#eaeaea;
      --bd:#2f313a;
      --accent:#4ecca3;
      --muted:#9aa0ad;
      --danger:#ff8b8b;
    }

    * { box-sizing: border-box; }

    body {
      margin:0;
      font:16px/1.4 system-ui, Segoe UI, Roboto, Arial;
      background:var(--bg);
      color:var(--txt);
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:20px;
      box-sizing:border-box;
    }

    .card {
      width:min(760px,100%);
      background:var(--card);
      border:1px solid var(--bd);
      border-radius:14px;
      padding:20px;
    }

    h1 { margin:0 0 10px; }

    .muted {
      margin:0 0 14px;
      color:var(--muted);
    }

    .status {
      min-height: 1.5rem;
      margin: 0 0 12px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: #80ed99;
    }

    .status.almost {
      color: #ffd166;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      justify-items: stretch;
      align-items: stretch;
      gap: 12px;
      margin: 0 0 16px;
    }

    .cat {
      border:1px solid var(--bd);
      border-radius:10px;
      padding:10px;
      background:#181920;
      width: 100%;
      height: 92px;
      transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .cat.is-selected {
      border-color: #3ebd95;
      background: linear-gradient(180deg, #172922 0%, #141f1b 100%);
      box-shadow: inset 0 0 0 1px rgba(78, 204, 163, 0.35);
    }

    .cat label {
      display:flex;
      flex-direction: column;
      justify-content: center;
      align-items:center;
      text-align: center;
      gap:6px;
      cursor:pointer;
      position: relative;
      height: 100%;
    }

    .cat input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .cat-copy {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
    }

    .cat-name {
      display: block;
      font-weight:700;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .cat-count {
      display: block;
      color:var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .controls {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      margin:0 0 14px;
    }

    .controls label {
      display:flex;
      gap:8px;
      align-items:center;
    }

    input[type="number"] {
      width:80px;
      padding:6px;
      border-radius:8px;
      border:1px solid var(--bd);
      background:#101116;
      color:var(--txt);
    }

    .actions,
    .btn-row {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:12px;
    }

    button,
    .link-btn {
      border:1px solid var(--bd);
      border-radius:8px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
      background:transparent;
      color:var(--txt);
      text-decoration:none;
    }

    .btn-primary {
      background:var(--accent);
      color:#111;
      border-color:var(--accent);
    }

    button:disabled {
      opacity:0.5;
      cursor:not-allowed;
    }

    input[type="text"] {
      width:100%;
      border:1px solid var(--bd);
      border-radius:8px;
      background:var(--bg);
      color:var(--txt);
      padding:12px;
      font-size:16px;
    }

    .hidden {
      display: none !important;
    }

    .question-meta-line {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      margin:0 0 14px;
      color:var(--muted);
      font-size:14px;
    }

    .question-meta-chip {
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border:1px solid var(--bd);
      border-radius:999px;
      background:#181920;
      color:var(--muted);
      font-size:13px;
      line-height:1;
    }

    .result-filter {
      margin-top: 10px;
    }

    .result-list {
      list-style:none;
      margin:8px 0 0;
      padding-left:0;
      display:grid;
      gap:8px;
    }

    .result-item {
      border:1px solid var(--bd);
      border-radius:8px;
      padding:8px;
      background:#181920;
    }

    .result-item-header {
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:flex-start;
      margin-bottom:6px;
    }

    .result-item-question {
      margin:0;
      font-size:15px;
      line-height:1.3;
    }

    .result-item-meta {
      margin:0 0 6px;
      color:var(--muted);
      font-size:13px;
    }

    .result-item-answer {
      margin:0 0 6px;
      color:var(--muted);
      font-size:14px;
    }

    .result-item-status {
      font-weight:700;
    }

    .result-item-status.correct {
      color:#80ed99;
    }

    .result-item-status.wrong {
      color:var(--danger);
    }
  </style>
</head>
<body>
  <main class="card">
    <section id="setupView">
      <h1>Quiz categories</h1>
      <p class="muted">Choose one or more categories. Max question count updates based on your selection.</p>

      <p id="status" class="status" role="status" aria-live="polite">Loading categories…</p>
      <section id="categoryGrid" class="grid" aria-label="Quiz categories"></section>
      <div class="actions">
        <button id="selectAllBtn" type="button">Select all</button>
        <button id="deselectAllBtn" type="button">Deselect all</button>
      </div>

      <div class="controls">
        <label>
          Question count
          <input id="questionCount" type="number" min="1" value="1" disabled />
        </label>
        <span id="countMeta" class="muted"></span>
      </div>

      <div class="actions">
        <button id="startButton" class="btn-primary" type="button" disabled>Start quiz</button>
        <a href="/" class="link-btn">Back to sarcasm.games</a>
      </div>
    </section>

    <section id="questionView" class="hidden">
      <p id="progressText" class="muted"></p>
      <div class="btn-row" style="margin-top:0; margin-bottom:12px;">
        <button id="abortQuizBtn" type="button">Abort quiz</button>
      </div>
      <div id="abortConfirmRow" class="btn-row hidden" style="margin-top:0; margin-bottom:12px;">
        <span class="muted">Abort current quiz?</span>
        <button id="confirmAbortBtn" type="button">Yes, abort</button>
        <button id="cancelAbortBtn" type="button" class="btn-primary">Continue quiz</button>
      </div>
      <h2 id="questionTitle">Question</h2>
      <div id="questionMeta" class="question-meta-line">
        <span id="questionCategory" class="question-meta-chip"></span>
        <span id="questionDifficulty" class="question-meta-chip hidden"></span>
      </div>
      <form id="answerForm">
        <input id="answerInput" type="text" placeholder="Write your answer" autocomplete="off" />
        <div class="btn-row">
          <button id="submitBtn" class="btn-primary" type="submit">Submit answer</button>
          <button id="showAnswerBtn" class="hidden" type="button">Show answer</button>
          <button id="nextQuestionBtn" class="hidden" type="button">Next question</button>
        </div>
      </form>
      <p id="questionStatus" class="status"></p>
      <p id="answerReveal" class="muted hidden"></p>
    </section>

    <section id="resultView" class="hidden">
      <h2>Quiz complete 🎉</h2>
      <p id="resultSummary" class="muted"></p>
      <ul class="muted">
        <li><span id="correctCount">0</span> correct</li>
        <li><span id="wrongCount">0</span> wrong</li>
      </ul>
      <h3>Answered questions</h3>
      <div id="resultFilter" class="btn-row result-filter">
        <button id="filterAllBtn" class="btn-primary" type="button">All</button>
        <button id="filterWrongBtn" type="button">Wrong only</button>
        <button id="filterCorrectBtn" type="button">Correct only</button>
      </div>
      <ul id="answeredQuestionsList" class="result-list"></ul>
      <div class="actions">
        <button id="playAgainBtn" class="btn-primary" type="button">Play again</button>
        <a href="/" class="link-btn">Back to sarcasm.games</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { getQuizLanguage as readQuizLanguage } from '/lib/client/quiz-language.js';

    const fallbackLanguage = 'en';
    const copy = {
      en: {
        title: 'Quiz categories',
        setupLead: 'Choose one or more categories. Max question count updates based on your selection.',
        loadingCategories: 'Loading categories…',
        questionCount: 'Question count',

        deselectAll: 'Deselect all',
        startQuiz: 'Start quiz',
        backHome: 'Back to sarcasm.games',
        abortQuiz: 'Abort quiz',

        abortYes: 'Yes, abort',

        noCategories: 'No categories are available yet. Add quiz data to start playing.',
        startErrorHint: 'Select at least one category before starting.',
        loadingQuestions: 'Loading questions…',

        questionCount: 'Antall spørsmål',
        selectAll: 'Velg alle',
        deselectAll: 'Fjern alle',
        startQuiz: 'Start quiz',
        backHome: 'Tilbake til sarcasm.games',
        abortQuiz: 'Avbryt quiz',
        abortConfirm: 'Avbryte nåværende quiz?',
        abortYes: 'Ja, avbryt',
        abortNo: 'Fortsett quiz',
        questionTitle: 'Spørsmål',
        answerPlaceholder: 'Skriv svaret ditt her',
        submitAnswer: 'Send svar',
        showAnswer: 'Vis fasit',
        hideAnswer: 'Skjul fasit',
        nextQuestion: 'Neste spørsmål',
        quizComplete: 'Quiz fullført 🎉',
        answeredQuestions: 'Besvarte spørsmål',
        filterAll: 'Alle',
        filterWrongOnly: 'Kun feil',
        filterCorrectOnly: 'Kun riktige',
        noFilteredResults: 'Ingen spørsmål matcher dette filteret.',
        playAgain: 'Spill igjen',
        noAnswer: 'Ingen svar registrert',
        yourAnswer: 'Ditt svar: {answer}',
        answerPrefix: 'Fasit: {answer}',
        correctLabel: 'riktige',
        wrongLabel: 'feil',
        statusCorrect: '✅ Riktig',
        statusWrong: '❌ Feil',
        selectCategoryHint: 'Velg minst én kategori for å fortsette.',
        selectedPool: 'Valgt pool: {count} spørsmål (maks antall {count}).',
        progress: 'Spørsmål {current} av {total}',
        category: 'Kategori: {category}',
        difficulty: 'Vanskelighetsgrad: {difficulty}',
        metaLine: '{category} • {difficulty}',
        difficultyEasy: 'Lett',
        difficultyMedium: 'Middels',
        difficultyHard: 'Vanskelig',
        difficultyUnknown: 'Ukjent',
        summary: 'Du fikk {correct} / {total} riktige.',
        loadedCategories: 'Lastet {categories} kategorier og {questions} spørsmål totalt.',
        noCategories: 'Ingen kategorier er tilgjengelige ennå. Legg til quizdata for å starte.',
        startErrorHint: 'Velg minst én kategori før du starter.',
        loadingQuestions: 'Laster spørsmål…',
        loadedQuestions: 'Lastet {count} spørsmål.',
        loadCategoriesError: 'Kunne ikke laste kategorier: {message}',
        startQuizError: 'Kunne ikke starte quiz: {message}',
        answerValidateError: 'Kunne ikke validere svar.',
        invalidAnswerError: 'Ugyldig svar fra server.',
        almostStatus: 'Nesten! Du får ett forsøk til.',
        correctStatus: 'Riktig!',
        wrongStatus: 'Ikke helt. Du kan vise fasit og gå videre.',
        noQuestions: 'Ingen spørsmål ble returnert for valget ditt.'
      }
    };

    const activeLang = readQuizLanguage();
    const categoryGrid = document.getElementById('categoryGrid');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const deselectAllBtn = document.getElementById('deselectAllBtn');
    const setupView = document.getElementById('setupView');
    const questionView = document.getElementById('questionView');
    const resultView = document.getElementById('resultView');
    const statusEl = document.getElementById('status');
    const countInput = document.getElementById('questionCount');
    const countMeta = document.getElementById('countMeta');
    const startButton = document.getElementById('startButton');
    const progressText = document.getElementById('progressText');
    const questionTitle = document.getElementById('questionTitle');
    const questionCategory = document.getElementById('questionCategory');
    const questionDifficulty = document.getElementById('questionDifficulty');
    const answerForm = document.getElementById('answerForm');
    const answerInput = document.getElementById('answerInput');
    const submitBtn = document.getElementById('submitBtn');
    const showAnswerBtn = document.getElementById('showAnswerBtn');
    const nextQuestionBtn = document.getElementById('nextQuestionBtn');
    const questionStatus = document.getElementById('questionStatus');
    const answerReveal = document.getElementById('answerReveal');
    const abortQuizBtn = document.getElementById('abortQuizBtn');
    const abortConfirmRow = document.getElementById('abortConfirmRow');
    const confirmAbortBtn = document.getElementById('confirmAbortBtn');
    const cancelAbortBtn = document.getElementById('cancelAbortBtn');
    const resultSummary = document.getElementById('resultSummary');
    const correctCount = document.getElementById('correctCount');
    const wrongCount = document.getElementById('wrongCount');
    const answeredQuestionsList = document.getElementById('answeredQuestionsList');
    const playAgainBtn = document.getElementById('playAgainBtn');
    const filterAllBtn = document.getElementById('filterAllBtn');
    const filterWrongBtn = document.getElementById('filterWrongBtn');
    const filterCorrectBtn = document.getElementById('filterCorrectBtn');
    const setupHeading = setupView.querySelector('h1');
    const setupLead = setupView.querySelector('p.muted');
    const questionCountLabel = setupView.querySelector('.controls label');
    const resultHeading = resultView.querySelector('h2');
    const resultCounterItems = resultView.querySelectorAll('ul.muted li');
    const answeredQuestionsHeading = resultView.querySelector('h3');
    const backLinks = document.querySelectorAll('a.link-btn');
    const abortConfirmText = abortConfirmRow.querySelector('.muted');

    const runtimeState = {
      activeLang,
      quizStarted: false,
      categories: [],
      questions: [],
      index: 0,
      correct: 0,
      wrong: 0,
      awaitingRetry: false,
      selectedCategories: [],
      count: 0,
      answeredQuestions: [],
      resultFilter: 'all',
      pendingRevealAnswer: ''
    };

    function uiCopy() {
      return copy[runtimeState.activeLang] || copy[fallbackLanguage];
    }

    function syncLanguageFromStorage() {
      runtimeState.activeLang = readQuizLanguage();
    }

    function showView(name) {
      setupView.classList.toggle('hidden', name !== 'setup');
      questionView.classList.toggle('hidden', name !== 'question');
      resultView.classList.toggle('hidden', name !== 'result');
    }

    function getSelectedCategories() {
      return runtimeState.categories.filter((category) => category.selected);
    }

    function getSelectedQuestionCapacity() {
      return getSelectedCategories().reduce((sum, category) => sum + category.questionCount, 0);
    }

    function getDifficultyLabel(value) {
      const c = uiCopy();
      const difficulty = Number(value);

      if (difficulty === 1) return c.difficultyEasy;
      if (difficulty === 2) return c.difficultyMedium;
      if (difficulty === 3) return c.difficultyHard;
      return c.difficultyUnknown;
    }

    function getQuestionMetaText(question) {
      const c = uiCopy();
      const categoryText = c.category.replace('{category}', question.category || 'General');
      const difficultyText = c.difficulty.replace('{difficulty}', getDifficultyLabel(question.difficulty));
      return c.metaLine
        .replace('{category}', categoryText)
        .replace('{difficulty}', difficultyText);
    }

    function renderCountState() {
      const selectedCount = getSelectedQuestionCapacity();
      const hasSelection = selectedCount > 0;

      countInput.disabled = !hasSelection;
      startButton.disabled = !hasSelection;

      if (!hasSelection) {
        countInput.value = '1';
        countInput.max = '1';
        countMeta.textContent = uiCopy().selectCategoryHint;
        return;
      }

      countInput.max = String(selectedCount);
      const requestedCount = Number(countInput.value) || 1;
      countInput.value = String(Math.max(1, Math.min(requestedCount, selectedCount)));
      countMeta.textContent = uiCopy().selectedPool.replaceAll('{count}', String(selectedCount));
    }

    function renderCategories() {
      categoryGrid.innerHTML = '';
      if (!runtimeState.categories.length) {
        selectAllBtn.disabled = true;
        deselectAllBtn.disabled = true;
        renderCountState();
        return;
      }

      selectAllBtn.disabled = false;
      deselectAllBtn.disabled = false;

      runtimeState.categories.forEach((category, index) => {
        const wrapper = document.createElement('article');
        wrapper.className = 'cat';
        if (category.selected) {
          wrapper.classList.add('is-selected');
        }

        const label = document.createElement('label');
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = category.selected;
        checkbox.setAttribute('aria-label', `Select ${category.name}`);

        checkbox.addEventListener('change', () => {
          runtimeState.categories[index].selected = checkbox.checked;
          wrapper.classList.toggle('is-selected', checkbox.checked);
          renderCountState();
        });

        const textWrapper = document.createElement('span');
        textWrapper.className = 'cat-copy';

        const nameEl = document.createElement('span');
        nameEl.className = 'cat-name';
        nameEl.textContent = category.name;

        const countEl = document.createElement('span');
        countEl.className = 'cat-count';
        countEl.textContent = `${category.questionCount} ${category.questionCount === 1 ? 'question' : 'questions'}`;

        textWrapper.append(nameEl, countEl);
        label.append(checkbox, textWrapper);
        wrapper.appendChild(label);
        categoryGrid.appendChild(wrapper);
      });

      renderCountState();
    }

    function setAllCategoriesSelected(selected) {
      if (!runtimeState.categories.length) return;
      runtimeState.categories.forEach((category) => {
        category.selected = selected;
      });
      renderCategories();
    }

    function getFilteredAnsweredQuestions() {
      if (runtimeState.resultFilter === 'wrong') {
        return runtimeState.answeredQuestions.filter((entry) => entry.status === 'wrong');
      }

      if (runtimeState.resultFilter === 'correct') {
        return runtimeState.answeredQuestions.filter((entry) => entry.status === 'correct');
      }

      return runtimeState.answeredQuestions;
    }

    function renderResultFilterState() {
      filterAllBtn.classList.toggle('btn-primary', runtimeState.resultFilter === 'all');
      filterWrongBtn.classList.toggle('btn-primary', runtimeState.resultFilter === 'wrong');
      filterCorrectBtn.classList.toggle('btn-primary', runtimeState.resultFilter === 'correct');
    }

    function renderAnsweredQuestions() {
      answeredQuestionsList.innerHTML = '';
      renderResultFilterState();

      const entries = getFilteredAnsweredQuestions();
      if (!entries.length) {
        const emptyItem = document.createElement('li');
        emptyItem.className = 'result-item';
        emptyItem.textContent = uiCopy().noFilteredResults;
        answeredQuestionsList.appendChild(emptyItem);
        return;
      }

      for (const entry of entries) {
        const item = document.createElement('li');
        item.className = 'result-item';

        const header = document.createElement('div');
        header.className = 'result-item-header';

        const question = document.createElement('p');
        question.className = 'result-item-question';
        question.textContent = entry.prompt;

        const status = document.createElement('span');
        status.className = `result-item-status ${entry.status}`;
        status.textContent = entry.status === 'correct' ? uiCopy().statusCorrect : uiCopy().statusWrong;

        const meta = document.createElement('p');
        meta.className = 'result-item-meta';
        meta.textContent = getQuestionMetaText(entry);

        const yourAnswer = document.createElement('p');
        yourAnswer.className = 'result-item-answer';
        yourAnswer.textContent = uiCopy().yourAnswer.replace('{answer}', entry.userAnswer || uiCopy().noAnswer);

        const revealButton = document.createElement('button');
        revealButton.type = 'button';
        revealButton.textContent = uiCopy().showAnswer;

        const answer = document.createElement('p');
        answer.className = 'result-item-answer hidden';
        answer.textContent = uiCopy().answerPrefix.replace('{answer}', entry.acceptedAnswer || '—');

        revealButton.addEventListener('click', () => {
          const isHidden = answer.classList.toggle('hidden');
          revealButton.textContent = isHidden ? uiCopy().showAnswer : uiCopy().hideAnswer;
        });

        header.append(question, status);
        item.append(header, meta, yourAnswer, revealButton, answer);
        answeredQuestionsList.appendChild(item);
      }
    }

    function renderQuestion() {
      const question = runtimeState.questions[runtimeState.index];
      progressText.textContent = uiCopy().progress
        .replace('{current}', String(runtimeState.index + 1))
        .replace('{total}', String(runtimeState.questions.length));
      questionTitle.textContent = question.prompt;
      questionCategory.textContent = uiCopy().category.replace('{category}', question.category || 'General');

      const difficultyText = uiCopy().difficulty.replace('{difficulty}', getDifficultyLabel(question.difficulty));
      questionDifficulty.textContent = difficultyText;
      questionDifficulty.classList.remove('hidden');

      answerInput.value = '';
      answerInput.disabled = false;
      submitBtn.disabled = false;
      questionStatus.textContent = '';
      questionStatus.className = 'status';
      showAnswerBtn.classList.add('hidden');
      nextQuestionBtn.classList.add('hidden');
      answerReveal.classList.add('hidden');
      answerReveal.textContent = '';
      runtimeState.pendingRevealAnswer = question.answers[0] || '—';
      showAnswerBtn.textContent = uiCopy().showAnswer;
      abortConfirmRow.classList.add('hidden');
      runtimeState.awaitingRetry = false;
      answerInput.focus();
    }

    function moveNextQuestion() {
      runtimeState.index += 1;
      if (runtimeState.index >= runtimeState.questions.length) {
        correctCount.textContent = String(runtimeState.correct);
        wrongCount.textContent = String(runtimeState.wrong);
        resultSummary.textContent = uiCopy().summary
          .replace('{correct}', String(runtimeState.correct))
          .replace('{total}', String(runtimeState.questions.length));
        renderAnsweredQuestions();
        showView('result');
        return;
      }

      renderQuestion();
    }

    async function evaluateAnswer(questionId, answer, retryAvailable) {
      const response = await fetch('/api/quiz/answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          questionId,
          answer,
          retryAvailable,
          mode: 'categories',
          lang: runtimeState.activeLang
        })
      });

      if (!response.ok) {
        throw new Error(uiCopy().answerValidateError);
      }

      const payload = await response.json();
      if (!payload?.status) {
        throw new Error(uiCopy().invalidAnswerError);
      }

      return payload;
    }

    async function loadOverview() {
      try {
        const response = await fetch('/api/quiz/overview');
        const payload = await response.json();

        if (!response.ok) {
          throw new Error(payload?.error || 'Failed to load categories');
        }

        const categories = Array.isArray(payload?.categories) ? payload.categories : [];

        if (!categories.length || !payload.totalQuestions) {
          runtimeState.categories = [];
          statusEl.classList.remove('error');
          statusEl.textContent = uiCopy().noCategories;
          renderCategories();
          return;
        }

        runtimeState.categories = categories.map((category) => ({
          name: category.name,
          questionCount: Number(category.questionCount) || 0,
          selected: false
        }));

        statusEl.classList.remove('error');
        statusEl.textContent = uiCopy().loadedCategories
          .replace('{categories}', String(runtimeState.categories.length))
          .replace('{questions}', String(payload.totalQuestions));
        renderCategories();
      } catch (error) {
        runtimeState.categories = [];
        statusEl.classList.add('error');
        statusEl.textContent = uiCopy().loadCategoriesError.replace('{message}', error.message);
        renderCategories();
      }
    }

    countInput.addEventListener('change', renderCountState);
    selectAllBtn.addEventListener('click', () => setAllCategoriesSelected(true));
    deselectAllBtn.addEventListener('click', () => setAllCategoriesSelected(false));

    startButton.addEventListener('click', async () => {
      const selectedCategories = getSelectedCategories().map((category) => category.name);
      const count = Number(countInput.value) || 1;

      if (!selectedCategories.length) {
        statusEl.classList.add('error');
        statusEl.textContent = uiCopy().startErrorHint;
        return;
      }

      startButton.disabled = true;
      statusEl.classList.remove('error');
      statusEl.textContent = uiCopy().loadingQuestions;

      try {
        const response = await fetch('/api/quiz/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            mode: 'categories',
            lang: runtimeState.activeLang,
            categories: selectedCategories,
            count
          })
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload?.error || 'Failed to start quiz');
        }

        const questions = Array.isArray(payload?.questions) ? payload.questions : [];
        if (!questions.length) {
          throw new Error(uiCopy().noQuestions);
        }

        runtimeState.quizStarted = true;
        runtimeState.questions = questions;
        runtimeState.index = 0;
        runtimeState.correct = 0;
        runtimeState.wrong = 0;
        runtimeState.awaitingRetry = false;
        runtimeState.selectedCategories = selectedCategories;
        runtimeState.count = count;
        runtimeState.answeredQuestions = [];
        runtimeState.resultFilter = 'all';

        window.quizCategoriesState = {
          ...runtimeState,
          selectedCategories
        };

        statusEl.classList.remove('error');
        statusEl.textContent = uiCopy().loadedQuestions.replace('{count}', String(questions.length));
        showView('question');
        renderQuestion();
      } catch (error) {
        statusEl.classList.add('error');
        statusEl.textContent = uiCopy().startQuizError.replace('{message}', error.message);
      } finally {
        renderCountState();
      }
    });

    answerForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (submitBtn.disabled) return;

      const userAnswer = answerInput.value.trim();
      if (!userAnswer) return;

      const current = runtimeState.questions[runtimeState.index];
      let result;

      try {
        result = await evaluateAnswer(current.id, userAnswer, !runtimeState.awaitingRetry);
      } catch (error) {
        questionStatus.className = 'status error';
        questionStatus.textContent = error.message;
        return;
      }

      if (result.status === 'correct') {
        runtimeState.correct += 1;
        runtimeState.answeredQuestions.push({
          prompt: current.prompt,
          status: 'correct',
          userAnswer,
          acceptedAnswer: current.answers[0] || null,
          category: current.category || 'General',
          difficulty: current.difficulty ?? null
        });
        questionStatus.className = 'status ok';
        questionStatus.textContent = uiCopy().correctStatus;
        submitBtn.disabled = true;
        answerInput.disabled = true;
        setTimeout(() => moveNextQuestion(), 600);
        return;
      }

      if (result.status === 'almost' && !runtimeState.awaitingRetry) {
        runtimeState.awaitingRetry = true;
        questionStatus.className = 'status almost';
        questionStatus.textContent = uiCopy().almostStatus;
        answerInput.value = '';
        answerInput.focus();
        return;
      }

      runtimeState.wrong += 1;
      runtimeState.awaitingRetry = false;
      runtimeState.pendingRevealAnswer = result.acceptedAnswer || current.answers[0] || '—';
      runtimeState.answeredQuestions.push({
        prompt: current.prompt,
        status: 'wrong',
        userAnswer,
        acceptedAnswer: result.acceptedAnswer || current.answers[0] || null,
        category: current.category || 'General',
        difficulty: current.difficulty ?? null
      });
      questionStatus.className = 'status error';
      questionStatus.textContent = uiCopy().wrongStatus;
      showAnswerBtn.classList.remove('hidden');
      nextQuestionBtn.classList.remove('hidden');
      submitBtn.disabled = true;
      answerInput.disabled = true;
    });

    showAnswerBtn.addEventListener('click', () => {
      const isHidden = answerReveal.classList.toggle('hidden');
      if (!isHidden) {
        answerReveal.textContent = uiCopy().answerPrefix.replace('{answer}', runtimeState.pendingRevealAnswer || '—');
      } else {
        answerReveal.textContent = '';
      }
      showAnswerBtn.textContent = isHidden ? uiCopy().showAnswer : uiCopy().hideAnswer;
    });

    nextQuestionBtn.addEventListener('click', () => {
      moveNextQuestion();
    });

    filterAllBtn.addEventListener('click', () => {
      runtimeState.resultFilter = 'all';
      renderAnsweredQuestions();
    });

    filterWrongBtn.addEventListener('click', () => {
      runtimeState.resultFilter = 'wrong';
      renderAnsweredQuestions();
    });

    filterCorrectBtn.addEventListener('click', () => {
      runtimeState.resultFilter = 'correct';
      renderAnsweredQuestions();
    });

    playAgainBtn.addEventListener('click', () => {
      runtimeState.quizStarted = false;
      runtimeState.questions = [];
      runtimeState.index = 0;
      runtimeState.correct = 0;
      runtimeState.wrong = 0;
      runtimeState.awaitingRetry = false;
      runtimeState.answeredQuestions = [];
      runtimeState.resultFilter = 'all';
      showView('setup');
      renderCountState();
    });

    abortQuizBtn.addEventListener('click', () => {
      abortConfirmRow.classList.remove('hidden');
    });

    confirmAbortBtn.addEventListener('click', () => {
      runtimeState.quizStarted = false;
      runtimeState.questions = [];
      runtimeState.index = 0;
      runtimeState.correct = 0;
      runtimeState.wrong = 0;
      runtimeState.awaitingRetry = false;
      runtimeState.answeredQuestions = [];
      runtimeState.resultFilter = 'all';
      showView('setup');
      renderCountState();
    });

    cancelAbortBtn.addEventListener('click', () => {
      abortConfirmRow.classList.add('hidden');
      answerInput.focus();
    });

    function applyCopy() {
      const c = uiCopy();
      document.title = c.title;
      setupHeading.textContent = c.title;
      setupLead.textContent = c.setupLead;
      statusEl.textContent = c.loadingCategories;
      questionCountLabel.firstChild.textContent = `${c.questionCount} `;
      selectAllBtn.textContent = c.selectAll;
      deselectAllBtn.textContent = c.deselectAll;
      startButton.textContent = c.startQuiz;
      for (const backLink of backLinks) {
        backLink.textContent = c.backHome;
      }
      abortQuizBtn.textContent = c.abortQuiz;
      abortConfirmText.textContent = c.abortConfirm;
      confirmAbortBtn.textContent = c.abortYes;
      cancelAbortBtn.textContent = c.abortNo;
      questionTitle.textContent = c.questionTitle;
      answerInput.placeholder = c.answerPlaceholder;
      submitBtn.textContent = c.submitAnswer;
      showAnswerBtn.textContent = c.showAnswer;
      nextQuestionBtn.textContent = c.nextQuestion;
      resultHeading.textContent = c.quizComplete;
      answeredQuestionsHeading.textContent = c.answeredQuestions;
      filterAllBtn.textContent = c.filterAll;
      filterWrongBtn.textContent = c.filterWrongOnly;
      filterCorrectBtn.textContent = c.filterCorrectOnly;
      resultCounterItems[0].lastChild.textContent = ` ${c.correctLabel}`;
      resultCounterItems[1].lastChild.textContent = ` ${c.wrongLabel}`;
      playAgainBtn.textContent = c.playAgain;
    }

    syncLanguageFromStorage();
    applyCopy();
    loadOverview();
    showView('setup');
    window.quizCategoriesState = runtimeState;
  </script>

  <script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
  <script>
    kofiWidgetOverlay.draw('sarcasticsir', {
      'type': 'floating-chat',
      'floating-chat.donateButton.text': 'Support me',
      'floating-chat.donateButton.background-color': '#00000',
      'floating-chat.donateButton.text-color': '#323842'
    });
  </script>
  <style>
    #kofi-widget-overlay {
      left: 20px !important;
      right: auto !important;
      bottom: 20px !important;
    }
  </style>

</body>
