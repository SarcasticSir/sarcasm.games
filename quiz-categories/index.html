<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz categories</title>
  <style>
    :root {
      --bg:#0b0c10;
      --card:#1e1f25;
      --txt:#eaeaea;
      --bd:#2f313a;
      --accent:#4ecca3;
      --muted:#9aa0ad;
      --danger:#ff8b8b;
    }

    body {
      margin:0;
      font:16px/1.4 system-ui, Segoe UI, Roboto, Arial;
      background:var(--bg);
      color:var(--txt);
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:20px;
      box-sizing:border-box;
    }

    .card {
      width:min(760px,100%);
      background:var(--card);
      border:1px solid var(--bd);
      border-radius:14px;
      padding:20px;
    }

    h1 { margin:0 0 10px; }

    .muted {
      margin:0 0 14px;
      color:var(--muted);
    }

    .status {
      min-height: 1.5rem;
      margin: 0 0 12px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: #80ed99;
    }

    .status.almost {
      color: #ffd166;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin: 0 0 16px;
    }

    .cat {
      border:1px solid var(--bd);
      border-radius:10px;
      padding:10px;
      background:#181920;
      transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .cat.is-selected {
      border-color: #3ebd95;
      background: linear-gradient(180deg, #172922 0%, #141f1b 100%);
      box-shadow: inset 0 0 0 1px rgba(78, 204, 163, 0.35);
    }

    .cat label {
      display:flex;
      gap:8px;
      align-items:center;
      cursor:pointer;
      position: relative;
      min-height: 24px;
    }

    .cat input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .cat-pill {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid #6f7788;
      background: #2f3340;
      box-sizing: border-box;
      flex-shrink: 0;
      transition: border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .cat.is-selected .cat-pill {
      border-color: #56d5ad;
      background: #43c89f;
      box-shadow: 0 0 0 3px rgba(67, 200, 159, 0.2);
    }

    .cat-name { font-weight:700; }
    .cat-count { color:var(--muted); font-size: 14px; }

    .controls {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      margin:0 0 14px;
    }

    .controls label {
      display:flex;
      gap:8px;
      align-items:center;
    }

    input[type="number"] {
      width:80px;
      padding:6px;
      border-radius:8px;
      border:1px solid var(--bd);
      background:#101116;
      color:var(--txt);
    }

    .actions {
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn {
      display:inline-block;
      text-decoration:none;
      border-radius:8px;
      padding:10px 14px;
      font-weight:700;
      border:0;
      cursor:pointer;
    }

    .btn.primary {
      background:var(--accent);
      color:#111;
    }

    .btn.secondary {
      background:#2b2e37;
      color:#d4d8e4;
    }

    .btn:disabled {
      opacity:0.5;
      cursor:not-allowed;
    }

    .hidden {
      display: none !important;
    }

    .result-list {
      list-style:none;
      margin:10px 0 0;
      padding-left:0;
      display:grid;
      gap:10px;
    }

    .result-item {
      border:1px solid var(--bd);
      border-radius:10px;
      padding:10px;
      background:#181920;
    }

    .result-item-header {
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      margin-bottom:8px;
    }

    .result-item-question {
      margin:0;
    }

    .result-item-answer {
      margin:0 0 8px;
      color:var(--muted);
    }

    .result-item-status {
      font-weight:700;
    }

    .result-item-status.correct {
      color:#80ed99;
    }

    .result-item-status.wrong {
      color:var(--danger);
    }
  </style>
</head>
<body>
  <main class="card">
    <section id="setupView">
      <h1>Quiz categories</h1>
      <p class="muted">Choose one or more categories. Max question count updates based on your selection.</p>

      <p id="status" class="status" role="status" aria-live="polite">Loading categories…</p>
      <section id="categoryGrid" class="grid" aria-label="Quiz categories"></section>

      <div class="controls">
        <label>
          Question count
          <input id="questionCount" type="number" min="1" value="1" disabled />
        </label>
        <span id="countMeta" class="muted"></span>
      </div>

      <div class="actions">
        <button id="startButton" class="btn primary" type="button" disabled>Start quiz</button>
        <a href="/" class="btn secondary">Back to sarcasm.games</a>
      </div>
    </section>

    <section id="questionView" class="hidden">
      <p id="progressText" class="muted"></p>
      <h2 id="questionTitle">Question</h2>
      <p id="questionCategory" class="muted"></p>
      <form id="answerForm">
        <input id="answerInput" type="text" placeholder="Write your answer" autocomplete="off" />
        <div class="actions">
          <button id="submitBtn" class="btn primary" type="submit">Submit answer</button>
          <button id="showAnswerBtn" class="btn secondary hidden" type="button">Show answer</button>
          <button id="nextQuestionBtn" class="btn secondary hidden" type="button">Next question</button>
        </div>
      </form>
      <p id="questionStatus" class="status"></p>
      <p id="answerReveal" class="muted hidden"></p>
    </section>

    <section id="resultView" class="hidden">
      <h2>Quiz complete 🎉</h2>
      <p id="resultSummary" class="muted"></p>
      <ul class="muted">
        <li><span id="correctCount">0</span> correct</li>
        <li><span id="wrongCount">0</span> wrong</li>
      </ul>
      <h3>Answered questions</h3>
      <ul id="answeredQuestionsList" class="result-list"></ul>
      <div class="actions">
        <button id="playAgainBtn" class="btn primary" type="button">Play again</button>
        <a href="/" class="btn secondary">Back to sarcasm.games</a>
      </div>
    </section>
  </main>

  <script type="module">
    import { getQuizLanguage as readQuizLanguage } from '/lib/client/quiz-language.js';

    const activeLang = readQuizLanguage();
    const categoryGrid = document.getElementById('categoryGrid');
    const setupView = document.getElementById('setupView');
    const questionView = document.getElementById('questionView');
    const resultView = document.getElementById('resultView');
    const statusEl = document.getElementById('status');
    const countInput = document.getElementById('questionCount');
    const countMeta = document.getElementById('countMeta');
    const startButton = document.getElementById('startButton');
    const progressText = document.getElementById('progressText');
    const questionTitle = document.getElementById('questionTitle');
    const questionCategory = document.getElementById('questionCategory');
    const answerForm = document.getElementById('answerForm');
    const answerInput = document.getElementById('answerInput');
    const submitBtn = document.getElementById('submitBtn');
    const showAnswerBtn = document.getElementById('showAnswerBtn');
    const nextQuestionBtn = document.getElementById('nextQuestionBtn');
    const questionStatus = document.getElementById('questionStatus');
    const answerReveal = document.getElementById('answerReveal');
    const resultSummary = document.getElementById('resultSummary');
    const correctCount = document.getElementById('correctCount');
    const wrongCount = document.getElementById('wrongCount');
    const answeredQuestionsList = document.getElementById('answeredQuestionsList');
    const playAgainBtn = document.getElementById('playAgainBtn');

    const runtimeState = {
      activeLang,
      quizStarted: false,
      categories: [],
      questions: [],
      index: 0,
      correct: 0,
      wrong: 0,
      awaitingRetry: false,
      selectedCategories: [],
      count: 0,
      answeredQuestions: []
    };

    function showView(name) {
      setupView.classList.toggle('hidden', name !== 'setup');
      questionView.classList.toggle('hidden', name !== 'question');
      resultView.classList.toggle('hidden', name !== 'result');
    }

    function getSelectedCategories() {
      return runtimeState.categories.filter((category) => category.selected);
    }

    function getSelectedQuestionCapacity() {
      return getSelectedCategories().reduce((sum, category) => sum + category.questionCount, 0);
    }

    function renderCountState() {
      const selectedCount = getSelectedQuestionCapacity();
      const hasSelection = selectedCount > 0;

      countInput.disabled = !hasSelection;
      startButton.disabled = !hasSelection;

      if (!hasSelection) {
        countInput.value = '1';
        countInput.max = '1';
        countMeta.textContent = 'Select at least one category to continue.';
        return;
      }

      countInput.max = String(selectedCount);
      const requestedCount = Number(countInput.value) || 1;
      countInput.value = String(Math.max(1, Math.min(requestedCount, selectedCount)));
      countMeta.textContent = `Selected pool: ${selectedCount} questions (max count ${selectedCount}).`;
    }

    function renderCategories() {
      categoryGrid.innerHTML = '';

      runtimeState.categories.forEach((category, index) => {
        const wrapper = document.createElement('article');
        wrapper.className = 'cat';
        if (category.selected) {
          wrapper.classList.add('is-selected');
        }

        const label = document.createElement('label');
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = category.selected;
        checkbox.setAttribute('aria-label', `Select ${category.name}`);

        const visualPill = document.createElement('span');
        visualPill.className = 'cat-pill';
        visualPill.setAttribute('aria-hidden', 'true');

        checkbox.addEventListener('change', () => {
          runtimeState.categories[index].selected = checkbox.checked;
          wrapper.classList.toggle('is-selected', checkbox.checked);
          renderCountState();
        });

        const textWrapper = document.createElement('span');

        const nameEl = document.createElement('span');
        nameEl.className = 'cat-name';
        nameEl.textContent = category.name;

        const countEl = document.createElement('span');
        countEl.className = 'cat-count';
        countEl.textContent = `${category.questionCount} question${category.questionCount === 1 ? '' : 's'}`;

        textWrapper.append(nameEl, document.createElement('br'), countEl);
        label.append(checkbox, visualPill, textWrapper);
        wrapper.appendChild(label);
        categoryGrid.appendChild(wrapper);
      });

      renderCountState();
    }

    function renderAnsweredQuestions() {
      answeredQuestionsList.innerHTML = '';

      for (const entry of runtimeState.answeredQuestions) {
        const item = document.createElement('li');
        item.className = 'result-item';

        const header = document.createElement('div');
        header.className = 'result-item-header';

        const question = document.createElement('p');
        question.className = 'result-item-question';
        question.textContent = entry.prompt;

        const status = document.createElement('span');
        status.className = `result-item-status ${entry.status}`;
        status.textContent = entry.status === 'correct' ? '✅ Correct' : '❌ Wrong';

        const yourAnswer = document.createElement('p');
        yourAnswer.className = 'result-item-answer';
        yourAnswer.textContent = `Your answer: ${entry.userAnswer || 'No answer given'}`;

        const revealButton = document.createElement('button');
        revealButton.className = 'btn secondary';
        revealButton.type = 'button';
        revealButton.textContent = 'Show answer';

        const answer = document.createElement('p');
        answer.className = 'result-item-answer hidden';
        answer.textContent = `Answer: ${entry.acceptedAnswer || '—'}`;

        revealButton.addEventListener('click', () => {
          const isHidden = answer.classList.toggle('hidden');
          revealButton.textContent = isHidden ? 'Show answer' : 'Hide answer';
        });

        header.append(question, status);
        item.append(header, yourAnswer, revealButton, answer);
        answeredQuestionsList.appendChild(item);
      }
    }

    function renderQuestion() {
      const question = runtimeState.questions[runtimeState.index];
      progressText.textContent = `Question ${runtimeState.index + 1} of ${runtimeState.questions.length}`;
      questionTitle.textContent = question.prompt;
      questionCategory.textContent = `Category: ${question.category || 'General'}`;
      answerInput.value = '';
      answerInput.disabled = false;
      submitBtn.disabled = false;
      questionStatus.textContent = '';
      questionStatus.className = 'status';
      showAnswerBtn.classList.add('hidden');
      nextQuestionBtn.classList.add('hidden');
      answerReveal.classList.add('hidden');
      answerReveal.textContent = `Answer: ${question.answers[0] || '—'}`;
      runtimeState.awaitingRetry = false;
      answerInput.focus();
    }

    function moveNextQuestion() {
      runtimeState.index += 1;
      if (runtimeState.index >= runtimeState.questions.length) {
        correctCount.textContent = String(runtimeState.correct);
        wrongCount.textContent = String(runtimeState.wrong);
        resultSummary.textContent = `You got ${runtimeState.correct} / ${runtimeState.questions.length} correct.`;
        renderAnsweredQuestions();
        showView('result');
        return;
      }

      renderQuestion();
    }

    async function evaluateAnswer(questionId, answer, retryAvailable) {
      const response = await fetch('/api/quiz/answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          questionId,
          answer,
          retryAvailable,
          mode: 'categories',
          lang: runtimeState.activeLang
        })
      });

      if (!response.ok) {
        throw new Error('Could not validate answer.');
      }

      const payload = await response.json();
      if (!payload?.status) {
        throw new Error('Invalid answer response.');
      }

      return payload;
    }

    async function loadOverview() {
      try {
        const response = await fetch('/api/quiz/overview');
        const payload = await response.json();

        if (!response.ok) {
          throw new Error(payload?.error || 'Failed to load categories');
        }

        const categories = Array.isArray(payload?.categories) ? payload.categories : [];

        if (!categories.length || !payload.totalQuestions) {
          runtimeState.categories = [];
          categoryGrid.innerHTML = '';
          statusEl.classList.remove('error');
          statusEl.textContent = 'No categories are available yet. Add quiz data to start playing.';
          renderCountState();
          return;
        }

        runtimeState.categories = categories.map((category) => ({
          name: category.name,
          questionCount: Number(category.questionCount) || 0,
          selected: true
        }));

        statusEl.classList.remove('error');
        statusEl.textContent = `Loaded ${runtimeState.categories.length} categories and ${payload.totalQuestions} total questions.`;
        renderCategories();
      } catch (error) {
        runtimeState.categories = [];
        categoryGrid.innerHTML = '';
        statusEl.classList.add('error');
        statusEl.textContent = `Could not load categories: ${error.message}`;
        renderCountState();
      }
    }

    countInput.addEventListener('change', renderCountState);

    startButton.addEventListener('click', async () => {
      const selectedCategories = getSelectedCategories().map((category) => category.name);
      const count = Number(countInput.value) || 1;

      if (!selectedCategories.length) {
        statusEl.classList.add('error');
        statusEl.textContent = 'Select at least one category before starting.';
        return;
      }

      startButton.disabled = true;
      statusEl.classList.remove('error');
      statusEl.textContent = 'Loading questions…';

      try {
        const response = await fetch('/api/quiz/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            mode: 'categories',
            lang: runtimeState.activeLang,
            categories: selectedCategories,
            count
          })
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload?.error || 'Failed to start quiz');
        }

        const questions = Array.isArray(payload?.questions) ? payload.questions : [];
        if (!questions.length) {
          throw new Error('No questions were returned for your selection.');
        }

        runtimeState.quizStarted = true;
        runtimeState.questions = questions;
        runtimeState.index = 0;
        runtimeState.correct = 0;
        runtimeState.wrong = 0;
        runtimeState.awaitingRetry = false;
        runtimeState.selectedCategories = selectedCategories;
        runtimeState.count = count;
        runtimeState.answeredQuestions = [];

        window.quizCategoriesState = {
          ...runtimeState,
          selectedCategories
        };

        statusEl.classList.remove('error');
        statusEl.textContent = `Loaded ${questions.length} questions.`;
        showView('question');
        renderQuestion();
      } catch (error) {
        statusEl.classList.add('error');
        statusEl.textContent = `Could not start quiz: ${error.message}`;
      } finally {
        renderCountState();
      }
    });

    answerForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (submitBtn.disabled) return;

      const userAnswer = answerInput.value.trim();
      if (!userAnswer) return;

      const current = runtimeState.questions[runtimeState.index];
      let result;

      try {
        result = await evaluateAnswer(current.id, userAnswer, !runtimeState.awaitingRetry);
      } catch (error) {
        questionStatus.className = 'status error';
        questionStatus.textContent = error.message;
        return;
      }

      if (result.status === 'correct') {
        runtimeState.correct += 1;
        runtimeState.answeredQuestions.push({
          prompt: current.prompt,
          status: 'correct',
          userAnswer,
          acceptedAnswer: current.answers[0] || null
        });
        questionStatus.className = 'status ok';
        questionStatus.textContent = 'Correct!';
        submitBtn.disabled = true;
        answerInput.disabled = true;
        setTimeout(() => moveNextQuestion(), 600);
        return;
      }

      if (result.status === 'almost' && !runtimeState.awaitingRetry) {
        runtimeState.awaitingRetry = true;
        questionStatus.className = 'status almost';
        questionStatus.textContent = 'Almost! You get one more try.';
        answerInput.value = '';
        answerInput.focus();
        return;
      }

      runtimeState.wrong += 1;
      runtimeState.awaitingRetry = false;
      runtimeState.answeredQuestions.push({
        prompt: current.prompt,
        status: 'wrong',
        userAnswer,
        acceptedAnswer: result.acceptedAnswer || current.answers[0] || null
      });
      questionStatus.className = 'status error';
      questionStatus.textContent = 'Wrong answer. You can reveal the answer and continue.';
      showAnswerBtn.classList.remove('hidden');
      nextQuestionBtn.classList.remove('hidden');
      submitBtn.disabled = true;
      answerInput.disabled = true;
    });

    showAnswerBtn.addEventListener('click', () => {
      answerReveal.classList.toggle('hidden');
    });

    nextQuestionBtn.addEventListener('click', () => {
      moveNextQuestion();
    });

    playAgainBtn.addEventListener('click', () => {
      runtimeState.quizStarted = false;
      runtimeState.questions = [];
      runtimeState.index = 0;
      runtimeState.correct = 0;
      runtimeState.wrong = 0;
      runtimeState.awaitingRetry = false;
      runtimeState.answeredQuestions = [];
      showView('setup');
      renderCountState();
    });

    loadOverview();
    showView('setup');
    window.quizCategoriesState = runtimeState;
  </script>
</body>
</html>
