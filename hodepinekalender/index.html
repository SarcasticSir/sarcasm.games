<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3659d9" />
  <meta name="description" content="En enkel lokal kalender for hodepine, migrene og medisinbruk." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Hodepinekalender" />
  <title>Hodepinekalender</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <style>
    :root { color-scheme: light; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; color: #18202b; background: #f4f6fa; }
    .loader { width: min(420px, calc(100% - 32px)); padding: 28px; box-sizing: border-box; text-align: center; background: #fff; border: 1px solid #dfe3ea; border-radius: 18px; box-shadow: 0 18px 50px rgba(23,32,51,.08); }
    .loader img { width: 72px; height: 72px; border-radius: 18px; }
    .loader h1 { margin: 14px 0 8px; font-size: 1.5rem; }
    .loader p { margin: 0; color: #667085; line-height: 1.5; }
    .loader-error { color: #9b1c1c !important; }
    .retry { margin-top: 16px; min-height: 42px; padding: 9px 14px; color: #fff; background: #3659d9; border: 0; border-radius: 10px; font: inherit; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <main class="loader" id="loader">
    <img src="icons/icon-192.svg" alt="" />
    <h1>Hodepinekalender</h1>
    <p>Laster kalenderen …</p>
  </main>
  <script>
    (() => {
      "use strict";

      async function loadApp() {
        if (!("DecompressionStream" in window)) {
          throw new Error("Nettleseren er for gammel til å åpne denne versjonen av kalenderen.");
        }

        const payloadFiles = [
          "payload/payload-01.b64",
          "payload/payload-02.b64",
          "payload/payload-03.b64",
          "payload/payload-04.b64"
        ];
        const encoded = (await Promise.all(payloadFiles.map(async (path) => {
          const response = await fetch(path, { cache: "no-cache" });
          if (!response.ok) throw new Error(`Kunne ikke laste ${path}.`);
          return (await response.text()).trim();
        }))).join("");
        const compressed = Uint8Array.from(atob(encoded), (character) => character.charCodeAt(0));
        const stream = new Blob([compressed])
          .stream()
          .pipeThrough(new DecompressionStream("gzip"));
        const appHtml = await new Response(stream).text();

        document.open();
        document.write(appHtml);
        document.close();
      }

      loadApp().catch((error) => {
        console.error(error);
        const loader = document.getElementById("loader");
        loader.innerHTML = `
          <img src="icons/icon-192.svg" alt="" />
          <h1>Kunne ikke laste kalenderen</h1>
          <p class="loader-error">${error.message || "Kontroller internettilkoblingen og prøv igjen."}</p>
          <button class="retry" type="button" onclick="location.reload()">Prøv igjen</button>
        `;
      });
    })();
  </script>
</body>
</html>
